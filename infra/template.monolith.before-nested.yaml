  IncidentMediaHttpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/media/incidentMediaHttp.handler
      Environment:
        Variables:
          INCIDENT_MEDIA_TABLE: !Ref IncidentMediaTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentMediaTable
        - DynamoDBReadPolicy:
            TableName: !Ref AgenciesTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:HeadObject
            Resource: !Sub arn:aws:s3:::${AssetsBucket}/incident-media/*
        # Ops alerts topic only (not account-wide SNS).
        - Statement:
            Effect: Allow
            Action:
              - sns:Publish
            Resource: !GetAtt OpsAlertsTopic.TopicArn
        # Pinpoint SMS/Voice metadata APIs require Resource=* in practice; bound to home region.
        - Statement:
            Effect: Allow
            Action:
              - sms-voice:DescribeAccountAttributes
              - sms-voice:DescribePools
              - sms-voice:DescribeConfigurationSets
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Fn::If:
            - HasIncidentMediaTwilioSecretArn
            - Statement:
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IncidentMediaTwilioSecretArn
            - !Ref AWS::NoValue
      Events:
        PostIncidentMediaRequest:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/media/request
            Method: POST
        ListIncidentMedia:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/media
            Method: GET

