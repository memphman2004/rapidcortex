  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Globally unique; ties assets to account + deployment stage.
      BucketName: !Sub "${AppName}-assets-${DeploymentStage}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - "*"
            AllowedOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
            ExposedHeaders:
              - ETag

  BillingInvoicesBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Keep requested name prefix while remaining globally unique across AWS accounts.
      BucketName: !Sub "rapid-cortex-billing-invoices-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: invoice-archive-lifecycle
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - "*"
            AllowedOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
            ExposedHeaders:
              - ETag

  BillingPosBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Keep requested name prefix while remaining globally unique across AWS accounts.
      BucketName: !Sub "rapid-cortex-billing-pos-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BillingPosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BillingPosBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonPdfUploads
            Effect: Deny
            Principal: "*"
            Action:
              - s3:PutObject
            NotResource: !Sub "${BillingPosBucket.Arn}/*.pdf"

  RapidCortexBillingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BillingDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt BillingProfilesTable.Arn
                  - !GetAtt BillingWebhookEventsTable.Arn
                  - !GetAtt MonetizationPlansTable.Arn
                  - !GetAtt MonetizationAddOnsTable.Arn
                  - !GetAtt AgencySubscriptionsTable.Arn
                  - !GetAtt UsageMetersTable.Arn
                  - !GetAtt MonetizationInvoicesTable.Arn
                  - !GetAtt BillingAuditEventsTable.Arn
                  - !GetAtt CustomersTable.Arn
                  - !GetAtt ServiceCatalogTable.Arn
                  - !GetAtt InvoicesTable.Arn
                  - !GetAtt InvoiceItemsTable.Arn
                  - !GetAtt BillingSchedulesTable.Arn
                  - !GetAtt PaymentRecordsTable.Arn
                  - !GetAtt BillingAuditLogTable.Arn
        - PolicyName: BillingS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${BillingInvoicesBucket.Arn}/*"
                  - !Sub "${BillingPosBucket.Arn}/*"
        - PolicyName: BillingSesAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: BillingCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*"
        - PolicyName: BillingSecretsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapidcortex/${DeploymentStage}/billing/*"

  RapidCortexBillingAPIRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BillingApiDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt BillingProfilesTable.Arn
                  - !GetAtt BillingWebhookEventsTable.Arn
                  - !GetAtt MonetizationPlansTable.Arn
                  - !GetAtt MonetizationAddOnsTable.Arn
                  - !GetAtt AgencySubscriptionsTable.Arn
                  - !GetAtt UsageMetersTable.Arn
                  - !GetAtt MonetizationInvoicesTable.Arn
                  - !GetAtt BillingAuditEventsTable.Arn
                  - !GetAtt CustomersTable.Arn
                  - !GetAtt ServiceCatalogTable.Arn
                  - !GetAtt InvoicesTable.Arn
                  - !GetAtt InvoiceItemsTable.Arn
                  - !GetAtt BillingSchedulesTable.Arn
                  - !GetAtt PaymentRecordsTable.Arn
                  - !GetAtt BillingAuditLogTable.Arn
        - PolicyName: BillingApiS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${BillingInvoicesBucket.Arn}/*"
                  - !Sub "${BillingPosBucket.Arn}/*"
        - PolicyName: BillingApiSesAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: BillingApiCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*"
        - PolicyName: BillingApiSecretsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapidcortex/${DeploymentStage}/billing/*"

  OpsAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AppName} ops (${DeploymentStage})"
      TopicName: !If
        - HasOpsSnsTopicNameOverride
        - !Ref OpsSnsTopicNameOverride
        - !Sub "${AppName}-ops-${DeploymentStage}-${AWS::AccountId}"

  OpsAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSnsEmailSubscription
    Properties:
      TopicArn: !Ref OpsAlertsTopic
      Protocol: email
      Endpoint: !Ref SnsEmailSubscription

  OpsAlertsSmsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSnsSmsSubscription
    Properties:
      TopicArn: !Ref OpsAlertsTopic
      Protocol: sms
      Endpoint: !Ref SnsSmsSubscription

  SesEmailIdentity:
