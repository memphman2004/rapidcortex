            Method: ANY

  BillingSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/billingScheduler.handler
      Timeout: 300
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingSchedulesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoicesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoiceItemsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ServiceCatalogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentRecordsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendTemplatedEmail
              Resource:
                - !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${BillingSesSenderEmail}
        - S3CrudPolicy:
            BucketName: !Ref BillingInvoicesBucket
      Events:
        DailyBillingScheduler:
          Type: Schedule
          Properties:
            Name: daily-billing-scheduler
            Schedule: cron(0 8 * * ? *)
            Description: "Runs billing schedules, reminders, and overdue updates daily at 08:00 UTC."
            Enabled: true

