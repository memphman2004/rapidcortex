            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Statement:
            Effect: Allow
            Action:
              - translate:TranslateText
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Statement:
            Effect: Allow
            Action:
