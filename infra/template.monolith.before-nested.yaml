  PostIncidentAudioChunkLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PostIncidentAudioChunkFunction}"
      RetentionInDays: 30

  PostIncidentAudioChunkVoiceFailuresMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: PostIncidentAudioChunkLogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PostIncidentAudioChunkFunction}"
      FilterPattern: "?stt_failure ?translation_failure ?language_detect_failure"
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: !Sub "RapidCortex/${DeploymentStage}/Voice"
          MetricName: PipelineHardFailures

  PilotOperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AppName}-${DeploymentStage}-ops"
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApiGateway", "5xx", "ApiId", "${ApiIdVal}", "Stage", "${StageVal}" ],
                    [ ".", "4xx", ".", ".", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "HTTP API 4xx / 5xx",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/Lambda", "Errors", "FunctionName", "${AnalyzeFn}" ],
                    [ ".", ".", ".", "${AudioFn}" ],
                    [ ".", "Throttles", ".", "${AnalyzeFn}" ],
                    [ ".", ".", ".", "${AudioFn}" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Analyze + audio chunk errors / throttles",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/Lambda", "Duration", "FunctionName", "${AnalyzeFn}", { "stat": "p95" } ],
                    [ ".", ".", ".", "${AudioFn}", { "stat": "p95" } ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Lambda duration p95 (ms)",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${IncidentsTableName}" ],
                    [ ".", "ConsumedWriteCapacityUnits", ".", "." ],
                    [ ".", "UserErrors", ".", "." ],
                    [ ".", "SystemErrors", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Incidents table capacity + errors",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "${VoiceNs}", "PipelineHardFailures" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Voice pipeline hard failures (log metric)",
                  "period": 300,
                  "stat": "Sum"
                }
              }
            ]
          }
        - ApiIdVal: !Ref Api
          StageVal: "$default"
          AwsRegion: !Ref AWS::Region
          AnalyzeFn: !Ref AnalyzeIncidentFunction
          AudioFn: !Ref PostIncidentAudioChunkFunction
          IncidentsTableName: !Ref IncidentsTable
          VoiceNs: !Sub "RapidCortex/${DeploymentStage}/Voice"

  AnalyzeIncidentErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: Elevated Lambda errors on POST /analyze (auth, guardrails, or AI pipeline).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalyzeIncidentFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  AnalyzeIncidentDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: p95 duration high — investigate provider latency or raise Lambda timeout.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalyzeIncidentFunction
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 90000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  PostIncidentAudioChunkErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: Multilingual audio chunk Lambda errors (STT/translation/provider failures).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref PostIncidentAudioChunkFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 8
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  PostIncidentAudioChunkDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: p95 duration high on multilingual audio chunks (Transcribe batch latency, etc.).
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref PostIncidentAudioChunkFunction
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 100000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HttpApi5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: HTTP API sustained 5xx — check Lambda logs, authorizer, and downstream dependencies.
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref Api
        - Name: Stage
          Value: "$default"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HttpApiIntegrationLatencyP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: HTTP API integration latency p95 high — Lambda cold starts, STT/AI latency, or network.
      Namespace: AWS/ApiGateway
      MetricName: IntegrationLatency
      Dimensions:
        - Name: ApiId
          Value: !Ref Api
        - Name: Stage
          Value: "$default"
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 25000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  AnalyzeIncidentThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: Analyze Lambda throttled — raise reserved concurrency or reduce burst traffic.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref AnalyzeIncidentFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  PostIncidentAudioChunkThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: Audio chunk Lambda throttled — raise concurrency or shed load on multilingual path.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref PostIncidentAudioChunkFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  VoicePipelineHardFailuresAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: >-
        Voice/STT/translation/language-detect hard failures (log-derived). Investigate provider keys,
        quotas, and multilingual env validation.
      Namespace: !Sub "RapidCortex/${DeploymentStage}/Voice"
      MetricName: PipelineHardFailures
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 15
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  IncidentsTableUserErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: DynamoDB user errors on incidents table (IAM, validation, conditional failures).
      Namespace: AWS/DynamoDB
      MetricName: UserErrors
      Dimensions:
        - Name: TableName
          Value: !Ref IncidentsTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  TranscriptsTableUserErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: DynamoDB user errors on transcripts table.
      Namespace: AWS/DynamoDB
      MetricName: UserErrors
      Dimensions:
        - Name: TableName
          Value: !Ref TranscriptsTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  RetentionExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/lambdas/retentionExecutor.handler
      Timeout: 900
      MemorySize: 1024
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalysesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DataDeletionAuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentMediaTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket

  RetentionSchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-retention-executor
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt RetentionExecutorFunction.Arn

  RetentionExecutorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !If
        - HasDynamoTablePrefix
        - !Sub "${DynamoTableNamePrefix}-ret-daily-${DeploymentStage}"
        - !Sub "${AppName}-retention-daily-${DeploymentStage}"
      Description: Daily automated CJIS data retention and purge
      ScheduleExpression: cron(15 6 * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt RetentionExecutorFunction.Arn
        RoleArn: !GetAtt RetentionSchedulerInvokeRole.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 2

  RetentionExecutorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RetentionExecutorFunction
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt RetentionExecutorSchedule.Arn

  # ---------------------------------------------------------------------------
  # CloudTrail (CJIS / tamper-evident account audit of management & optional data)
  # ---------------------------------------------------------------------------
  # Why: CJIS Security Policy 5.4.x and audit best practices require being able
  # to demonstrate who did what in AWS and that evidence was not changed without
  # a trace. A multi-Region trail + log file validation (digest) + S3 with
  # versioning, encryption, and Object Lock (COMPLIANCE) provides:
  #   - Non-repudiation of API activity (read-only copy to S3)
  #   - Integrity of log files (validation / digest; detect tampering)
  #   - WORM-style retention: compliance lock prevents premature deletion (and the
  #     lifecycle only transitions storage class, never expiring while locked)
  # CloudTrail Lake (SQL, multi-source) is NOT provisioned here (extra cost/ops);
  # create an event data store in the console/CLI if you need queryable SQL.
  #
  # Verify trail is active (use CloudTrailName output):
  #   aws cloudtrail get-trail-status --name <CloudTrailName> --region <this-region>
  #   aws cloudtrail get-event-selectors --trail-name <CloudTrailName> --region <this-region>
  #
  # Verify log file integrity (digest) after logs exist in the bucket (see bucket output):
  #   aws cloudtrail validate-logs --bucket-name <CloudTrailS3BucketName> --start-time <T> --end-time <T2>
  #
  # Verify S3 Object Lock (bucket must be COMPLIANCE with retention):
  #   aws s3api get-object-lock-configuration --bucket <CloudTrailS3BucketName>
  #   aws s3api get-public-access-block --bucket <CloudTrailS3BucketName>
  #
  # Query CloudTrail: CloudWatch Logs (short retention) or S3/Athena, or add Lake
  # in the same account. Primary long-term copy is the S3 bucket.
  # ---------------------------------------------------------------------------
  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CloudTrailEnabled
    Properties:
      # CloudWatch: hot, low-latency filter path; S3 is the durable CJIS copy.
      LogGroupName: !Sub /aws/cloudtrail/${AppName}/${DeploymentStage}
      RetentionInDays: 90

  CloudTrailToCloudWatchRole:
    Type: AWS::IAM::Role
    Condition: CloudTrailEnabled
    Properties:
      RoleName: !If
        - HasDynamoTablePrefix
        - !Sub "${DynamoTableNamePrefix}-ct-cwlogs-${DeploymentStage}"
        - !Sub "${AppName}-cloudtrail-cwlogs-${DeploymentStage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailToCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${CloudTrailLogGroup.Arn}:*"

  CloudTrailNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: CloudTrailEnabled
    Properties:
      DisplayName: !Sub "${AppName} CloudTrail (${DeploymentStage})"
      TopicName: !If
        - HasDynamoTablePrefix
        - !Sub "${DynamoTableNamePrefix}-ct-notify-${DeploymentStage}"
        - !Sub "${AppName}-cloudtrail-${DeploymentStage}-${AWS::AccountId}"

  CloudTrailNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: CloudTrailEnabled
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CloudTrailNotificationTopic
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"
      Topics:
        - !Ref CloudTrailNotificationTopic

  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    Condition: CloudTrailEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          # cfn-lint resource spec can lag; ObjectLockEnabledForBucket is required with ObjectLockConfiguration for new lock buckets.
          ignore_checks:
            - E3002
    Properties:
      # Globally unique; versioned, encrypted, and Object Lock (must be on at create).
      BucketName: !Sub "${AppName}-cloudtrail-logs-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      # Required by S3 when creating a bucket with Object Lock + default retention.
      ObjectLockEnabledForBucket: true
      ObjectLockConfiguration:
        # COMPLIANCE: nobody (including the root account) can reduce retention or
        # delete/overwrite protected until retention expires; supports audit proof.
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            # ~7y — aligns with common CJIS record retention; adjust only via a new
            # versioned policy review (and never shorten without legal review).
            Days: 2555
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: cloudtrail-cjis-lifecycle
            Status: Enabled
            # No Expiration: Object Lock + CJIS: never hard-delete in bucket policy here;
            # use transitions only. Standard ~90d, then Glacier, then Deep Archive 7y+.
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
              - TransitionInDays: 2555
                StorageClass: DEEP_ARCHIVE

  CloudTrailS3Policy:
    Type: AWS::S3::BucketPolicy
    Condition: CloudTrailEnabled
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailLogsBucket.Arn}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": bucket-owner-full-control
                "aws:SourceAccount": !Ref "AWS::AccountId"
              StringLike:
                "aws:SourceArn": !Sub "arn:${AWS::Partition}:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${AppName}-audit-${DeploymentStage}"

  CloudTrailAuditingTrail:
    Type: AWS::CloudTrail::Trail
    Condition: CloudTrailEnabled
    DependsOn:
      - CloudTrailS3Policy
      - CloudTrailNotificationTopicPolicy
    Properties:
      TrailName: !Sub "${AppName}-audit-${DeploymentStage}"
      S3BucketName: !Ref CloudTrailLogsBucket
      S3KeyPrefix: !Sub "cloudtrail/${AppName}"
      SnsTopicArn: !Ref CloudTrailNotificationTopic
      IsLogging: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      # Trail requires the log group ARN in `log-group:Name:*` form for delivery.
      CloudWatchLogsLogGroupArn: !Sub "${CloudTrailLogGroup.Arn}:*"
      CloudWatchLogsRoleArn: !GetAtt CloudTrailToCloudWatchRole.Arn
      KMSKeyId: !If
        - HasCloudTrailKms
        - !Ref CloudTrailKmsKeyArn
        - !Ref "AWS::NoValue"
      # If you set CloudTrailKmsKeyArn, the key policy must allow
      # cloudtrail.amazonaws.com to use the key for log encryption. No grant is
      # created in this template for imported keys.
      EventSelectors: !If
        - CloudTrailS3AndLambdaDataEvents
        - - IncludeManagementEvents: true
            ReadWriteType: All
          - IncludeManagementEvents: false
            ReadWriteType: All
            DataResources:
              - Type: "AWS::S3::Object"
                Values:
                  - !Sub "arn:aws:s3:::${AssetsBucket}/"
          - IncludeManagementEvents: false
            ReadWriteType: All
            DataResources:
              - Type: "AWS::Lambda::Function"
                Values:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
        - !If
          - CloudTrailS3DataOnly
          - - IncludeManagementEvents: true
              ReadWriteType: All
            - IncludeManagementEvents: false
              ReadWriteType: All
              DataResources:
                - Type: "AWS::S3::Object"
                  Values:
                    - !Sub "arn:aws:s3:::${AssetsBucket}/"
          - !If
            - CloudTrailLambdaDataOnly
            - - IncludeManagementEvents: true
                ReadWriteType: All
              - IncludeManagementEvents: false
                ReadWriteType: All
                DataResources:
                  - Type: "AWS::Lambda::Function"
                    Values:
                      - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
            - - IncludeManagementEvents: true
                ReadWriteType: All

Outputs:
  OpsAlertsTopicArn:
    Description: SNS topic ARN for CloudWatch alarm notifications (subscribe for email/SMS/Opsgenie).
    Value: !Ref OpsAlertsTopic
  PilotOperationsDashboardName:
    Description: CloudWatch dashboard name (open in console under Dashboards / custom).
    Value: !Ref PilotOperationsDashboard
  DeploymentStage:
    Description: Logical environment (dev / staging / prod)
    Value: !Ref DeploymentStage
  RootDomainName:
    Description: Primary public-facing domain for Rapid Cortex.
    Value: !Ref RootDomainName
  ApiWebAclArn:
    Condition: HasApiWaf
    Description: Regional WAF web ACL attached to the HTTP API $default stage.
    Value: !GetAtt ApiWebAcl.Arn
  HttpApiUrl:
    Description: HTTP API base URL
    Value: !GetAtt Api.ApiEndpoint
  AssetsBucketName:
    Description: S3 bucket name passed to all API Lambdas as ASSETS_BUCKET (IAM allows object CRUD on this bucket).
    Value: !Ref AssetsBucket
  ApiCustomDomainUrl:
    Condition: HasApiCustomDomainCert
    Description: Production API custom domain URL.
    Value: !Sub "https://${ApiSubdomainPrefix}.${RootDomainName}"
  AppDomainUrl:
    Description: Recommended production app URL.
    Value: !Sub "https://app.${RootDomainName}"
  AdminDomainUrl:
    Description: Recommended internal admin URL.
    Value: !Sub "https://admin.${RootDomainName}"
  MarketingDomainUrl:
    Description: Recommended marketing root URL.
    Value: !Sub "https://${RootDomainName}"
  WwwDomainUrl:
    Description: Recommended www host URL.
    Value: !Sub "https://www.${RootDomainName}"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: Cognito app client ID
    Value: !Ref CognitoUserPoolClient
  NativeUserPoolClientId:
    Description: Cognito native app client ID (PKCE, no secret). Set NEXT_PUBLIC_COGNITO_NATIVE_CLIENT_ID / COGNITO_NATIVE_CLIENT_ID for BFF native token exchange.
    Value: !Ref CognitoNativeUserPoolClient
  SelfSignupDefaultAgencyIdValue:
    Description: >-
      custom:agencyId assigned by PostConfirmation to self-registered users (ensure an agency row exists or override on redeploy).
    Value: !Ref SelfSignupDefaultAgencyId
  CognitoIssuer:
    Description: JWT issuer for this pool
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
  CognitoHostedUiBase:
    Description: Hosted UI / OAuth2 base (domain prefix includes DeploymentStage)
    Value: !Sub "https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
  ApiTlsCertificateArn:
    Condition: HasApiCustomDomainCert
    Description: ACM certificate ARN used for the API Gateway regional custom domain (imported or stack-managed).
    Value: !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate]
  MultilingualAzureApiSecretArn:
    Condition: UseManagedMultilingualSecrets
    Description: Stack-managed Azure API secret ARN (JSON with AZURE_SPEECH_KEY and AZURE_TRANSLATION_KEY); replace placeholder values after deploy.
    Value: !Ref MultilingualAzureApiKeysSecret
  MultilingualGoogleServiceAccountSecretArn:
    Condition: UseManagedMultilingualSecrets
    Description: Stack-managed Google service account JSON secret ARN; replace SecretString after deploy.
    Value: !Ref MultilingualGoogleServiceAccountSecret
  CloudTrailArn:
    Condition: CloudTrailEnabled
    Description: CloudTrail trail ARN (multi-Region, log file validation, management + optional data event selectors).
    Value: !GetAtt CloudTrailAuditingTrail.Arn
  CloudTrailName:
    Condition: CloudTrailEnabled
    Description: >-
      Pass to `aws cloudtrail get-trail-status --name` and `validate-logs` (with bucket name, region, and time window).
    Value: !Sub "${AppName}-audit-${DeploymentStage}"
  CloudTrailS3BucketName:
    Condition: CloudTrailEnabled
    Description: >-
      S3 destination for organization-style audit log files. Versioning, SSE-S3, Object Lock (COMPLIANCE), lifecycle
      to Glacier/Deep Archive; not the application ASSETS bucket.
    Value: !Ref CloudTrailLogsBucket
  CloudTrailSnsTopicArn:
    Condition: CloudTrailEnabled
    Description: >-
      SNS topic to which CloudTrail publishes notification of log file delivery (subscribe for ops / SIEM; distinct from
      OpsAlertsTopic).
    Value: !Ref CloudTrailNotificationTopic
  CloudTrailLogGroupName:
    Condition: CloudTrailEnabled
    Description: >-
      Optional CloudWatch Logs real-time copy (short hot retention) for search/alerts. Long-term, tamper-evident copy is
      S3; query via Athena, Lake, or OpenSearch, not the primary CJI store.
    Value: !Ref CloudTrailLogGroup
  BillingSesSenderIdentity:
    Description: SES sender identity used for billing notifications.
    Value: !Ref BillingSesSenderEmail
  BillingSesDomainIdentity:
    Description: SES domain identity used for billing notifications.
    Value: !Ref BillingSesDomain
  BillingSesSandboxManualStep:
    Description: Manual action required if SES account is sandboxed.
    Value: "If SES is in sandbox, request production access in AWS Support before live billing emails."
