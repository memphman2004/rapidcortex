AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  Rapid Cortex API. IAM: SAM built-in DynamoDB/S3 policies scope to named tables/buckets; explicit Statement blocks
  use least-privilege actions, ARNs for Bedrock foundation models (AiBedrockFoundationModelId + QaBedrockModelId),
  stack Secrets prefix rapidcortex/<stage>/*, and regional Conditions where AWS control-plane APIs require Resource=*.
  Verify with npm run validate:iam and sam validate --lint.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028

Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  ApiDomainCertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN in the same region as this stack (API Gateway regional custom domain).
      Leave empty and set Route53HostedZoneId to have the stack request and validate a cert in ACM via DNS.
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: >-
      Public Route 53 hosted zone ID for RootDomainName (e.g. Z123...). When set and ApiDomainCertificateArn is empty,
      the stack creates an ACM certificate for api.<root-domain> and writes DNS validation records automatically.
  AppCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for app.<root-domain> (e.g. CloudFront domain).
  AdminCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for admin.<root-domain>.
  WwwCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for www.<root-domain>.
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for OpenAI (plain string or JSON with apiKey).
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for Anthropic (plain string or JSON with apiKey).
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Speech key (plain string or JSON with AZURE_SPEECH_KEY).
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Translator key (defaults to speech secret when empty).
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN holding Google service account JSON for STT/Translate.
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Agency API (`/api/v1`) JWT signing key (plain UTF-8 string, min 32 chars).
      When empty, lambdas must receive EXTERNAL_API_JWT_SECRET through a secure deployment path (not plaintext in template).
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for webhook signing-secret encryption passphrase (plain UTF-8 string, min 16 chars).
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
    Description: >-
      managed: create stack-owned Secrets Manager secrets (placeholder values) under rapidcortex/<DeploymentStage>/multilingual/* and wire Lambdas to them.
      external: use the Azure/Google secret ARN parameters only (leave managed secrets unused).
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
    Description: >-
      scoped: GetSecretValue limited to rapidcortex/<DeploymentStage>/multilingual* plus any explicitly passed external ARNs (when non-empty).
      broad: GetSecretValue allowed for all secrets in this account/region (legacy compatibility).
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
    Description: >-
      custom:agencyId written by the PostConfirmation trigger for self-registered users (after email
      verification). Create a matching agency row in DynamoDB or override this to an existing agency id.
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
    Description: custom:role written by PostConfirmation when the user has no role yet.
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for automated QA structured JSON scoring (InvokeModel / Converse).
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for analysis / language paths that call Bedrock (InvokeModel / Converse).
      IAM and Globals BEDROCK_MODEL_* must match runtime configuration (CJIS: no foundation-model/* wildcard).
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Twilio JSON: preferred shape accountSid + apiKeySid + apiKeySecret +
      messagingServiceSid; legacy accountSid + authToken + fromE164 (optional messagingServiceSid).
      Leave empty when using AWS-only SMS_PROVIDER or mock/simulator paths.
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
    Description: >-
      Comma-separated browser origins for the HttpApi CORS AllowOrigins list. Use * for local/dev.
      For staging/production set explicitly, e.g. https://www.rapidcortex.us,https://www.example.org
  GoogleCloudProjectId:
    Type: String
    Default: ""
    Description: >-
      Google Cloud project id for server-side Translation / Text-to-Speech (text workflows). Required when
      LANGUAGE_PROVIDER=google or for auto with Google credentials.
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
    Description: Text translation + optional TTS for silent text (complements per-tier voice STT/translate env).
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
    Description: Optional S3 bucket for Google TTS objects; when empty, ASSETS_BUCKET is used.
  # --- Deploy-time naming & optional integrations (see scripts/deploy-from-env.sh) ---
  AppName:
    Type: String
    Default: rapid-cortex
    Description: Short prefix for S3, SNS, Cognito names, and default Dynamo table prefix slug.
  DynamoTableNamePrefix:
    Type: String
    Default: ""
    Description: >-
      When set, all DynamoDB tables use TableName: <prefix>-<table>-<DeploymentStage> (uniquely names tables per env).
      When empty, CloudFormation generates table names (legacy behavior).
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: PITR on DynamoDB. auto = on for staging/prod/pilot, off for dev (matches previous template).
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
    Description: Reserved for future provisioned mode; use PAY_PER_REQUEST.
  CognitoUserPoolName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-users-{DeploymentStage}.
  CognitoAppClientName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-web-{DeploymentStage}.
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: >-
      Hosted UI domain prefix (per account+region). When empty, uses legacy default rapidcortex-{DeploymentStage}-{AccountId} (keeps prior stack behavior); set explicitly to match AppName or a custom prefix.
  CognitoCallbackUrls:
    Type: String
    Default: ""
    Description: Comma-separated OAuth callback URLs for the app client (optional; for hosted UI).
  CognitoLogoutUrls:
    Type: String
    Default: ""
    Description: Comma-separated sign-out URLs (optional; for hosted UI).
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
    Description: >-
      Comma-separated OAuth callback URLs for the **native** app client (PKCE, no secret). Append your HTTPS
      `https://{web-host}/auth/return-to-app` URL here when using the browser return-to-app handoff.
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
    Description: Comma-separated sign-out URLs for the native app client (must match logout_uri used by native apps).
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true for confidential server-side clients; web SPAs use false.
  OpsSnsTopicNameOverride:
    Type: String
    Default: ""
    Description: When set, use this as the SNS topic name for CloudWatch/ops; otherwise {AppName}-ops-{stage}-{AccountId}.
  SnsEmailSubscription:
    Type: String
    Default: ""
    Description: Optional email for AWS::SNS::Subscription on the ops topic.
  SnsSmsSubscription:
    Type: String
    Default: ""
    Description: Optional E.164 phone for AWS::SNS::Subscription (SMS) on the ops topic; region/account must allow SMS.
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
    Description: When SesIdentityValue is set, type of Amazon SES identity to register. Leave all SES params empty to skip.
  SesIdentityValue:
    Type: String
    Default: ""
    Description: Email address (sesIdentityType=email) or domain (sesIdentityType=domain) for AWS::SES::EmailIdentity.
  SesConfigurationSetName:
    Type: String
    Default: ""
    Description: Optional SES configuration set to associate with the identity.
  BillingSesSenderEmail:
    Type: String
    Default: support@appsondemand.net
    Description: Sender email to verify for billing notifications.
  BillingSesDomain:
    Type: String
    Default: rapidcortex.us
    Description: Domain to verify in SES for billing email (DKIM/SPF/DMARC).
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true to deploy live-video KVS functions/routes. Default false keeps core API leaner.
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, deploys a regional AWS WAF web ACL (managed rules + per-IP rate limit) and associates it
      with the API Gateway HTTP API $default stage. Enable for pilot/production edge protection (additional cost).
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
    Description: >-
      WAF rate-based rule: max requests per 5-minute evaluation window per source IP. Tune with agency traffic; API Gateway
      throttling (DefaultRouteSettings) also applies.
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
    Description: >-
      Optional agency SOP: target data lifecycle in days for transcript-style incident data (ops documentation).
      Exposed to all API Lambdas as TRANSCRIPT_RETENTION_POLICY_DAYS. The stack does not auto-delete rows by this value;
      use export and deletion workflows. Leave empty to omit.
  # --- CJIS / audit: platform-wide management API logging (infrastructure) ---
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, provisions multi-account-style audit logging: multi-Region trail, S3 (versioning, SSE, Object Lock, lifecycle
      to Glacier / Deep Archive), optional CloudWatch delivery, and SNS notifications. Set false in low-risk dev to reduce
      cost (not recommended for pilot/prod or CJIS-bound tenants).
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional KMS key ARN (or id) to encrypt CloudTrail log files in S3. Leave empty to use SSE-S3 on the log bucket. Use a
      customer-managed key when the security plan requires key rotation and stricter key policy.
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs S3 data-plane events for this stack's ASSETS bucket (higher cost and volume; enable when object access
      to assets must be provable in CloudTrail, e.g. investigations).
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs data-plane (Invoke) events for all Lambda functions in the stack region. Higher cost; use sparingly
      and prefer management events (default) unless Lambda invocation forensics is required.

# --- CJIS: fail fast when pilot/stage/prod use permissive CORS or secret IAM patterns ---
Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
        AssertDescription: >-
          For CJIS, HttpApiCorsAllowedOrigins must list explicit browser origins in staging/pilot/prod
          (wildcard CORS is dev-only).
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]
        AssertDescription: >-
          MultilingualSecretsPolicyMode `broad` is not allowed outside dev (CJIS least-privilege for Secrets Manager).

Conditions:
  HasImportedApiCert: !Not [!Equals [!Ref ApiDomainCertificateArn, ""]]
  HasManagedApiCert:
    Fn::And:
      - !Equals [!Ref ApiDomainCertificateArn, ""]
      - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  HasApiCustomDomainCert: !Or [!Condition HasImportedApiCert, !Condition HasManagedApiCert]
  HasAppCnameTarget: !Not [!Equals [!Ref AppCnameTarget, ""]]
  HasAdminCnameTarget: !Not [!Equals [!Ref AdminCnameTarget, ""]]
  HasWwwCnameTarget: !Not [!Equals [!Ref WwwCnameTarget, ""]]
  UseManagedMultilingualSecrets: !Equals [!Ref MultilingualSecretProvisioning, "managed"]
  MultilingualSecretsBroadPolicy: !Equals [!Ref MultilingualSecretsPolicyMode, "broad"]
  EnablePilotGradeBackups:
    Fn::Or:
      - Fn::Equals:
          - !Ref DeploymentStage
          - staging
      - Fn::Equals:
          - !Ref DeploymentStage
          - prod
      - Fn::Equals:
          - !Ref DeploymentStage
          - pilot
  HasIncidentMediaTwilioSecretArn: !Not [!Equals [!Ref IncidentMediaTwilioSecretArn, ""]]
  HasExternalApiJwtSecretArn: !Not [!Equals [!Ref ExternalApiJwtSecretArn, ""]]
  HasExternalApiEncryptionKeyArn: !Not [!Equals [!Ref ExternalApiEncryptionKeyArn, ""]]
  HasDynamoTablePrefix: !Not [!Equals [!Ref DynamoTableNamePrefix, ""]]
  DynamoPitrOn:
    Fn::Or:
      - Fn::And:
          - !Equals [!Ref DynamoPointInTimeRecovery, "auto"]
          - !Condition EnablePilotGradeBackups
      - !Equals [!Ref DynamoPointInTimeRecovery, "true"]
  HasCognitoUserPoolNameParam: !Not [!Equals [!Ref CognitoUserPoolName, ""]]
  HasCognitoAppClientNameParam: !Not [!Equals [!Ref CognitoAppClientName, ""]]
  HasCognitoDomainPrefixParam: !Not [!Equals [!Ref CognitoDomainPrefix, ""]]
  HasCognitoCallbackUrls: !Not [!Equals [!Ref CognitoCallbackUrls, ""]]
  HasCognitoLogoutUrls: !Not [!Equals [!Ref CognitoLogoutUrls, ""]]
  CognitoClientUsesSecret: !Equals [!Ref CognitoGenerateSecret, "true"]
  HasOpsSnsTopicNameOverride: !Not [!Equals [!Ref OpsSnsTopicNameOverride, ""]]
  HasSnsEmailSubscription: !Not [!Equals [!Ref SnsEmailSubscription, ""]]
  HasSnsSmsSubscription: !Not [!Equals [!Ref SnsSmsSubscription, ""]]
  CreateSesIdentity:
    Fn::And:
      - !Not [!Equals [!Ref SesIdentityValue, ""]]
      - !Not [!Equals [!Ref SesIdentityType, ""]]
  HasSesConfigurationSet: !Not [!Equals [!Ref SesConfigurationSetName, ""]]
  HasRoute53HostedZone: !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  CreateLiveVideoResources: !Equals [!Ref EnableLiveVideoResources, "true"]
  HasApiWaf: !Equals [!Ref EnableApiWaf, "true"]
  CloudTrailEnabled: !Equals [!Ref EnableCloudTrail, "true"]
  CloudTrailS3DataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailS3DataEvents, "true"]
  CloudTrailLambdaDataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailLambdaDataEvents, "true"]
  CloudTrailS3AndLambdaDataEvents: !And
    - !Condition CloudTrailS3DataEvents
    - !Condition CloudTrailLambdaDataEvents
  CloudTrailS3DataOnly: !And
    - !Condition CloudTrailS3DataEvents
    - !Not [!Condition CloudTrailLambdaDataEvents]
  CloudTrailLambdaDataOnly: !And
    - !Condition CloudTrailLambdaDataEvents
    - !Not [!Condition CloudTrailS3DataEvents]
  HasCloudTrailKms: !Not [!Equals [!Ref CloudTrailKmsKeyArn, ""]]
  HasOpenAiApiKeySecretArn: !Not [!Equals [!Ref OpenAiApiKeySecretArn, ""]]
  HasAnthropicApiKeySecretArn: !Not [!Equals [!Ref AnthropicApiKeySecretArn, ""]]

Mappings:
  MultilingualStageDefaults:
    dev:
      StrictValidation: "false"
    staging:
      StrictValidation: "true"
    prod:
      StrictValidation: "true"
    pilot:
      StrictValidation: "true"
  ApiLambdaDefaults:
    dev:
      PrimaryAi: mock
      SecondaryAi: mock
      TertiaryAi: off
      AiFallback: mock
      AiSecondaryFallback: mock
      Lid1: mock
      Lid2: mock
      Lid3: off
      Stt1: mock
      Stt2: mock
      Stt3: off
      Tr1: mock
      Tr2: mock
      Tr3: off
    staging:
      PrimaryAi: bedrock
      SecondaryAi: off
      TertiaryAi: off
      AiFallback: off
      AiSecondaryFallback: off
      Lid1: aws
      Lid2: mock
      Lid3: off
      Stt1: azure
      Stt2: google
      Stt3: aws
      Tr1: aws
      Tr2: mock
      Tr3: off
    prod:
      PrimaryAi: bedrock
      SecondaryAi: off
      TertiaryAi: off
      AiFallback: off
      AiSecondaryFallback: off
      Lid1: aws
      Lid2: mock
      Lid3: off
      Stt1: azure
      Stt2: google
      Stt3: aws
      Tr1: aws
      Tr2: mock
      Tr3: off
    pilot:
      PrimaryAi: bedrock
      SecondaryAi: off
      TertiaryAi: off
      AiFallback: off
      AiSecondaryFallback: off
      Lid1: aws
      Lid2: mock
      Lid3: off
      Stt1: azure
      Stt2: google
      Stt3: aws
      Tr1: aws
      Tr2: mock
      Tr3: off
  SmsEnvironmentDefaults:
    dev:
      SmsProvider: mock
      SmsPrimaryProvider: twilio
      MockSmsProvider: "true"
      AwsSmsUseSimulator: "true"
    staging:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    prod:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    pilot:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        DEPLOYMENT_STAGE: !Ref DeploymentStage
        INTEGRATION_TRANSCRIPT_CONNECTOR_MODE: "off"
        INTEGRATION_TRANSCRIPT_AGENCY_ALLOWLIST: ""
        TRANSCRIPT_RETENTION_POLICY_DAYS: !Ref TranscriptRetentionPolicyDays
        INCIDENTS_TABLE: !Ref IncidentsTable
        TRANSCRIPTS_TABLE: !Ref TranscriptsTable
        ANALYSES_TABLE: !Ref AnalysesTable
        AUDIT_TABLE: !Ref AuditTable
        DATA_DELETION_AUDIT_TABLE: !Ref DataDeletionAuditTable
        DEFAULT_RETENTION_POLICY_ID: cjis-default-v1
        RETENTION_INCIDENT_DAYS_DEFAULT: "2555"
        RETENTION_TRANSCRIPT_DAYS_DEFAULT: "1095"
        RETENTION_MEDIA_DAYS_DEFAULT: "365"
        RETENTION_ANALYSIS_DAYS_DEFAULT: "1095"
        RETENTION_PURGE_PAGE_SIZE: "25"
        AGENCIES_TABLE: !Ref AgenciesTable
        INVITES_TABLE: !Ref InvitesTable
        ACCESS_OVERRIDES_TABLE: !Ref AccessOverridesTable
        API_CLIENTS_TABLE: !Ref ApiClientsTable
        WEBHOOKS_TABLE: !Ref WebhooksTable
        EXTERNAL_API_RATE_LIMITS_TABLE: !Ref ExternalApiRateLimitsTable
        EXTERNAL_API_JWT_SECRET_ARN: !Ref ExternalApiJwtSecretArn
        EXTERNAL_API_ENCRYPTION_KEY_ARN: !Ref ExternalApiEncryptionKeyArn
        BILLING_PROFILES_TABLE: !Ref BillingProfilesTable
        BILLING_WEBHOOK_EVENTS_TABLE: !Ref BillingWebhookEventsTable
        MONETIZATION_PLANS_TABLE: !Ref MonetizationPlansTable
        MONETIZATION_ADDONS_TABLE: !Ref MonetizationAddOnsTable
        AGENCY_SUBSCRIPTIONS_TABLE: !Ref AgencySubscriptionsTable
        USAGE_METERS_TABLE: !Ref UsageMetersTable
        MONETIZATION_INVOICES_TABLE: !Ref MonetizationInvoicesTable
        BILLING_AUDIT_EVENTS_TABLE: !Ref BillingAuditEventsTable
        SALES_LEADS_TABLE: !Ref SalesLeadsTable
        CUSTOMERS_TABLE: !Ref CustomersTable
        SERVICE_CATALOG_TABLE: !Ref ServiceCatalogTable
        INVOICES_TABLE: !Ref InvoicesTable
        INVOICE_ITEMS_TABLE: !Ref InvoiceItemsTable
        BILLING_SCHEDULES_TABLE: !Ref BillingSchedulesTable
        PAYMENT_RECORDS_TABLE: !Ref PaymentRecordsTable
        BILLING_AUDIT_LOG_TABLE: !Ref BillingAuditLogTable
        BILLING_INVOICES_BUCKET: !Ref BillingInvoicesBucket
        BILLING_POS_BUCKET: !Ref BillingPosBucket
        PASSWORD_MAX_AGE_DAYS: "60"
        PASSWORD_EXPIRY_GRACE_DAYS: "0"
        PASSWORD_CHANGE_REQUIRED_ON_FIRST_LOGIN: "true"
        ASSETS_BUCKET: !Ref AssetsBucket
        LANGUAGE_SESSIONS_TABLE: !Ref LanguageSessionsTable
        SUPPORTED_CALL_LANGUAGES: "en,es,zh,tl,vi,ar,fr,ko,ru,pt"
        PRIMARY_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, PrimaryAi]
        SECONDARY_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, SecondaryAi]
        TERTIARY_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, TertiaryAi]
        FALLBACK_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, AiFallback]
        SECONDARY_FALLBACK_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, AiSecondaryFallback]
        PRIMARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid1]
        SECONDARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid2]
        TERTIARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid3]
        PRIMARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt1]
        SECONDARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt2]
        TERTIARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt3]
        PRIMARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr1]
        SECONDARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr2]
        TERTIARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr3]
        AI_ENABLE_FALLBACKS: "true"
        AI_STORE_PROVIDER_METADATA: "true"
        AI_PROMPT_VERSION: dispatch-triage-v1
        AI_REQUEST_TIMEOUT_MS: "55000"
        AI_MAX_RETRIES_PER_PROVIDER: "1"
        AI_ANALYSIS_DEBOUNCE_SECONDS: "0"
        AI_MAX_ANALYZE_REQUESTS_PER_INCIDENT_PER_HOUR: "120"
        AI_SKIP_IF_TRANSCRIPT_UNCHANGED: "true"
        AI_ANALYSIS_IN_FLIGHT_LEASE_SECONDS: "90"
        OPENAI_API_KEY_SECRET_ARN: !Ref OpenAiApiKeySecretArn
        ANTHROPIC_API_KEY_SECRET_ARN: !Ref AnthropicApiKeySecretArn
        AUTO_ANALYZE_EVERY_N_SEGMENTS: "0"
        COGNITO_USER_POOL_ID: !Ref CognitoUserPool
        COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
        COGNITO_REGION: !Ref AWS::Region
        ALLOW_UNAUTHENTICATED_API: "false"
        # Must mirror SAM `HttpApiCorsAllowedOrigins` comma list for Lambda helpers (billing CORS, etc.).
        APPROVED_CORS_ORIGINS: !Ref HttpApiCorsAllowedOrigins
        MULTILINGUAL_STRICT_VALIDATION: !FindInMap [MultilingualStageDefaults, !Ref DeploymentStage, StrictValidation]
        AWS_TRANSCRIBE_LANGUAGE_IDENTIFICATION: "true"
        AWS_TRANSCRIBE_PREFERRED_LANGUAGE_OPTIONS: ""
        AWS_TRANSCRIBE_TIMEOUT_MS: "0"
        AWS_TRANSCRIBE_ENABLE_PARTIAL_RESULTS: "false"
        AWS_TRANSCRIBE_LANGUAGE_OPTIONS: "en-US,es-US,zh-CN,tl-PH,vi-VN,ar-SA,fr-FR,ko-KR,ru-RU,pt-BR"
        ENABLE_QA_SCORING: "false"
        ENABLE_QA_SCORE_AFTER_ANALYSIS: "false"
        QA_SESSIONS_TABLE: !Ref QASessionsTable
        QA_TEMPLATES_TABLE: !Ref QATemplatesTable
        QA_SCORING_MOCK: "false"
        QA_BEDROCK_MODEL_ID: !Ref QaBedrockModelId
        # Bedrock runtime + IAM both use AiBedrockFoundationModelId / QaBedrockModelId (CJIS: scoped foundation ARNs only).
        BEDROCK_REGION: !Ref AWS::Region
        BEDROCK_MODEL_PRIMARY: !Ref AiBedrockFoundationModelId
        BEDROCK_MODEL_SECONDARY: !Ref AiBedrockFoundationModelId
        BEDROCK_MODEL_TERTIARY: !Ref AiBedrockFoundationModelId
        ENABLE_INCIDENT_MEDIA: "false"
        INCIDENT_MEDIA_TABLE: !Ref IncidentMediaTable
        INCIDENT_MEDIA_PUBLIC_BASE_URL: ""
        INCIDENT_MEDIA_TOKEN_TTL_MINUTES: "120"
        INCIDENT_MEDIA_UPLOAD_URL_TTL_SECONDS: "900"
        INCIDENT_MEDIA_MAX_UPLOAD_BYTES: "52428800"
        INCIDENT_MEDIA_SNS_DIRECT: "0"
        INCIDENT_MEDIA_TWILIO_SECRET_ARN: !Ref IncidentMediaTwilioSecretArn
        INCIDENT_MEDIA_SMS_MOCK: "false"
        SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsProvider]
        SMS_PRIMARY_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsPrimaryProvider]
        MOCK_SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
        AWS_SMS_REGION: ""
        AWS_SMS_USE_SIMULATOR: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, AwsSmsUseSimulator]
        AWS_SMS_CONFIGURATION_SET_NAME: ""
        AWS_SMS_POOL_ID: ""
        MEDIA_UPLOAD_TOKEN_TTL_SECONDS: ""
        ENABLE_SOP_PROTOCOL_AI: "false"
        SOP_DETECT_EVERY_N_SEGMENTS: "0"
        SOP_DETECTION_MOCK: "false"
        SOP_UPLOAD_URL_TTL_SECONDS: "900"
        ENABLE_NON_EMERGENCY_TRIAGE: "false"
        TRIAGE_DETECT_EVERY_N_SEGMENTS: "0"
        TRIAGE_MOCK: "false"
        ENABLE_DISPATCHER_WELLNESS: "false"
        TRAUMA_FLAGS_TABLE: !Ref TraumaFlagsTable
        ENABLE_CALLER_CARD: "false"
        PREMISE_NOTES_TABLE: !Ref PremiseNotesTable
        DISPATCHER_COACHING_NOTES_TABLE: !Ref DispatcherCoachingNotesTable
        INCIDENT_SHARES_TABLE: !Ref IncidentSharesTable
        AGENCY_SHARE_PARTNERS_TABLE: !Ref AgencySharePartnersTable
        ENABLE_CROSS_JURISDICTION_SHARES: "false"
        ANALYTICS_CACHE_PREFIX: "analytics/v1"
        GOOGLE_CLOUD_PROJECT_ID: !Ref GoogleCloudProjectId
        LANGUAGE_PROVIDER: !Ref LanguageProvider
        GOOGLE_TRANSLATE_LOCATION: "global"
        GOOGLE_TTS_LOCATION: "global"
        GOOGLE_TTS_OUTPUT_BUCKET: !Ref GoogleTtsOutputBucket
        GOOGLE_APPLICATION_CREDENTIALS_SECRET_ARN: !If
          - UseManagedMultilingualSecrets
          - !Ref MultilingualGoogleServiceAccountSecret
          - !Ref GoogleApplicationCredentialsSecretArn
        SILENT_TEXT_TRANSLATION_ENABLED: "true"
        SILENT_TEXT_TTS_ENABLED: "false"
        DESKTOP_MACOS_S3_KEY: ""
        DESKTOP_MACOS_VERSION: "1.0.0"
        DESKTOP_MACOS_RELEASED_AT: ""
        DESKTOP_MACOS_MIN_OS: "13.0"
        DESKTOP_MACOS_SHA256: ""
        DESKTOP_MACOS_FILE_BYTES: "0"
        DESKTOP_MACOS_ARTIFACT_NAME: "RapidCortex-1.0.0.dmg"
        DESKTOP_WINDOWS_S3_KEY: ""
        DESKTOP_WINDOWS_VERSION: "1.0.0"
        DESKTOP_WINDOWS_RELEASED_AT: ""
        DESKTOP_WINDOWS_MIN_OS: "Windows 10 22H2"
        DESKTOP_WINDOWS_SHA256: ""
        DESKTOP_WINDOWS_FILE_BYTES: "0"
        DESKTOP_WINDOWS_ARTIFACT_NAME: "RapidCortexSetup.exe"
        DESKTOP_DOWNLOAD_URL_TTL_SECONDS: "300"
        BILLING_PAYMENT_INSTRUCTIONS_SECRET_ARN: !Ref BillingPaymentInstructionsSecret
        BILLING_SES_CREDENTIALS_SECRET_ARN: !Ref BillingSesCredentialsSecret
        BILLING_SES_SENDER_EMAIL: !Ref BillingSesSenderEmail

Resources:
  MultilingualAzureApiKeysSecret:
    Type: AWS::SecretsManager::Secret
    Condition: UseManagedMultilingualSecrets
    Properties:
      Name: !Sub rapidcortex/${DeploymentStage}/multilingual/azure-api
      Description: >-
        Azure Speech + Translator keys as JSON (keys AZURE_SPEECH_KEY, AZURE_TRANSLATION_KEY).
        Replace placeholder values after first deploy (aws secretsmanager put-secret-value).
      SecretString: '{"AZURE_SPEECH_KEY":"REPLACE_ME","AZURE_TRANSLATION_KEY":"REPLACE_ME"}'

  MultilingualGoogleServiceAccountSecret:
    Type: AWS::SecretsManager::Secret
    Condition: UseManagedMultilingualSecrets
    Properties:
      Name: !Sub rapidcortex/${DeploymentStage}/multilingual/google-service-account
      Description: >-
        Full Google Cloud service account JSON for Speech + Translate. Replace entire SecretString after deploy
        (GCP console → IAM → Service accounts → Keys → JSON).
      SecretString: '{"type":"service_account","project_id":"REPLACE_ME","private_key_id":"REPLACE","private_key":"-----BEGIN PRIVATE KEY-----\\nREPLACE\\n-----END PRIVATE KEY-----\\n","client_email":"replace-me@project.iam.gserviceaccount.com"}'

  BillingPaymentInstructionsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: rapid-cortex/billing/payment-instructions
      Description: >-
        Billing payment instructions for ACH/wire/check workflows. Replace placeholders post-deploy.
      SecretString: >-
        {"achRoutingNumber":"REPLACE_ME","achAccountNumber":"REPLACE_ME","wireInstructions":"REPLACE_ME","checkMailingAddress":"REPLACE_ME","bankName":"REPLACE_ME","bankContact":"REPLACE_ME"}

  BillingSesCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: rapid-cortex/billing/ses-credentials
      Description: >-
        SES SMTP credentials (when used) plus billing notification recipients. Replace placeholders post-deploy.
      SecretString: >-
        {"smtpUsername":"REPLACE_ME","smtpPassword":"REPLACE_ME","billingNotificationEmails":["billing@rapidcortex.us","finance@rapidcortex.us"]}

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AppName}-cognito-postconf-${DeploymentStage}"
      Description: >-
        Cognito PostConfirmation: seeds custom:agencyId and custom:role for self-service sign-ups
        so ID tokens satisfy the API until an admin updates the user.
      Handler: handler.handler
      CodeUri: cognito-post-confirmation/
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          # Override Globals: avoid !Ref CognitoUserPool here (UserPool references this function).
          COGNITO_USER_POOL_ID: unused-post-confirmation-placeholder
          COGNITO_CLIENT_ID: unused-post-confirmation-placeholder
          SELF_SIGNUP_DEFAULT_AGENCY_ID: !Ref SelfSignupDefaultAgencyId
          SELF_SIGNUP_DEFAULT_ROLE: !Ref SelfSignupDefaultRole
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminUpdateUserAttributes
            Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !If
        - HasCognitoUserPoolNameParam
        - !Ref CognitoUserPoolName
        - !Sub "${AppName}-users-${DeploymentStage}"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: custom:agencyId
          AttributeDataType: String
          Mutable: true
        - Name: custom:role
          AttributeDataType: String
          Mutable: true
        - Name: custom:status
          AttributeDataType: String
          Mutable: true
        # JWT claims consumed by apps/web middleware + packages/shared/session-product.ts
        # so operational users reach role dashboards after sign-in (including rc_admin / RC Admin).
        - Name: custom:planId
          AttributeDataType: String
          Mutable: true
        - Name: custom:subStatus
          AttributeDataType: String
          Mutable: true
        - Name: custom:pwdChangedAt
          AttributeDataType: String
          Mutable: true
        - Name: custom:pwdChangeReq
          AttributeDataType: String
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
      # TOTP MFA required for every user at sign-in (enrollment on first successful password auth).
      MfaConfiguration: "ON"
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      LambdaConfig:
        PostConfirmation: !GetAtt CognitoPostConfirmationFunction.Arn

  CognitoPostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CognitoPostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !If
        - HasCognitoAppClientNameParam
        - !Ref CognitoAppClientName
        - !Sub "${AppName}-web-${DeploymentStage}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: !If [CognitoClientUsesSecret, true, false]
      CallbackURLs: !If
        - HasCognitoCallbackUrls
        - !Split [",", !Ref CognitoCallbackUrls]
        - !Ref AWS::NoValue
      LogoutURLs: !If
        - HasCognitoLogoutUrls
        - !Split [",", !Ref CognitoLogoutUrls]
        - !Ref AWS::NoValue
      AllowedOAuthFlowsUserPoolClient: !If [HasCognitoCallbackUrls, true, !Ref AWS::NoValue]
      AllowedOAuthFlows: !If
        - HasCognitoCallbackUrls
        - [code]
        - !Ref AWS::NoValue
      AllowedOAuthScopes: !If
        - HasCognitoCallbackUrls
        - [openid, email, profile]
        - !Ref AWS::NoValue
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  CognitoNativeUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AppName}-native-${DeploymentStage}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      CallbackURLs: !Split [",", !Ref CognitoNativeCallbackUrls]
      LogoutURLs: !Split [",", !Ref CognitoNativeLogoutUrls]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      # Prefix must be unique per account/region; include stage so dev/staging/prod/pilot stacks do not collide.
      Domain: !If
        - HasCognitoDomainPrefixParam
        - !Ref CognitoDomainPrefix
        - !Sub "rapidcortex-${DeploymentStage}-${AWS::AccountId}"
      UserPoolId: !Ref CognitoUserPool

  # Logical id retained for stable stack upgrades; pool group name is `rc_admin`.
  CognitoGroupPlatformSuperadmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: rc_admin
      Description: Rapid Cortex internal RC Admin (rc_admin).
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAgencyAdmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: Agency-scoped administrators.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupSupervisor:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: supervisor
      Description: Agency-scoped supervisors.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupDispatcher:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: dispatcher
      Description: Agency-scoped dispatch operators.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAnalyst:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: analyst
      Description: Future analyst role placeholder.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupReadonlyAuditor:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: readonly_auditor
      Description: Future read-only auditor role placeholder.
      UserPoolId: !Ref CognitoUserPool

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
              audience:
                - !Ref CognitoUserPoolClient

  # Regional WAF in front of the HTTP API (API Gateway stage association). Complements stage throttling; does not replace it.
  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: HasApiWaf
    Properties:
      Name: !Sub "${AppName}-httpapi-waf-${DeploymentStage}"
      Description: Managed rules + per-IP rate limit for Rapid Cortex API Gateway
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AppName}ApiWaf"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafCommon"
            SampledRequestsEnabled: true
        - Name: AWSManagedBadInputs
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafBadInputs"
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRep"
            SampledRequestsEnabled: true
        - Name: PerIpRateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRate"
            SampledRequestsEnabled: true

  ApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: HasApiWaf
    Properties:
      WebACLArn: !GetAtt ApiWebAcl.Arn
      ResourceArn: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}::/apis/${ApiId}/stages/${StageName}"
        - ApiId: !Ref Api
          StageName: "$default"

  ApiManagedCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasManagedApiCert
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
          HostedZoneId: !Ref Route53HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasApiCustomDomainCert
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      DomainNameConfigurations:
        - CertificateArn: !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate]
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiCustomDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasApiCustomDomainCert
    Properties:
      ApiId: !Ref Api
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      Stage: "$default"

  ApiDomainDnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomainCert
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  ApiDomainDnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomainCert
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  AppCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasAppCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "app.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref AppCnameTarget

  AdminCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasAdminCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "admin.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref AdminCnameTarget

  WwwCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasWwwCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "www.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref WwwCnameTarget

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/health.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/health
            Method: GET
            Auth:
              Authorizer: NONE

  ExternalV1HttpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/external/externalV1Http.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ApiClientsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WebhooksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExternalApiRateLimitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalysesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AgenciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TraumaFlagsTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
        - Fn::If:
            - HasExternalApiJwtSecretArn
            - Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref ExternalApiJwtSecretArn
            - !Ref AWS::NoValue
        - Fn::If:
            - HasExternalApiEncryptionKeyArn
            - Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref ExternalApiEncryptionKeyArn
            - !Ref AWS::NoValue
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentMediaTable
      Events:
        ExternalV1OAuth:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/v1/oauth/token
            Method: POST
            Auth:
              Authorizer: NONE
        ExternalV1ProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/v1/{proxy+}
            Method: GET
            Auth:
              Authorizer: NONE
        ExternalV1ProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/v1/{proxy+}
            Method: POST
            Auth:
              Authorizer: NONE
        ExternalV1ProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/v1/{proxy+}
            Method: PATCH
            Auth:
              Authorizer: NONE

  CreateIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/createIncident.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AgenciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents
            Method: POST

  ListIncidentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/listIncidents.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentsTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents
            Method: GET

  GetIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/getIncident.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentSharesTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}
            Method: GET

  PatchIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/patchIncident.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}
            Method: PATCH

  PatchIncidentLegalHoldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/patchIncidentLegalHold.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/legal-hold
            Method: PATCH

  AddTranscriptChunkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../apps/api/
      Handler: dist/handlers/addTranscriptChunk.handler
      Timeout: 120
      MemorySize: 768
      Environment:
        Variables:
          AZURE_SPEECH_KEY_SECRET_ARN: !If [UseManagedMultilingualSecrets, !Ref MultilingualAzureApiKeysSecret, !Ref AzureSpeechKeySecretArn]
          AZURE_TRANSLATION_KEY_SECRET_ARN: !If [UseManagedMultilingualSecrets, !Ref MultilingualAzureApiKeysSecret, !Ref AzureTranslationKeySecretArn]
          GOOGLE_APPLICATION_CREDENTIALS_SECRET_ARN: !If [UseManagedMultilingualSecrets, !Ref MultilingualGoogleServiceAccountSecret, !Ref GoogleApplicationCredentialsSecretArn]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BillingAuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalysesTable
        - DynamoDBReadPolicy:
            TableName: !Ref AgenciesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TraumaFlagsTable
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
        # CJIS: Secrets — scoped to stack multilingual prefix, or (dev-only) all secrets when MultilingualSecretsPolicyMode=broad.
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !If
              - MultilingualSecretsBroadPolicy
              - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*
              - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapidcortex/${DeploymentStage}/*
        # CJIS: Bedrock — per-foundation-model ARNs only (no foundation-model/*).
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:Converse
            Resource:
              - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${AiBedrockFoundationModelId}
              - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${QaBedrockModelId}
        # Comprehend/Translate: IAM requires Resource=* for these control-plane APIs; scope to home region.
        - Statement:
            Effect: Allow
            Action:
              - comprehend:DetectDominantLanguage
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Statement:
            Effect: Allow
            Action:
              - translate:TranslateText
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/transcript
            Method: POST

