Outputs:
  HttpApiUrl:
    Description: HTTP API base URL
    Value: !GetAtt AppSamStackV2.Outputs.HttpApiUrl
  HttpApi2Url:
    Description: Secondary HTTP API base URL (stack-app-sam-2 routes; execute-api endpoint)
    Value: !GetAtt AppSam2Stack.Outputs.HttpApiUrl
  HttpApi2Id:
    Description: Secondary HTTP API ID (stack-app-sam-2)
    Value: !GetAtt AppSam2Stack.Outputs.HttpApiId
  HttpApi3Url:
    Description: Tertiary HTTP API base URL (stack-app-sam-3 media/admin/platform routes)
    Value: !GetAtt AppSam3Stack.Outputs.HttpApiUrl
  HttpApi3Id:
    Description: Tertiary HTTP API ID (stack-app-sam-3)
    Value: !GetAtt AppSam3Stack.Outputs.HttpApiId
  HttpApi4Url:
    Description: Quaternary HTTP API base URL (stack-app-sam-4 billing/ring routes)
    Value: !GetAtt AppSam4Stack.Outputs.HttpApiUrl
  HttpApi4Id:
    Description: Quaternary HTTP API ID (stack-app-sam-4)
    Value: !GetAtt AppSam4Stack.Outputs.HttpApiId
  WebSocketApiUrl:
    Description: WebSocket URL for real-time call control (wss)
    Value: !GetAtt AppSamRealtime2Stack.Outputs.WebSocketApiUrl
  WebSocketApiId:
    Value: !GetAtt AppSamRealtime2Stack.Outputs.WebSocketApiId
  UserPoolId:
    Description: Cognito user pool id
    Value: !GetAtt AppSamStackV2.Outputs.UserPoolId
  UserPoolClientId:
    Description: Cognito web client id
    Value: !GetAtt AppSamStackV2.Outputs.UserPoolClientId
  NativeUserPoolClientId:
    Description: Cognito native client id
    Value: !GetAtt AppSamStackV2.Outputs.NativeUserPoolClientId
  AssetsBucketName:
    Description: Assets bucket (from data layer or deterministic name when nested data layer is omitted)
    Value:
      Fn::If:
        - HasDataLayerNestedStack
        - !GetAtt DataLayerStack.Outputs.AssetsBucket
        - !Sub "${AppName}-assets-${DeploymentStage}-${AWS::AccountId}"
  ApiCustomDomainUrl:
    Description: API custom domain URL if configured
    Value: !GetAtt AppSamStackV2.Outputs.ApiCustomDomainUrl
  CognitoIssuer:
    Description: Cognito issuer URL
    Value: !GetAtt AppSamStackV2.Outputs.CognitoIssuer
  CognitoHostedUiBase:
    Description: Cognito hosted UI base
    Value: !GetAtt AppSamStackV2.Outputs.CognitoHostedUiBase
  ApiWebAclArn:
    Description: Regional WAF ACL ARN (if enabled)
    Value: !GetAtt AppSamStackV2.Outputs.ApiWebAclArn
  DeploymentStage:
    Description: Deployment stage
    Value: !Ref DeploymentStage
