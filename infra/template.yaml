  AppSamHospital2Stack:
    Type: AWS::CloudFormation::Stack
    # cfn-lint W3005 is overzealous here: the !GetAtt below DOES create the
    # dependency on AppSam2Stack, but we keep the explicit DependsOn for clarity
    # (the resource also has parameters from AppSamStackV2 via GetAtt, so the
    # ordering review-on-sight without DependsOn is misleading). Pre-existing
    # since commit 19fa348 ("full platform recovery").
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W3005
    DependsOn: AppSam2Stack
    Properties:
      TimeoutInMinutes: 60
      TemplateURL: nested/stack-app-sam-2-hospital.yaml
      Parameters:
        DeploymentStage: !Ref DeploymentStage
        HttpApiId: !GetAtt AppSam2Stack.Outputs.HttpApiId
        ImportedCognitoUserPoolId: !GetAtt AppSamStackV2.Outputs.UserPoolId
        ImportedCognitoWebClientId: !GetAtt AppSamStackV2.Outputs.UserPoolClientId
        ImportedCognitoIssuer: !GetAtt AppSamStackV2.Outputs.CognitoIssuer
        AuditTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AuditTable
            - !Sub "${DynamoTableNamePrefix}-audit-${DeploymentStage}"
        AgenciesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgenciesTable
            - !Sub "${DynamoTableNamePrefix}-agencies-${DeploymentStage}"
        IncidentTimelineTable: !Sub "rapid-cortex-incident-timeline-${DeploymentStage}"
        HospitalPreAlertsTable: !Sub "rapid-cortex-hospital-prealerts-${DeploymentStage}"
        HospitalCapacityTable: !Sub "rapid-cortex-hospital-capacity-${DeploymentStage}"
        HospitalProfilesTable: !Sub "rapid-cortex-hospital-profiles-${DeploymentStage}"
        ManagedPolicyNamePrefix: !Ref AWS::StackName

