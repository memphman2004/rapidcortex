AWSTemplateFormatVersion: "2010-09-09"
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3002
Description: >-
  Rapid Cortex nested root stack. Delegates DynamoDB/S3/multilingual billing secrets to stack-data-layer,
  primary SAM runtime to stack-app-sam, and secondary HttpApi (comms / RC Lite / language / live routes) to
  stack-app-sam-2 (same Cognito as stack 1; execute-api URL exposed as HttpApi2Url),
  and media/admin/platform routes to stack-app-sam-3 (HttpApi3Url).
  Regenerate core SAM wiring via scripts/generate-two-stack-infra.rb where applicable.
Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  ApiDomainCertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN in the same region as this stack (API Gateway regional custom domain).
      Leave empty and set Route53HostedZoneId to have the stack request and validate a cert in ACM via DNS.
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: >-
      Public Route 53 hosted zone ID for RootDomainName (e.g. Z123...). When set and ApiDomainCertificateArn is empty,
      the stack creates an ACM certificate for api.<root-domain> and writes DNS validation records automatically.
  AppCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for app.<root-domain> (e.g. CloudFront domain).
  AdminCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for admin.<root-domain>.
  WwwCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for www.<root-domain>.
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for OpenAI (plain string or JSON with apiKey).
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for Anthropic (plain string or JSON with apiKey).
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Speech key (plain string or JSON with AZURE_SPEECH_KEY).
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Translator key (defaults to speech secret when empty).
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN holding Google service account JSON for STT/Translate.
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Agency API (`/api/v1`) JWT signing key (plain UTF-8 string, min 32 chars).
      When empty, lambdas must receive EXTERNAL_API_JWT_SECRET through a secure deployment path (not plaintext in template).
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for webhook signing-secret encryption passphrase (plain UTF-8 string, min 16 chars).
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
    Description: >-
      managed: create stack-owned Secrets Manager secrets (placeholder values) under rapidcortex/<DeploymentStage>/multilingual/* and wire Lambdas to them.
      external: use the Azure/Google secret ARN parameters only (leave managed secrets unused).
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
    Description: >-
      scoped: GetSecretValue limited to rapidcortex/<DeploymentStage>/multilingual* plus any explicitly passed external ARNs (when non-empty).
      broad: GetSecretValue allowed for all secrets in this account/region (legacy compatibility).
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
    Description: >-
      custom:agencyId written by the PostConfirmation trigger for self-registered users (after email
      verification). Create a matching agency row in DynamoDB or override this to an existing agency id.
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
    Description: custom:role written by PostConfirmation when the user has no role yet.
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for automated QA structured JSON scoring (InvokeModel / Converse).
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for analysis / language paths that call Bedrock (InvokeModel / Converse).
      IAM and Globals BEDROCK_MODEL_* must match runtime configuration (CJIS: no foundation-model/* wildcard).
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Twilio JSON: preferred shape accountSid + apiKeySid + apiKeySecret +
      messagingServiceSid; legacy accountSid + authToken + fromE164 (optional messagingServiceSid).
      Leave empty when using AWS-only SMS_PROVIDER or mock/simulator paths.
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
    Description: >-
      Comma-separated browser origins for the HttpApi CORS AllowOrigins list. Use * for local/dev.
      For staging/production set explicitly, e.g. https://www.rapidcortex.us,https://www.example.org
  GoogleCloudProjectId:
    Type: String
    Default: ""
    Description: >-
      Google Cloud project id for server-side Translation / Text-to-Speech (text workflows). Required when
      LANGUAGE_PROVIDER=google or for auto with Google credentials.
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
    Description: Text translation + optional TTS for silent text (complements per-tier voice STT/translate env).
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
    Description: Optional S3 bucket for Google TTS objects; when empty, ASSETS_BUCKET is used.
  # --- Deploy-time naming & optional integrations (see scripts/deploy-from-env.sh) ---
  AppName:
    Type: String
    Default: rapid-cortex
    Description: Short prefix for S3, SNS, Cognito names, and default Dynamo table prefix slug.
  DynamoTableNamePrefix:
    Type: String
    Default: rapid-cortex
    Description: >-
      DynamoDB name prefix forwarded to nested stacks with each table slug and DeploymentStage
      (example: rapid-cortex-agencies-dev). Override via DDB_TABLE_PREFIX when deploying.
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: PITR on DynamoDB. auto = on for staging/prod/pilot, off for dev (matches previous template).
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
    Description: Reserved for future provisioned mode; use PAY_PER_REQUEST.
  CognitoUserPoolName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-users-{DeploymentStage}.
  CognitoAppClientName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-web-{DeploymentStage}.
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: >-
      Hosted UI domain prefix (per account+region). When empty, uses legacy default rapidcortex-{DeploymentStage}-{AccountId} (keeps prior stack behavior); set explicitly to match AppName or a custom prefix.
  CognitoCallbackUrls:
    Type: String
    Default: ""
    Description: Comma-separated OAuth callback URLs for the app client (optional; for hosted UI).
  CognitoLogoutUrls:
    Type: String
    Default: ""
    Description: Comma-separated sign-out URLs (optional; for hosted UI).
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
    Description: >-
      Comma-separated OAuth callback URLs for the **native** app client (PKCE, no secret). Append your HTTPS
      `https://{web-host}/auth/return-to-app` URL here when using the browser return-to-app handoff.
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
    Description: Comma-separated sign-out URLs for the native app client (must match logout_uri used by native apps).
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true for confidential server-side clients; web SPAs use false.
  SnsEmailSubscription:
    Type: String
    Default: ""
    Description: Optional email for AWS::SNS::Subscription on the ops topic.
  SnsSmsSubscription:
    Type: String
    Default: ""
    Description: Optional E.164 phone for AWS::SNS::Subscription (SMS) on the ops topic; region/account must allow SMS.
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
    Description: When SesIdentityValue is set, type of Amazon SES identity to register. Leave all SES params empty to skip.
  SesIdentityValue:
    Type: String
    Default: ""
    Description: Email address (sesIdentityType=email) or domain (sesIdentityType=domain) for AWS::SES::EmailIdentity.
  SesConfigurationSetName:
    Type: String
    Default: ""
    Description: Optional SES configuration set to associate with the identity.
  BillingSesSenderEmail:
    Type: String
    Default: ""
    Description: Sender email to verify for billing notifications. Leave blank with BillingSesDomain to skip billing SES identities in the app stack.
  BillingSesDomain:
    Type: String
    Default: ""
    Description: Domain to verify in SES for billing email (DKIM/SPF/DMARC). Leave blank with BillingSesSenderEmail to skip billing SES identities in the app stack.
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true to deploy live-video KVS functions/routes. Default false keeps core API leaner.
  EnableSilentText:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Server-side feature flag for Silent Text (SMS link -> web text chat). The route Lambdas are
      always created on the custom domain, but with `false` they return 503 SERVICE_UNAVAILABLE
      from the handler instead of attempting an SMS send.
  EnablePinpoint:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Server-side feature flag for Pinpoint (caller GPS link). Mirrors `EnableSilentText` —
      routes exist but handlers gate on this flag at runtime.
  PilotTestFeaturesEnabled:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: >-
      When auto, turns on pilot-test API feature flags for DeploymentStage=dev (Silent Text, Pinpoint,
      Ring emergency cameras, QA scoring, Surge, SOP AI, etc.). Set false to force off; true to force on in any stage.
  AppPublicBaseUrl:
    Type: String
    Default: "https://www.rapidcortex.us"
    Description: >-
      Public origin (no trailing slash) for caller-facing token pages — used to mint absolute
      Silent Text and Pinpoint links in SMS bodies. Override for non-prod / preview deploys.
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, deploys a regional AWS WAF web ACL (managed rules + per-IP rate limit) and associates it
      with the API Gateway HTTP API $default stage. Enable for pilot/production edge protection (additional cost).
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
    Description: >-
      WAF rate-based rule: max requests per 5-minute evaluation window per source IP. Tune       with agency traffic; API Gateway
      throttling (DefaultRouteSettings) also applies.
  CadPublicApiBaseUrl:
    Type: String
    Default: ""
    Description: >-
      Public HTTPS base URL for CAD admin setup instructions and webhook URLs when the API has no custom domain in this stack
      (e.g. https://abc123.execute-api.us-east-1.amazonaws.com). Leave empty when ApiDomainCertificateArn is set so the stack uses
      https://{ApiSubdomain}.{RootDomainName}. Avoids circular dependencies with the HTTP API resource.
  CadWebhookSecretSalt:
    Type: String
    Default: "change-me-cad-webhook-salt"
    NoEcho: true
    Description: >-
      Salt for verifying CAD inbound webhook signing secrets (HMAC storage). Override per environment; never reuse across tenants.
  CadWritebackEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, CAD write-back API accepts submissions (per-handler checks still apply).
  CadWritebackRequiresApproval:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, dispatcher write-backs require supervisor/admin approval before outbound vendor HTTP.
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
    Description: >-
      Optional agency SOP: target data lifecycle in days for transcript-style incident data (ops documentation).
      Exposed to all API Lambdas as TRANSCRIPT_RETENTION_POLICY_DAYS. The stack does not auto-delete rows by this value;
      use export and deletion workflows. Leave empty to omit.
  # --- CJIS / audit: platform-wide management API logging (infrastructure) ---
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, provisions multi-account-style audit logging: multi-Region trail, S3 (versioning, SSE, Object Lock, lifecycle
      to Glacier / Deep Archive), optional CloudWatch delivery, and SNS notifications. Set false in low-risk dev to reduce
      cost (not recommended for pilot/prod or CJIS-bound tenants).
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional KMS key ARN (or id) to encrypt CloudTrail log files in S3. Leave empty to use SSE-S3 on the log bucket. Use a
      customer-managed key when the security plan requires key rotation and stricter key policy.
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs S3 data-plane events for this stack's ASSETS bucket (higher cost and volume; enable when object access
      to assets must be provable in CloudTrail, e.g. investigations).
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs data-plane (Invoke) events for all Lambda functions in the stack region. Higher cost; use sparingly
      and prefer management events (default) unless Lambda invocation forensics is required.
  IncludeDataLayerNestedStack:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true (default), provisions nested stack-data-layer.yaml and wires AppSamStack from its outputs. When false,
      skips the nested data layer for legacy stacks whose DynamoDB tables and S3 buckets already live on the root stack
      with the same deterministic names as stack-data-layer (DynamoTableNamePrefix + slug + DeploymentStage; assets and
      billing buckets match stack-data-layer). You must supply FlatDataLayerBilling* secret ARNs (full Secrets Manager
      ARNs). Allowed only in dev; staging/pilot/prod must keep this true (see Rules).
  FlatDataLayerBillingPaymentInstructionsSecretArn:
    Type: String
    Default: ""
    Description: >-
      When IncludeDataLayerNestedStack is false (dev legacy): ARN of the existing billing payment-instructions secret.
      Ignored when the nested data layer is enabled. Required in dev when IncludeDataLayerNestedStack is false.
  FlatDataLayerBillingSesCredentialsSecretArn:
    Type: String
    Default: ""
    Description: >-
      When IncludeDataLayerNestedStack is false (dev legacy): ARN of the existing billing ses-credentials secret. Ignored
      when the nested data layer is enabled. Required in dev when IncludeDataLayerNestedStack is false.
  FlatDataLayerRingCredentialsSecretArn:
    Type: String
    Default: ""
    Description: >-
      When IncludeDataLayerNestedStack is false (dev legacy): full ARN of the existing Ring credentials secret
      (rapid-cortex/connect/ring-credentials-*). Ignored when the nested data layer is enabled.
  RingCredentialsSecretArnOverride:
    Type: String
    Default: "arn:aws:secretsmanager:us-east-1:158961537080:secret:rapid-cortex/connect/ring-credentials-D3f1sN"
    Description: >-
      When set, passes this ARN to AppSamStackV2 instead of the data-layer RingCredentialsSecret output
      (use for manually created rapid-cortex/connect/ring-credentials secrets).
  IncludeAppSamAlarmsNestedStack:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true (default), provisions nested stack-app-alarms.yaml and passes Lambda function names from AppSamStack outputs.
      Set false in dev when AppSamStack is stuck on an old template without newer outputs (e.g. QaHttpFunctionName) so the
      root stack can deploy an AppSam update first; CloudFormation will remove the alarms nested stack while this is false.
      Re-enable after AppSamStack publishes the required outputs. Staging/pilot/prod must remain true (see Rules).

Conditions:
  HasDataLayerNestedStack: !Equals [!Ref IncludeDataLayerNestedStack, "true"]
  HasAppSamAlarmsNestedStack: !Equals [!Ref IncludeAppSamAlarmsNestedStack, "true"]
  HasRingCredentialsSecretArnOverride: !Not [!Equals [!Ref RingCredentialsSecretArnOverride, ""]]
  PilotTestFeaturesOn:
    Fn::Or:
      - !Equals [!Ref PilotTestFeaturesEnabled, "true"]
      - Fn::And:
          - !Equals [!Ref PilotTestFeaturesEnabled, "auto"]
          - !Equals [!Ref DeploymentStage, "dev"]

# --- CJIS: fail fast when pilot/stage/prod use permissive CORS or secret IAM patterns ---
Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
        AssertDescription: >-
          For CJIS, HttpApiCorsAllowedOrigins must list explicit browser origins in staging/pilot/prod
          (wildcard CORS is dev-only).
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]
        AssertDescription: >-
          MultilingualSecretsPolicyMode `broad` is not allowed outside dev (CJIS least-privilege for Secrets Manager).
  NonDevRequiresNestedDataLayer:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Equals [!Ref IncludeDataLayerNestedStack, "true"]
        AssertDescription: >-
          IncludeDataLayerNestedStack must be true for staging, pilot, and prod (data layer must be the nested stack).
  NonDevRequiresAppSamAlarms:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Equals [!Ref IncludeAppSamAlarmsNestedStack, "true"]
        AssertDescription: >-
          IncludeAppSamAlarmsNestedStack must be true for staging, pilot, and prod (operational alarms must not be skipped).
  DevFlatDataLayerRequiresBillingSecretArns:
    RuleCondition: !And
      - !Equals [!Ref DeploymentStage, dev]
      - !Equals [!Ref IncludeDataLayerNestedStack, "false"]
    Assertions:
      - Assert: !Not [!Equals [!Ref FlatDataLayerBillingPaymentInstructionsSecretArn, ""]]
        AssertDescription: >-
          When IncludeDataLayerNestedStack is false in dev, set FlatDataLayerBillingPaymentInstructionsSecretArn to the
          full ARN of the existing billing payment-instructions secret.
      - Assert: !Not [!Equals [!Ref FlatDataLayerBillingSesCredentialsSecretArn, ""]]
        AssertDescription: >-
          When IncludeDataLayerNestedStack is false in dev, set FlatDataLayerBillingSesCredentialsSecretArn to the full
          ARN of the existing billing ses-credentials secret.

Resources:
  DataLayerStack:
    Type: AWS::CloudFormation::Stack
    Condition: HasDataLayerNestedStack
    Properties:
      TimeoutInMinutes: 120
      TemplateURL: nested/stack-data-layer.yaml
      Parameters:
        AdminCnameTarget: !Ref AdminCnameTarget
        AnthropicApiKeySecretArn: !Ref AnthropicApiKeySecretArn
        ApiDomainCertificateArn: !Ref ApiDomainCertificateArn
        AppCnameTarget: !Ref AppCnameTarget
        CloudTrailKmsKeyArn: !Ref CloudTrailKmsKeyArn
        CognitoAppClientName: !Ref CognitoAppClientName
        CognitoCallbackUrls: !Ref CognitoCallbackUrls
        CognitoDomainPrefix: !Ref CognitoDomainPrefix
        CognitoGenerateSecret: !Ref CognitoGenerateSecret
        CognitoLogoutUrls: !Ref CognitoLogoutUrls
        CognitoUserPoolName: !Ref CognitoUserPoolName
        DeploymentStage: !Ref DeploymentStage
        DynamoBillingMode: !Ref DynamoBillingMode
        DynamoPointInTimeRecovery: !Ref DynamoPointInTimeRecovery
        DynamoTableNamePrefix: !Ref DynamoTableNamePrefix
        EnableApiWaf: !Ref EnableApiWaf
        EnableCloudTrail: !Ref EnableCloudTrail
        EnableCloudTrailLambdaDataEvents: !Ref EnableCloudTrailLambdaDataEvents
        EnableCloudTrailS3DataEvents: !Ref EnableCloudTrailS3DataEvents
        EnableLiveVideoResources: !Ref EnableLiveVideoResources
        ExistingRingCredentialsSecretArn: !Ref RingCredentialsSecretArnOverride
        ExternalApiEncryptionKeyArn: !Ref ExternalApiEncryptionKeyArn
        ExternalApiJwtSecretArn: !Ref ExternalApiJwtSecretArn
        HttpApiCorsAllowedOrigins: !Ref HttpApiCorsAllowedOrigins
        IncidentMediaTwilioSecretArn: !Ref IncidentMediaTwilioSecretArn
        MultilingualSecretProvisioning: !Ref MultilingualSecretProvisioning
        MultilingualSecretsPolicyMode: !Ref MultilingualSecretsPolicyMode
        OpenAiApiKeySecretArn: !Ref OpenAiApiKeySecretArn
        Route53HostedZoneId: !Ref Route53HostedZoneId
        SesConfigurationSetName: !Ref SesConfigurationSetName
        SesIdentityType: !Ref SesIdentityType
        SesIdentityValue: !Ref SesIdentityValue
        SnsEmailSubscription: !Ref SnsEmailSubscription
        SnsSmsSubscription: !Ref SnsSmsSubscription
        WwwCnameTarget: !Ref WwwCnameTarget

  AppSamStackV2:
    Type: AWS::CloudFormation::Stack
    Properties:
      TimeoutInMinutes: 180
      TemplateURL: nested/stack-app-sam.yaml
      Parameters:
        AccessOverridesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AccessOverridesTable
            - !Sub "${DynamoTableNamePrefix}-access-overrides-${DeploymentStage}"
        AdminCnameTarget: !Ref AdminCnameTarget
        AgenciesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgenciesTable
            - !Sub "${DynamoTableNamePrefix}-agencies-${DeploymentStage}"
        AgencySharePartnersTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgencySharePartnersTable
            - !Sub "${DynamoTableNamePrefix}-agency-share-partners-${DeploymentStage}"
        AgencySubscriptionsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgencySubscriptionsTable
            - !Sub "${DynamoTableNamePrefix}-agency-subscriptions-${DeploymentStage}"
        AiBedrockFoundationModelId: !Ref AiBedrockFoundationModelId
        AnalysesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AnalysesTable
            - !Sub "${DynamoTableNamePrefix}-analyses-${DeploymentStage}"
        AnthropicApiKeySecretArn: !Ref AnthropicApiKeySecretArn
        ApiClientsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.ApiClientsTable
            - !Sub "${DynamoTableNamePrefix}-api-clients-${DeploymentStage}"
        ApiDomainCertificateArn: !Ref ApiDomainCertificateArn
        ApiSubdomainPrefix: !Ref ApiSubdomainPrefix
        AppCnameTarget: !Ref AppCnameTarget
        AppName: !Ref AppName
        AssetsBucket:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AssetsBucket
            - !Sub "${AppName}-assets-${DeploymentStage}-${AWS::AccountId}"
        AuditTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AuditTable
            - !Sub "${DynamoTableNamePrefix}-audit-${DeploymentStage}"
        AzureSpeechKeySecretArn: !Ref AzureSpeechKeySecretArn
        AzureTranslationKeySecretArn: !Ref AzureTranslationKeySecretArn
        BillingAuditEventsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingAuditEventsTable
            - !Sub "${DynamoTableNamePrefix}-billing-audit-events-${DeploymentStage}"
        BillingAuditLogTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingAuditLogTable
            - !Sub "${DynamoTableNamePrefix}-billing-audit-log-${DeploymentStage}"
        BillingInvoicesBucket:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingInvoicesBucket
            - !Sub "rapid-cortex-billing-invoices-${DeploymentStage}-${AWS::AccountId}"
        BillingPaymentInstructionsSecretArn:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingPaymentInstructionsSecretArn
            - !Ref FlatDataLayerBillingPaymentInstructionsSecretArn
        BillingPosBucket:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingPosBucket
            - !Sub "rapid-cortex-billing-pos-${DeploymentStage}-${AWS::AccountId}"
        BillingProfilesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingProfilesTable
            - !Sub "${DynamoTableNamePrefix}-billing-profiles-${DeploymentStage}"
        BillingSchedulesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingSchedulesTable
            - !Sub "${DynamoTableNamePrefix}-billing-schedules-${DeploymentStage}"
        BillingSesCredentialsSecretArn:
