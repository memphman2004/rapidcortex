AWSTemplateFormatVersion: "2010-09-09"
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3002
Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  ApiDomainCertificateArn:
    Type: String
    Default: ""
  Route53HostedZoneId:
    Type: String
    Default: ""
  AppCnameTarget:
    Type: String
    Default: ""
  AdminCnameTarget:
    Type: String
    Default: ""
  WwwCnameTarget:
    Type: String
    Default: ""
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
  GoogleCloudProjectId:
    Type: String
    Default: ""
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
  AppName:
    Type: String
    Default: rapid-cortex
  DynamoTableNamePrefix:
    Type: String
    Default: rapid-cortex
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
  CognitoUserPoolName:
    Type: String
    Default: ""
  CognitoAppClientName:
    Type: String
    Default: ""
  CognitoDomainPrefix:
    Type: String
    Default: ""
  CognitoCallbackUrls:
    Type: String
    Default: ""
  CognitoLogoutUrls:
    Type: String
    Default: ""
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  SnsEmailSubscription:
    Type: String
    Default: ""
  SnsSmsSubscription:
    Type: String
    Default: ""
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
  SesIdentityValue:
    Type: String
    Default: ""
  SesConfigurationSetName:
    Type: String
    Default: ""
  BillingSesSenderEmail:
    Type: String
    Default: ""
  BillingSesDomain:
    Type: String
    Default: ""
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
  CadWritebackEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  CadWritebackRequiresApproval:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  IncludeDataLayerNestedStack:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  FlatDataLayerBillingPaymentInstructionsSecretArn:
    Type: String
    Default: ""
  FlatDataLayerBillingSesCredentialsSecretArn:
    Type: String
    Default: ""
  ImportedCognitoUserPoolId:
    Type: String
  ImportedCognitoWebClientId:
    Type: String
  ImportedCognitoNativeClientId:
    Type: String
    Default: ""
  ImportedCognitoIssuer:
    Type: String
  ImportedCognitoHostedUiBase:
    Type: String
    Default: ""
  ImportedOpsAlertsTopicArn:
    Type: String
    Default: ""

Conditions:
  HasDataLayerNestedStack: !Equals [!Ref IncludeDataLayerNestedStack, "true"]
  HasImportedOpsAlertsTopicArn: !Not [!Equals [!Ref ImportedOpsAlertsTopicArn, ""]]

Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]
  NonDevRequiresNestedDataLayer:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Equals [!Ref IncludeDataLayerNestedStack, "true"]
  DevFlatDataLayerRequiresBillingSecretArns:
    RuleCondition: !And
      - !Equals [!Ref DeploymentStage, dev]
      - !Equals [!Ref IncludeDataLayerNestedStack, "false"]
    Assertions:
      - Assert: !Not [!Equals [!Ref FlatDataLayerBillingPaymentInstructionsSecretArn, ""]]
      - Assert: !Not [!Equals [!Ref FlatDataLayerBillingSesCredentialsSecretArn, ""]]

Resources:
  DataLayerStack:
    Type: AWS::CloudFormation::Stack
    Condition: HasDataLayerNestedStack
    Properties:
      TimeoutInMinutes: 120
      TemplateURL: nested/stack-data-layer.yaml
      Parameters:
        AdminCnameTarget: !Ref AdminCnameTarget
        AnthropicApiKeySecretArn: !Ref AnthropicApiKeySecretArn
        ApiDomainCertificateArn: !Ref ApiDomainCertificateArn
        AppCnameTarget: !Ref AppCnameTarget
        CloudTrailKmsKeyArn: !Ref CloudTrailKmsKeyArn
        CognitoAppClientName: !Ref CognitoAppClientName
        CognitoCallbackUrls: !Ref CognitoCallbackUrls
        CognitoDomainPrefix: !Ref CognitoDomainPrefix
        CognitoGenerateSecret: !Ref CognitoGenerateSecret
        CognitoLogoutUrls: !Ref CognitoLogoutUrls
        CognitoUserPoolName: !Ref CognitoUserPoolName
        DeploymentStage: !Ref DeploymentStage
        DynamoBillingMode: !Ref DynamoBillingMode
        DynamoPointInTimeRecovery: !Ref DynamoPointInTimeRecovery
        DynamoTableNamePrefix: !Ref DynamoTableNamePrefix
        EnableApiWaf: !Ref EnableApiWaf
        EnableCloudTrail: !Ref EnableCloudTrail
        EnableCloudTrailLambdaDataEvents: !Ref EnableCloudTrailLambdaDataEvents
        EnableCloudTrailS3DataEvents: !Ref EnableCloudTrailS3DataEvents
        EnableLiveVideoResources: !Ref EnableLiveVideoResources
        ExternalApiEncryptionKeyArn: !Ref ExternalApiEncryptionKeyArn
        ExternalApiJwtSecretArn: !Ref ExternalApiJwtSecretArn
        HttpApiCorsAllowedOrigins: !Ref HttpApiCorsAllowedOrigins
        IncidentMediaTwilioSecretArn: !Ref IncidentMediaTwilioSecretArn
        MultilingualSecretProvisioning: !Ref MultilingualSecretProvisioning
        MultilingualSecretsPolicyMode: !Ref MultilingualSecretsPolicyMode
        OpenAiApiKeySecretArn: !Ref OpenAiApiKeySecretArn
        Route53HostedZoneId: !Ref Route53HostedZoneId
        SesConfigurationSetName: !Ref SesConfigurationSetName
        SesIdentityType: !Ref SesIdentityType
        SesIdentityValue: !Ref SesIdentityValue
        SnsEmailSubscription: !Ref SnsEmailSubscription
        SnsSmsSubscription: !Ref SnsSmsSubscription
        WwwCnameTarget: !Ref WwwCnameTarget
  AppSamStack2:
