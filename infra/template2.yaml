    Properties:
      TimeoutInMinutes: 180
      TemplateURL: nested/stack-app-sam-2.yaml
      Parameters:
        AccessOverridesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AccessOverridesTable
            - !Sub "${DynamoTableNamePrefix}-access-overrides-${DeploymentStage}"
