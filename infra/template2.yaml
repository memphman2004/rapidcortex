            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgenciesTable
            - !Sub "${DynamoTableNamePrefix}-agencies-${DeploymentStage}"
        IncidentTimelineTable: !Sub "rapid-cortex-incident-timeline-${DeploymentStage}"
        ManagedPolicyNamePrefix: !Ref AWS::StackName

  AppSamDeceptionStack2:
    Type: AWS::CloudFormation::Stack
    DependsOn: AppSamStack2
    Properties:
      TimeoutInMinutes: 60
      TemplateURL: nested/stack-app-sam-2-deception.yaml
      Parameters:
        DeploymentStage: !Ref DeploymentStage
        HttpApiId: !GetAtt AppSamStack2.Outputs.HttpApiId
        DeceptionEventsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.DeceptionEventsTable
            - !Sub "${DynamoTableNamePrefix}-deception-events-${DeploymentStage}"
        OpsAlertsTopicArn:
          Fn::If:
            - HasImportedOpsAlertsTopicArn
            - !Ref ImportedOpsAlertsTopicArn
            - !GetAtt AppSamStack2.Outputs.OpsAlertsTopicArn
        ManagedPolicyNamePrefix: !Ref AWS::StackName

  AppSamRealtimeStack2:
    Type: AWS::CloudFormation::Stack
    Properties:
      TimeoutInMinutes: 60
      TemplateURL: nested/stack-app-sam-2-realtime.yaml
      Parameters:
        DeploymentStage: !Ref DeploymentStage
        HttpApiId: !GetAtt AppSamStack2.Outputs.HttpApiId
        ImportedCognitoUserPoolId: !Ref ImportedCognitoUserPoolId
        ImportedCognitoWebClientId: !Ref ImportedCognitoWebClientId
        ImportedCognitoIssuer: !Ref ImportedCognitoIssuer
        ActiveCallsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.ActiveCallsTable
            - !Sub "${DynamoTableNamePrefix}-active-calls-${DeploymentStage}"
        CallTransfersTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.CallTransfersTable
            - !Sub "${DynamoTableNamePrefix}-call-transfers-${DeploymentStage}"
        WebSocketConnectionsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.WebSocketConnectionsTable
            - !Sub "${DynamoTableNamePrefix}-websocket-connections-${DeploymentStage}"
        AuditTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AuditTable
            - !Sub "${DynamoTableNamePrefix}-audit-${DeploymentStage}"
        AgenciesTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.AgenciesTable
            - !Sub "${DynamoTableNamePrefix}-agencies-${DeploymentStage}"
        ManagedPolicyNamePrefix: !Ref AWS::StackName

  AppSamAlarmsStack2:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: nested/stack-app-alarms-2.yaml
      Parameters:
        OpsAlertsTopicArn: !GetAtt AppSamStack2.Outputs.OpsAlertsTopicArn
        HttpApiId: !GetAtt AppSamStack2.Outputs.HttpApiId
        ListWellnessFlagsFunctionName: !GetAtt AppSamStack2.Outputs.ListWellnessFlagsFunctionName
        AcknowledgeTraumaFlagFunctionName: !GetAtt AppSamStack2.Outputs.AcknowledgeTraumaFlagFunctionName
        GetCallerCardFunctionName: !GetAtt AppSamStack2.Outputs.GetCallerCardFunctionName
        CreatePremiseNoteFunctionName: !GetAtt AppSamStack2.Outputs.CreatePremiseNoteFunctionName
        PatchPremiseNoteFunctionName: !GetAtt AppSamStack2.Outputs.PatchPremiseNoteFunctionName

Outputs:
  HttpApiUrl:
    Value: !GetAtt AppSamStack2.Outputs.HttpApiUrl
  UserPoolId:
    Value: !Ref ImportedCognitoUserPoolId
  UserPoolClientId:
    Value: !Ref ImportedCognitoWebClientId
  NativeUserPoolClientId:
    Value: !Ref ImportedCognitoNativeClientId
  AssetsBucketName:
    Value:
      Fn::If:
        - HasDataLayerNestedStack
        - !GetAtt DataLayerStack.Outputs.AssetsBucket
        - !Sub "${AppName}-assets-${DeploymentStage}-${AWS::AccountId}"
  ApiCustomDomainUrl:
    Value: !GetAtt AppSamStack2.Outputs.ApiCustomDomainUrl
  CognitoIssuer:
    Value: !Ref ImportedCognitoIssuer
  CognitoHostedUiBase:
    Value: !Ref ImportedCognitoHostedUiBase
  ApiWebAclArn:
    Value: !GetAtt AppSamStack2.Outputs.ApiWebAclArn
  HospitalCapacityTableName:
    Value: !GetAtt AppSamHospitalStack2.Outputs.HospitalCapacityTableName
  HospitalProfilesTableName:
    Value: !GetAtt AppSamHospitalStack2.Outputs.HospitalProfilesTableName
  DeploymentStage:
    Value: !Ref DeploymentStage
  WebSocketApiUrl:
    Description: WebSocket URL for real-time call control (wss)
    Value: !GetAtt AppSamRealtimeStack2.Outputs.WebSocketApiUrl
  WebSocketApiId:
    Value: !GetAtt AppSamRealtimeStack2.Outputs.WebSocketApiId
