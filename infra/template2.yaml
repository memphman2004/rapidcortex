        BillingSesSenderEmail: !Ref BillingSesSenderEmail
        BillingWebhookEventsTable:
          Fn::If:
            - HasDataLayerNestedStack
            - !GetAtt DataLayerStack.Outputs.BillingWebhookEventsTable
            - !Sub "${DynamoTableNamePrefix}-billing-webhook-events-${DeploymentStage}"
        CadIntegrationsTable:
