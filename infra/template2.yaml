            - !GetAtt DataLayerStack.Outputs.AuditTable
            - !Sub "${DynamoTableNamePrefix}-audit-${DeploymentStage}"
        AzureSpeechKeySecretArn: !Ref AzureSpeechKeySecretArn
        AzureTranslationKeySecretArn: !Ref AzureTranslationKeySecretArn
        BillingAuditEventsTable:
