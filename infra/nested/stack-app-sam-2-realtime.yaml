AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Rapid Cortex — WebSocket API + call control HTTP routes (attach to stack 2 HttpApi)

Parameters:
  DeploymentStage:
    Type: String
    AllowedValues: [dev, staging, prod, pilot]
  HttpApiId:
    Type: String
  ActiveCallsTable:
    Type: String
  CallTransfersTable:
    Type: String
  WebSocketConnectionsTable:
    Type: String
  AuditTable:
    Type: String
  AgenciesTable:
    Type: String
  ImportedCognitoUserPoolId:
    Type: String
  ImportedCognitoWebClientId:
    Type: String
  ImportedCognitoIssuer:
    Type: String
  ManagedPolicyNamePrefix:
    Type: String
    Default: rapid-cortex

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DEPLOYMENT_STAGE: !Ref DeploymentStage
        ALLOW_UNAUTHENTICATED_API: "false"
        ACTIVE_CALLS_TABLE: !Ref ActiveCallsTable
        CALL_TRANSFERS_TABLE: !Ref CallTransfersTable
        WEBSOCKET_CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
        AUDIT_TABLE: !Ref AuditTable
        AGENCIES_TABLE: !Ref AgenciesTable
        COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
        COGNITO_REGION: !Ref AWS::Region

Resources:
  AppManagedPolicyRealtimeDynamo:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ManagedPolicyNamePrefix}-sam2-realtime-ddb-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: RealtimeTablesCrud
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:DescribeTable
              - dynamodb:ConditionCheckItem
            Resource:
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ActiveCallsTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ActiveCallsTable}/index/*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CallTransfersTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CallTransfersTable}/index/*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${WebSocketConnectionsTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${WebSocketConnectionsTable}/index/*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}/index/*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}/index/*

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "rapid-cortex-websocket-${DeploymentStage}"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
      Description: Real-time call control notifications

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref DeploymentStage
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 5000
        ThrottlingRateLimit: 10000

  AppManagedPolicyWebSocketManageConnections:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ManagedPolicyNamePrefix}-sam2-ws-manage-conn-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: WebSocketPostToConnection
            Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${DeploymentStage}/POST/@connections/*

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/websocket/connect.handler
      Timeout: 10
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo

  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketConnectIntegration}

  WebSocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/websocket/disconnect.handler
      Timeout: 10
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketDisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDisconnectFunction.Arn}/invocations

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketDisconnectIntegration}

  WebSocketDefaultFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/websocket/default.handler
      Timeout: 10

  WebSocketDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketDefaultFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  WebSocketDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketDefaultFunction.Arn}/invocations

  WebSocketDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketDefaultIntegration}

  SupervisorListActiveCallsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/supervisorListActiveCalls.handler
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo

  SupervisorTransferCallFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/supervisorTransferCall.handler
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentStage}
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo
        - !Ref AppManagedPolicyWebSocketManageConnections

  SupervisorTakeoverCallFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/supervisorTakeoverCall.handler
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentStage}
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo
        - !Ref AppManagedPolicyWebSocketManageConnections

  DispatcherListActiveCallsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/dispatcherListActiveCalls.handler
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo

  DispatcherAcceptTransferFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/dispatcherAcceptTransfer.handler
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentStage}
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo
        - !Ref AppManagedPolicyWebSocketManageConnections

  DispatcherDeclineTransferFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/call-control/dispatcherDeclineTransfer.handler
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentStage}
      Policies:
        - !Ref AppManagedPolicyRealtimeDynamo
        - !Ref AppManagedPolicyWebSocketManageConnections

  SupervisorListActiveCallsHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SupervisorListActiveCallsFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  SupervisorTransferCallHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SupervisorTransferCallFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  SupervisorTakeoverCallHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SupervisorTakeoverCallFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  DispatcherListActiveCallsHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DispatcherListActiveCallsFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  DispatcherAcceptTransferHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DispatcherAcceptTransferFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  DispatcherDeclineTransferHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DispatcherDeclineTransferFunction.Arn}/invocations
      PayloadFormatVersion: "2.0"

  SupervisorListActiveCallsHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SupervisorListActiveCallsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  SupervisorTransferCallHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SupervisorTransferCallFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  SupervisorTakeoverCallHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SupervisorTakeoverCallFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  DispatcherListActiveCallsHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DispatcherListActiveCallsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  DispatcherAcceptTransferHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DispatcherAcceptTransferFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  DispatcherDeclineTransferHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DispatcherDeclineTransferFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*

  RouteSupervisorListActiveCalls:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "GET /api/supervisor/active-calls"
      Target: !Sub "integrations/${SupervisorListActiveCallsHttpIntegration}"

  RouteSupervisorTransferCall:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "POST /api/supervisor/transfer-call"
      Target: !Sub "integrations/${SupervisorTransferCallHttpIntegration}"

  RouteSupervisorTakeoverCall:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "POST /api/supervisor/takeover-call"
      Target: !Sub "integrations/${SupervisorTakeoverCallHttpIntegration}"

  RouteDispatcherListActiveCalls:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "GET /api/dispatcher/active-calls"
      Target: !Sub "integrations/${DispatcherListActiveCallsHttpIntegration}"

  RouteDispatcherAcceptTransfer:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "POST /api/dispatcher/accept-transfer"
      Target: !Sub "integrations/${DispatcherAcceptTransferHttpIntegration}"

  RouteDispatcherDeclineTransfer:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApiId
      RouteKey: "POST /api/dispatcher/decline-transfer"
      Target: !Sub "integrations/${DispatcherDeclineTransferHttpIntegration}"

Outputs:
  WebSocketApiUrl:
    Description: WebSocket URL for real-time call control (wss)
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentStage}
  WebSocketApiId:
    Value: !Ref WebSocketApi
