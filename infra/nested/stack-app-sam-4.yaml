    Type: String
    Description: Physical DynamoDB table name from data layer (AccessOverridesTable).
  NetworkEmergencyOverridesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (network emergency overrides).
  ApiClientsTable:
