  VenueConfigTable:
    Type: String
    Default: ""
    Description: Venue config DynamoDB table (event schedules, SMS incidents).
  CampusIncidentsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for campus incidents.
  CampusConfigTable:
    Type: String
