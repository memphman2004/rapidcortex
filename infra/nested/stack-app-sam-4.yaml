AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  Rapid Cortex API. IAM: SAM built-in DynamoDB/S3 policies scope to named tables/buckets; explicit Statement blocks
  use least-privilege actions, ARNs for Bedrock foundation models (AiBedrockFoundationModelId + QaBedrockModelId),
  stack Secrets prefix rapidcortex/<stage>/*, and regional Conditions where AWS control-plane APIs require Resource=*.
  Verify with npm run validate:iam and sam validate --lint.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028
        - W8001
        - W7001
  # Overrides **only** keys that exist in Globals (see Globals.Function.Environment.Variables) — no extra key names
  # (adding unused keys inflates the UpdateFunctionConfiguration request and can hit the 5KB API limit).
  TranscriptChunkLambdasGlobalsSlimYamlAnchorHolder: &TRANSCRIPT_CHUNK_GLOBALS_SLIM_OVERRIDES
    WEBHOOKS_TABLE: ""
    API_CLIENTS_TABLE: ""
    EXTERNAL_API_RATE_LIMITS_TABLE: ""
    RC_LITE_ENABLED: ""
    RC_LITE_API_KEYS_TABLE: ""
    RC_LITE_RATE_LIMIT_TABLE: ""
    RC_LITE_USAGE_TABLE: ""
    SEO_INTELLIGENCE_TABLE: ""
    SEO_TOOL_ENABLED: "false"
    SEO_AUTO_SCAN_ENABLED: ""
    SEO_AI_SUGGESTIONS_ENABLED: "false"
    DECEPTION_EVENTS_TABLE: ""
    DECEPTION_SHIELD_ENABLED: ""
    DECEPTION_AUTO_BLOCK_ENABLED: ""
    DECEPTION_ALERTS_ENABLED: "false"
    CAD_WRITEBACK_ENABLED: ""
    CAD_WRITEBACK_REQUIRES_APPROVAL: ""
    CAD_WRITEBACK_AUDIT_TABLE: ""
    OPS_ALERTS_TOPIC_ARN: ""
    DECEPTION_SLACK_WEBHOOK_URL: ""
    EXTERNAL_API_JWT_SECRET_ARN: ""
    EXTERNAL_API_ENCRYPTION_KEY_ARN: ""
    PASSWORD_MAX_AGE_DAYS: ""
    PASSWORD_EXPIRY_GRACE_DAYS: ""
    PASSWORD_CHANGE_REQUIRED_ON_FIRST_LOGIN: ""
    OPENAI_API_KEY_SECRET_ARN: ""
    ANTHROPIC_API_KEY_SECRET_ARN: ""
    AUTO_ANALYZE_EVERY_N_SEGMENTS: ""
    ALLOW_UNAUTHENTICATED_API: ""
    APPROVED_CORS_ORIGINS: ""
    ENABLE_QA_SCORING: ""
    ENABLE_QA_SCORE_AFTER_ANALYSIS: ""
    QA_SESSIONS_TABLE: ""
    QA_TEMPLATES_TABLE: ""
    QA_SCORING_MOCK: ""
    QA_BEDROCK_MODEL_ID: ""
    ENABLE_INCIDENT_MEDIA: ""
    INCIDENT_MEDIA_TABLE: ""
    INCIDENT_MEDIA_PUBLIC_BASE_URL: ""
    INCIDENT_MEDIA_TOKEN_TTL_MINUTES: ""
    INCIDENT_MEDIA_UPLOAD_URL_TTL_SECONDS: ""
    INCIDENT_MEDIA_MAX_UPLOAD_BYTES: ""
    MEDIA_UPLOAD_TOKEN_TTL_SECONDS: ""
    ENABLE_NON_EMERGENCY_TRIAGE: ""
    AI_ENABLE_FALLBACKS: ""
    AI_STORE_PROVIDER_METADATA: ""
    AI_PROMPT_VERSION: ""
    AI_REQUEST_TIMEOUT_MS: ""
    AI_MAX_RETRIES_PER_PROVIDER: ""
    AI_ANALYSIS_DEBOUNCE_SECONDS: ""
    AI_MAX_ANALYZE_REQUESTS_PER_INCIDENT_PER_HOUR: ""
    AI_SKIP_IF_TRANSCRIPT_UNCHANGED: ""
    AI_ANALYSIS_IN_FLIGHT_LEASE_SECONDS: ""

  # SQS workers / minimal CAD ingress: inherit Globals but blank unused keys (4KB Lambda env limit).
  AppSam1HeavyLambdasGlobalsSlimYamlAnchorHolder: &APP_SAM1_HEAVY_LAMBDAS_GLOBALS_SLIM_OVERRIDES
    <<: *TRANSCRIPT_CHUNK_GLOBALS_SLIM_OVERRIDES
    ACCESS_OVERRIDES_TABLE: ""
    AGENCY_SHARE_PARTNERS_TABLE: ""
    BEDROCK_REGION: ""
    COGNITO_CLIENT_ID: ""
    COGNITO_REGION: ""
    COGNITO_USER_POOL_ID: ""
    DATA_DELETION_AUDIT_TABLE: ""
    DISPATCHER_COACHING_NOTES_TABLE: ""
    INCIDENT_SHARES_TABLE: ""
    INCIDENT_TIMELINE_TABLE: ""
    INTEGRATION_TRANSCRIPT_AGENCY_ALLOWLIST: ""
    INTEGRATION_TRANSCRIPT_CONNECTOR_MODE: ""
    LANGUAGE_PROVIDER: ""
    LANGUAGE_SESSIONS_TABLE: ""
    PREMISE_NOTES_TABLE: ""
    TRANSCRIPT_RETENTION_POLICY_DAYS: ""
    TRAUMA_FLAGS_TABLE: ""

Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  ApiDomainCertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN in the same region as this stack (API Gateway regional custom domain).
      Leave empty and set Route53HostedZoneId to have the stack request and validate a cert in ACM via DNS.
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: >-
      Public Route 53 hosted zone ID for RootDomainName (e.g. Z123...). When set and ApiDomainCertificateArn is empty,
      the stack creates an ACM certificate for api.<root-domain> and writes DNS validation records automatically.
  AppCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for app.<root-domain> (e.g. CloudFront domain).
  AdminCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for admin.<root-domain>.
  WwwCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for www.<root-domain>.
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for OpenAI (plain string or JSON with apiKey).
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for Anthropic (plain string or JSON with apiKey).
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Speech key (plain string or JSON with AZURE_SPEECH_KEY).
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Translator key (defaults to speech secret when empty).
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN holding Google service account JSON for STT/Translate.
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Agency API (`/api/v1`) JWT signing key (plain UTF-8 string, min 32 chars).
      When empty, lambdas must receive EXTERNAL_API_JWT_SECRET through a secure deployment path (not plaintext in template).
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for webhook signing-secret encryption passphrase (plain UTF-8 string, min 16 chars).
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
    Description: >-
      managed: create stack-owned Secrets Manager secrets (placeholder values) under rapidcortex/<DeploymentStage>/multilingual/* and wire Lambdas to them.
      external: use the Azure/Google secret ARN parameters only (leave managed secrets unused).
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
    Description: >-
      scoped: GetSecretValue limited to rapidcortex/<DeploymentStage>/multilingual* plus any explicitly passed external ARNs (when non-empty).
      broad: GetSecretValue allowed for all secrets in this account/region (legacy compatibility).
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
    Description: >-
      custom:agencyId written by the PostConfirmation trigger for self-registered users (after email
      verification). Create a matching agency row in DynamoDB or override this to an existing agency id.
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
    Description: custom:role written by PostConfirmation when the user has no role yet.
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for automated QA structured JSON scoring (InvokeModel / Converse).
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for analysis / language paths that call Bedrock (InvokeModel / Converse).
      IAM and Globals BEDROCK_MODEL_* must match runtime configuration (CJIS: no foundation-model/* wildcard).
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Twilio JSON: preferred shape accountSid + apiKeySid + apiKeySecret +
      messagingServiceSid; legacy accountSid + authToken + fromE164 (optional messagingServiceSid).
      Leave empty when using AWS-only SMS_PROVIDER or mock/simulator paths.
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
    Description: >-
      Comma-separated browser origins for the HttpApi CORS AllowOrigins list. Use * for local/dev.
      For staging/production set explicitly, e.g. https://www.rapidcortex.us,https://www.example.org
  GoogleCloudProjectId:
    Type: String
    Default: ""
    Description: >-
      Google Cloud project id for server-side Translation / Text-to-Speech (text workflows). Required when
      LANGUAGE_PROVIDER=google or for auto with Google credentials.
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
    Description: Text translation + optional TTS for silent text (complements per-tier voice STT/translate env).
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
    Description: Optional S3 bucket for Google TTS objects; when empty, ASSETS_BUCKET is used.
  # --- Deploy-time naming & optional integrations (see scripts/deploy-from-env.sh) ---
  AppName:
    Type: String
    Default: rapid-cortex
    Description: Short prefix for S3, SNS, Cognito names, and default Dynamo table prefix slug.
  Sam4ManagedPolicyNamePrefix:
    Type: String
    Default: ""
    Description: Parent stack name prefix for IAM managed policies (stack 4).

  DynamoTableNamePrefix:
    Type: String
    Default: ""
    Description: >-
      When set, all DynamoDB tables use TableName: <prefix>-<table>-<DeploymentStage> (uniquely names tables per env).
      When empty, CloudFormation generates table names (legacy behavior).
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: PITR on DynamoDB. auto = on for staging/prod/pilot, off for dev (matches previous template).
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
    Description: Reserved for future provisioned mode; use PAY_PER_REQUEST.
  CognitoAppClientName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-web-{DeploymentStage}.
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: >-
      Hosted UI domain prefix (per account+region). When empty, uses legacy default rapidcortex-{DeploymentStage}-{AccountId} (keeps prior stack behavior); set explicitly to match AppName or a custom prefix.
  CognitoCallbackUrls:
    Type: String
    Default: ""
    Description: Comma-separated OAuth callback URLs for the app client (optional; for hosted UI).
  CognitoLogoutUrls:
    Type: String
    Default: ""
    Description: Comma-separated sign-out URLs (optional; for hosted UI).
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
    Description: >-
      Comma-separated OAuth callback URLs for the **native** app client (PKCE, no secret). Append your HTTPS
      `https://{web-host}/auth/return-to-app` URL here when using the browser return-to-app handoff.
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
    Description: Comma-separated sign-out URLs for the native app client (must match logout_uri used by native apps).
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true for confidential server-side clients; web SPAs use false.
  # Globals cannot use !Ref CognitoUserPool / CognitoUserPoolClient (those create a cycle with
  # CognitoPostConfirmationFunction, which the pool references). Real IDs come from stack outputs for the web app.
  CognitoUserPoolIdPlaceholder:
    Type: String
    Default: "unused-placeholder"
    Description: >-
      Passed to Globals only; avoids circular dependency with CognitoUserPool. Lambda functions that need pool ID use
      !Ref CognitoUserPool where valid, or callers use stack Outputs.
  CognitoClientIdPlaceholder:
    Type: String
    Default: "unused-placeholder"
    Description: >-
      Passed to Globals only; avoids circular dependency with CognitoUserPoolClient. Real client id is exported as an output.
  # --- Imported from primary SAM stack (AppSamStackV2); deploy stack 1 first ---
  ImportedCognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID from AppSamStackV2.
  ImportedCognitoWebClientId:
    Type: String
    Description: Cognito web app client ID from AppSamStackV2.
  ImportedCognitoNativeClientId:
    Type: String
    Default: ""
    Description: Cognito native client ID (PKCE); optional.
  ImportedCognitoIssuer:
    Type: String
    Description: JWT issuer URL for HttpApi authorizer.

  SnsEmailSubscription:
    Type: String
    Default: ""
    Description: Optional email for AWS::SNS::Subscription on the ops topic.
  SnsSmsSubscription:
    Type: String
    Default: ""
    Description: Optional E.164 phone for AWS::SNS::Subscription (SMS) on the ops topic; region/account must allow SMS.
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
    Description: When SesIdentityValue is set, type of Amazon SES identity to register. Leave all SES params empty to skip.
  SesIdentityValue:
    Type: String
    Default: ""
    Description: Email address (sesIdentityType=email) or domain (sesIdentityType=domain) for AWS::SES::EmailIdentity.
  SesConfigurationSetName:
    Type: String
    Default: ""
    Description: Optional SES configuration set to associate with the identity.
  BillingSesSenderEmail:
    Type: String
    Default: ""
    Description: Sender email to verify for billing notifications. Leave blank with BillingSesDomain to skip billing SES identities.
  BillingSesDomain:
    Type: String
    Default: ""
    Description: Domain to verify in SES for billing email (DKIM/SPF/DMARC). Leave blank with BillingSesSenderEmail to skip billing SES identities.
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true to deploy live-video KVS functions/routes. Default false keeps core API leaner.
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, deploys a regional AWS WAF web ACL (managed rules + per-IP rate limit) and associates it
      with the API Gateway HTTP API $default stage. Enable for pilot/production edge protection (additional cost).
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
    Description: >-
      WAF rate-based rule: max requests per 5-minute evaluation window per source IP. Tune with agency traffic; API Gateway
      throttling (DefaultRouteSettings) also applies.
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
    Description: >-
      Optional agency SOP: target data lifecycle in days for transcript-style incident data (ops documentation).
      Exposed to all API Lambdas as TRANSCRIPT_RETENTION_POLICY_DAYS. The stack does not auto-delete rows by this value;
      use export and deletion workflows. Leave empty to omit.
  # --- CJIS / audit: platform-wide management API logging (infrastructure) ---
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, provisions multi-account-style audit logging: multi-Region trail, S3 (versioning, SSE, Object Lock, lifecycle
      to Glacier / Deep Archive), optional CloudWatch delivery, and SNS notifications. Set false in low-risk dev to reduce
      cost (not recommended for pilot/prod or CJIS-bound tenants).
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional KMS key ARN (or id) to encrypt CloudTrail log files in S3. Leave empty to use SSE-S3 on the log bucket. Use a
      customer-managed key when the security plan requires key rotation and stricter key policy.
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs S3 data-plane events for this stack's ASSETS bucket (higher cost and volume; enable when object access
      to assets must be provable in CloudTrail, e.g. investigations).
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs data-plane (Invoke) events for all Lambda functions in the stack region. Higher cost; use sparingly
      and prefer management events (default) unless Lambda invocation forensics is required.

# --- CJIS: fail fast when pilot/stage/prod use permissive CORS or secret IAM patterns ---
  AgenciesTable:
