  RingConnectRequestCameraAccessFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/integrations/ring/request-camera-access.handler
      Timeout: 60
      Environment:
        Variables:
          RC_RUNTIME_CONFIG_JSON: ""
          RING_CREDENTIALS_SECRET_ARN: !Ref RingCredentialsSecretArn
          RING_PARTNERSHIP_ENABLED: !Ref RingPartnershipEnabled
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
          ENABLE_CONNECT_RING: !Ref EnableConnectRing
          ENABLE_CONNECT_RING_EMERGENCY_REQUESTS: !Ref EnableConnectRingEmergencyRequests
          RING_PUBLIC_API_BASE_URL: !Ref RingPublicApiBaseUrl
          RING_TABLE_DEVICES: !If
            - HasRingDevicesTable
            - !Ref RingDevicesTable
            - !Sub "RapidCortexRingDevices-${DeploymentStage}"
          RING_TABLE_REQUESTS: !If
            - HasRingRequestsTable
            - !Ref RingRequestsTable
            - !Sub "RingEmergencyCameraRequests-${DeploymentStage}"
          VENUE_CONFIG_TABLE: !If
            - HasVenueConfigTable
            - !Ref VenueConfigTable
            - !Ref AWS::NoValue
          INCIDENT_MEDIA_TWILIO_SECRET_ARN: !Ref IncidentMediaTwilioSecretArn
          SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsProvider]
          SMS_PRIMARY_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsPrimaryProvider]
          MOCK_SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
          AWS_SMS_USE_SIMULATOR: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, AwsSmsUseSimulator]
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - Statement:
            Sid: RingOwnerCognitoLookup
            Effect: Allow
            Action:
              - cognito-idp:AdminGetUser
              - cognito-idp:ListUsers
            Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ImportedCognitoUserPoolId}"
        - Statement:
            Sid: SnsPublishToPhoneNumbersRingOwnerNotify
            Effect: Allow
            Action: sns:Publish
            Resource: "*"
            Condition:
              StringEquals:
                "sns:Type": "Transactional"
        - !If
          - HasIncidentMediaTwilioSecretArn
          - Statement:
              Sid: ReadTwilioSecretRingOwnerNotify
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref IncidentMediaTwilioSecretArn
          - !Ref AWS::NoValue
        - Statement:
            Sid: SesRingOwnerNotifyFromSupportIdentity
            Effect: Allow
            Action:
              - ses:SendEmail
            Resource:
              - !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/support@rapidcortex.us
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/integrations/ring/request-camera-access
            Method: POST

  Sam4RingKvsBrowserTokenRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              StringLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*RingConnect*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*sam4*Ring*"
      Policies:
        - PolicyName: Sam4RingKvsDataPlane
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: KvsDataPlane
                Effect: Allow
                Action:
                  - kinesisvideo:ConnectAsMaster
                  - kinesisvideo:ConnectAsViewer
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"

