  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref ImportedCognitoIssuer
              audience:
                - !Ref ImportedCognitoWebClientId
                - !Ref ImportedCognitoNativeClientId

  # Regional WAF in front of the HTTP API (API Gateway stage association). Complements stage throttling; does not replace it.
  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: HasApiWaf
    Properties:
      Name: !Sub "${AppName}-httpapi4-waf-${DeploymentStage}"
      Description: Managed rules + per-IP rate limit for Rapid Cortex API Gateway
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AppName}ApiWaf"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafCommon"
            SampledRequestsEnabled: true
        - Name: AWSManagedBadInputs
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafBadInputs"
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRep"
            SampledRequestsEnabled: true
        - Name: PerIpRateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
