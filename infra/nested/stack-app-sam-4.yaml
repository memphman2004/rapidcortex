  AgencyNetworkPolicySyncTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AppName} agency network policy sync (${DeploymentStage})"

  AgencyNetworkPolicyHttpFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
      CodeUri: ../../apps/api/
      Handler: dist/handlers/admin/agencyNetworkPolicyHttp.handler
      Timeout: 30
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicySesBillingSenderIdentityEmails
        - Statement:
            Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref AgencyNetworkPolicySyncTopic

      Events:
        AgencyNetworkPolicyCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/agency/network-policy-check
            Method: GET
        AgencyEmergencyOverrideRequest:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/agency/emergency-override-request
            Method: POST
        AdminNetworkPolicyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy
            Method: GET
        AdminNetworkPolicyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy
            Method: PATCH
        AdminNetworkPolicyCidrPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy/cidrs
            Method: POST
        AdminNetworkPolicyCidrDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy/cidrs
            Method: DELETE
        AdminNetworkPolicyEmergency:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy/emergency-override
            Method: POST
        AdminNetworkPolicyAudit:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/agencies/{agencyId}/network-policy/audit
            Method: GET

  WafNetworkPolicySyncFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
      CodeUri: ../../apps/api/
      Handler: dist/workers/waf-network-policy-sync.handler
      Timeout: 60
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !If
          - HasApiWaf
          - Statement:
              Effect: Allow
              Action:
                - wafv2:CreateIPSet
                - wafv2:UpdateIPSet
                - wafv2:GetIPSet
                - wafv2:GetWebACL
                - wafv2:UpdateWebACL
                - wafv2:ListIPSets
              Resource:
                - !Sub "arn:${AWS::Partition}:wafv2:${AWS::Region}:${AWS::AccountId}:regional/ipset/*"
                - !GetAtt ApiWebAcl.Arn
          - !Ref AWS::NoValue
      Events:
        NetworkPolicySync:
          Type: SNS
          Properties:
            Topic: !Ref AgencyNetworkPolicySyncTopic

  BillingSchedulerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
      CodeUri: ../../apps/api/
      Handler: dist/handlers/billingScheduler.handler
      Timeout: 300
      MemorySize: 512
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud
        - !Ref AppManagedPolicySesBillingSenderIdentityEmails

      Events:
        DailyBillingScheduler:
          Type: Schedule
          Properties:
            Name: !Sub "sam4-daily-billing-scheduler-${DeploymentStage}"
            Schedule: cron(0 8 * * ? *)
            Description: "Runs billing schedules, reminders, and overdue updates daily at 08:00 UTC."
            Enabled: true

  BillingPaymentsDisabledCatchAllFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
      CodeUri: ../../apps/api/
      Handler: dist/handlers/billingPaymentsDisabledGateway.handler
      Policies:
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud

      Events:
        LegacyPaymentsHooks:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/billing/legacy-webhooks/{proxy+}
            Method: ANY


Outputs:
  OpsAlertsTopicArn:
    Description: SNS topic ARN for CloudWatch alarm notifications (stack 4 billing/ring).
    Value: !Ref OpsAlertsTopic
  HttpApiUrl:
    Description: HTTP API base URL (stack 4)
    Value: !GetAtt Api.ApiEndpoint
  HttpApiId:
    Description: HTTP API ID (stack 4)
    Value: !Ref Api
  ApiWebAclArn:
    Condition: HasApiWaf
    Description: Regional WAF web ACL attached to stack 4 HTTP API.
    Value: !GetAtt ApiWebAcl.Arn
  ApiCustomDomainUrl:
    Condition: HasApiCustomDomainCert
    Description: Stack 4 API custom domain URL.
    Value: !Sub "https://${ApiSubdomainPrefix}.${RootDomainName}"
  ApiTlsCertificateArn:
    Condition: HasApiCustomDomainCert
    Description: ACM certificate ARN for stack 4 API custom domain.
    Value: !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate]
