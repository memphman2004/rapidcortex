            PilotEnableQaScoring: !If [PilotTestFeaturesOn, "true", "false"]
            PilotEnableQaAfterAnalysis: !If [PilotTestFeaturesOn, "true", "false"]
            PilotQaScoringMock: !If [PilotTestFeaturesOn, "true", "false"]
            PilotEnableIncidentMedia: !If [PilotTestFeaturesOn, "true", "false"]
            PilotEnableNonEmergencyTriage: !If [PilotTestFeaturesOn, "true", "false"]
            PilotDeceptionShield: !If [PilotTestFeaturesOn, "true", "false"]
            TranscriptRetentionPolicyDays: !Ref TranscriptRetentionPolicyDays
            TranscriptsTable: !Ref TranscriptsTable
            TraumaFlagsTable: !Ref TraumaFlagsTable
            WafArn: !If [HasApiWaf, !GetAtt ApiWebAcl.Arn, ""]
            WebhooksTable: !Ref WebhooksTable

Resources:
  AppManagedPolicyDynamoLambdaCrudShardA:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${Sam4ManagedPolicyNamePrefix}-sam4-lambda-ddb-crud-${DeploymentStage}-a"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DynamoApplicationShardA
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:DescribeTable
              - dynamodb:ConditionCheckItem
            Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${NetworkEmergencyOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${NetworkEmergencyOverridesTable}/index/*
