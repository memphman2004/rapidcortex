    Description: Physical DynamoDB table name from data layer (UsageMetersTable).
  MonetizationInvoicesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (MonetizationInvoicesTable).
  BillingAuditEventsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingAuditEventsTable).
  SalesLeadsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (SalesLeadsTable).
  SeoIntelligenceTable:
    Type: String
