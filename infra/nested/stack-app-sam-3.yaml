            Auth:
              Authorizer: NONE
        PostConsent:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/video-assist/t/{token}/consent
            Method: POST
            Auth:
              Authorizer: NONE
        PostSignal:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/video-assist/t/{token}/signal
            Method: POST
            Auth:
              Authorizer: NONE
        PostEnd:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/video-assist/t/{token}/end
            Method: POST
            Auth:
              Authorizer: NONE

