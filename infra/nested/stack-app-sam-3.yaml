      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LiveVideoPublicHttpFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

