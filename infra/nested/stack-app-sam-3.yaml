  LiveVideoIncidentsHttpErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateLiveVideoResources
    Properties:
      AlarmActions:
        - !Ref OpsAlertsTopic
      AlarmDescription: Live video authenticated routes errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LiveVideoIncidentsHttpFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LiveVideoPublicHttpErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateLiveVideoResources
    Properties:
      AlarmActions:
