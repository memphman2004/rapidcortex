  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref ImportedCognitoIssuer
              audience:
                - !Ref ImportedCognitoWebClientId
                - !Ref ImportedCognitoNativeClientId

  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: HasApiWaf
    Properties:
      Name: !Sub "${AppName}-httpapi3-waf-${DeploymentStage}"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AppName}ApiWaf"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafCommon"
            SampledRequestsEnabled: true
        - Name: AWSManagedBadInputs
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafBadInputs"
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRep"
            SampledRequestsEnabled: true
        - Name: PerIpRateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRate"
            SampledRequestsEnabled: true

  ApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: HasApiWaf
    Properties:
      WebACLArn: !GetAtt ApiWebAcl.Arn
      ResourceArn: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}::/apis/${ApiId}/stages/${StageName}"
        - ApiId: !Ref Api
          StageName: "$default"

  ApiManagedCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: UseApiManagedCertificate
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
          HostedZoneId: !Ref Route53HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: UseApiCustomDomain
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      DomainNameConfigurations:
        - CertificateArn: !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate]
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiCustomDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: UseApiCustomDomain
    Properties:
      ApiId: !Ref Api
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      Stage: "$default"

  ApiDomainDnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: UseApiCustomDomain
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  ApiDomainDnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: UseApiCustomDomain
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

