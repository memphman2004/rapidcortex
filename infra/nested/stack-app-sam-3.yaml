    Condition: CreateLiveVideoResources
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              StringLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*LiveVideo*HttpFunctionRole*"
      Policies:
        - PolicyName: KvsWebrtcDataPlane
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: KvsDataPlane
                Effect: Allow
                Action:
                  - kinesisvideo:ConnectAsMaster
                  - kinesisvideo:ConnectAsViewer
                  - kinesisvideo:JoinStorageSession
                  - kinesisvideo:JoinStorageSessionAsViewer
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"
              - Sid: KvsMappedStreamRead
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeMappedResourceConfiguration
                Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*/*"

  LiveVideoIncidentsHttpLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateLiveVideoResources
    Properties:
      LogGroupName: !Sub /aws/lambda/${LiveVideoIncidentsHttpFunction}
      RetentionInDays: 30

  LiveVideoIncidentsHttpFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Condition: CreateLiveVideoResources
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/media/liveVideoIncidentHttp.handler
      Environment:
        Variables:
          ENABLE_LIVE_VIDEO: "true"
          LIVE_VIDEO_SESSIONS_TABLE: !Ref LiveVideoSessionsTable
          LIVE_VIDEO_SESSION_TTL_SECONDS: "1800"
          LIVE_VIDEO_MAX_DURATION_SECONDS: "900"
          LIVE_VIDEO_HEARTBEAT_TIMEOUT_SECONDS: "45"
          LIVE_VIDEO_PUBLIC_BASE_URL: "https://www.rapidcortex.us"
          LIVE_VIDEO_KVS_TOKEN_ROLE_ARN: !GetAtt KvsWebRtcBrowserTokenRole.Arn
          LIVE_VIDEO_STORAGE_MODE: kvs
          WEBRTC_TURN_SECRET_ARN: ""
          LIVE_VIDEO_KVS_DATA_RETENTION_HOURS: "24"
          LIVE_VIDEO_KVS_STORAGE_ATTACH_TO_CHANNEL: "false"
          KVS_WEBRTC_TAG_APP: !Ref AppName
          KVS_WEBRTC_TAG_ENV: !Ref DeploymentStage
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - Statement:
            Effect: Allow
            Action: sts:AssumeRole
            Resource: !GetAtt KvsWebRtcBrowserTokenRole.Arn
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:CreateSignalingChannel
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:DeleteSignalingChannel
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:JoinStorageSession
              - kinesisvideo:JoinStorageSessionAsViewer
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:GetIceServerConfig
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:DescribeMappedResourceConfiguration
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*/*"
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:CreateStream
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:DeleteStream
              - kinesisvideo:DescribeStream
              - kinesisvideo:GetDataEndpoint
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*/*"
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:GetHLSStreamingSessionURL
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*/*"
        - Statement:
            Effect: Allow
            Action:
              - kinesisvideo:UpdateMediaStorageConfiguration
              - kinesisvideo:DescribeMediaStorageConfiguration
            Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"
        - !Ref AppManagedPolicyOpsAlertsSnsPublishOnly
        - Statement:
            Effect: Allow
            Action:
              - sms-voice:DescribeAccountAttributes
              - sms-voice:DescribePools
              - sms-voice:DescribeConfigurationSets
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Fn::If:
            - HasIncidentMediaTwilioSecretArn
            - Statement:
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IncidentMediaTwilioSecretArn
            - !Ref AWS::NoValue
      Events:
        RequestLiveVideo:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video/request
            Method: POST
        GetLiveVideo:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video
            Method: GET
        JoinLiveVideoIncident:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video/join
            Method: POST
        GetLiveVideoPlayback:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video/playback
            Method: GET
        EndLiveVideo:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video/end
            Method: POST
        DispatcherHeartbeatLiveVideo:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/live-video/heartbeat
            Method: POST

