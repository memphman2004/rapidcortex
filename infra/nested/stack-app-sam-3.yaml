AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028
        - W8001
        - W7001

Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  # Existing dev tables (created outside this nested stack); reference by name only.
  AgencyReportsTable:
    Type: String
    Default: rapid-cortex-agency-reports-dev
  CoachingNotesTable:
    Type: String
    Default: rapid-cortex-coaching-notes-dev
  IncidentTimelineTable:
    Type: String
    Default: rapid-cortex-incident-timeline-dev
  PostIncidentReviewsTable:
    Type: String
    Default: rapid-cortex-post-incident-reviews-dev
  QaScorecardsTable:
    Type: String
    Default: rapid-cortex-qa-scorecards-dev
  SlaBacklogSnapshotsTable:
    Type: String
    Default: rapid-cortex-sla-backlog-snapshots-dev
  StakeholderPagesTable:
    Type: String
    Default: rapid-cortex-stakeholder-pages-dev
  WarRoomMessagesTable:
    Type: String
    Default: rapid-cortex-war-room-messages-dev
  WarRoomsTable:
    Type: String
    Default: rapid-cortex-war-rooms-dev

  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  CreateApiCustomDomain:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ApiDomainCertificateArn:
    Type: String
    Default: ""
  Route53HostedZoneId:
    Type: String
    Default: ""
  AppCnameTarget:
    Type: String
    Default: ""
  AdminCnameTarget:
    Type: String
    Default: ""
  WwwCnameTarget:
    Type: String
    Default: ""
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
  GoogleCloudProjectId:
    Type: String
    Default: ""
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
  AppName:
    Type: String
    Default: rapid-cortex
  Sam3ManagedPolicyNamePrefix:
    Type: String
    Default: rapid-cortex
  DynamoTableNamePrefix:
    Type: String
    Default: ""
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
  CognitoUserPoolName:
    Type: String
    Default: ""
  CognitoAppClientName:
    Type: String
    Default: ""
  CognitoDomainPrefix:
    Type: String
    Default: ""
  CognitoCallbackUrls:
    Type: String
    Default: ""
  CognitoLogoutUrls:
    Type: String
    Default: ""
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ImportedCognitoUserPoolId:
    Type: String
  ImportedCognitoWebClientId:
    Type: String
  ImportedCognitoNativeClientId:
    Type: String
    Default: ""
  ImportedCognitoIssuer:
    Type: String

  SnsEmailSubscription:
    Type: String
    Default: ""
  SnsSmsSubscription:
    Type: String
    Default: ""
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
  SesIdentityValue:
    Type: String
    Default: ""
  SesConfigurationSetName:
    Type: String
    Default: ""
  BillingSesSenderEmail:
    Type: String
    Default: support@appsondemand.net
  BillingSesDomain:
    Type: String
    Default: rapidcortex.us
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  AgenciesTable:
    Type: String
  InvitesTable:
    Type: String
  AccessOverridesTable:
    Type: String
  NetworkEmergencyOverridesTable:
    Type: String
  ApiClientsTable:
    Type: String
  WebhooksTable:
    Type: String
  ExternalApiRateLimitsTable:
    Type: String
  BillingProfilesTable:
    Type: String
  BillingWebhookEventsTable:
    Type: String
  MonetizationPlansTable:
    Type: String
  MonetizationAddOnsTable:
    Type: String
  AgencySubscriptionsTable:
    Type: String
  UsageMetersTable:
    Type: String
  MonetizationInvoicesTable:
    Type: String
  BillingAuditEventsTable:
    Type: String
  DeceptionEventsTable:
    Type: String
  SalesLeadsTable:
    Type: String
  CustomersTable:
    Type: String
  ServiceCatalogTable:
    Type: String
  InvoicesTable:
    Type: String
  InvoiceItemsTable:
    Type: String
  BillingSchedulesTable:
    Type: String
  PaymentRecordsTable:
    Type: String
  BillingAuditLogTable:
    Type: String
  IncidentsTable:
    Type: String
  CadIntegrationsTable:
    Type: String
  CadWritebackAuditTable:
    Type: String
    Default: ""
  CadWritebackEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  CadWritebackRequiresApproval:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  TranscriptsTable:
    Type: String
  LanguageSessionsTable:
    Type: String
  VideoAssistSessionsTable:
    Type: String
  LiveVideoSessionsTable:
    Type: String
  SilentTextSessionsTable:
    Type: String
  PinpointLinksTable:
    Type: String
  SurgeClustersTable:
    Type: String
  AnalysesTable:
    Type: String
  TraumaFlagsTable:
    Type: String
  PremiseNotesTable:
    Type: String
  PlatformNoticesTable:
    Type: String
    Default: ""
  PlatformNoticeAcksTable:
    Type: String
    Default: ""
  DispatcherCoachingNotesTable:
    Type: String
  AgencySharePartnersTable:
    Type: String
  IncidentSharesTable:
    Type: String
  AuditTable:
    Type: String
  DataDeletionAuditTable:
    Type: String
  QASessionsTable:
    Type: String
  QATemplatesTable:
    Type: String
  IncidentMediaTable:
    Type: String
  AssetsBucket:
    Type: String
  BillingInvoicesBucket:
    Type: String
  BillingPosBucket:
    Type: String
  NestedMultilingualAzureApiKeysSecretArn:
    Type: String
    Default: ""
  NestedMultilingualGoogleServiceAccountSecretArn:
    Type: String
    Default: ""
  BillingPaymentInstructionsSecretArn:
    Type: String
  BillingSesCredentialsSecretArn:
    Type: String
  RcLiteApiKeysTable:
    Type: String
  RcLiteRateLimitTable:
    Type: String
  RcLiteUsageTable:
    Type: String
  PendingProvisionsTable:
    Type: String
    Default: ""
  AdobeSignCredentialsSecretArn:
    Type: String
    Default: ""
  AdobeSignWebhookEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  AdobeSignMock:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ImportedOpsAlertsTopicArn:
    Type: String
    Default: ""

Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]

Conditions:
  ShouldCreateApiCustomDomain: !Equals [!Ref CreateApiCustomDomain, "true"]
  HasImportedApiCert: !Not [!Equals [!Ref ApiDomainCertificateArn, ""]]
  HasManagedApiCert:
    Fn::And:
      - !Equals [!Ref ApiDomainCertificateArn, ""]
      - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  HasApiCustomDomainCert: !Or [!Condition HasImportedApiCert, !Condition HasManagedApiCert]
  UseApiCustomDomain:
    Fn::And:
      - !Condition ShouldCreateApiCustomDomain
      - !Condition HasApiCustomDomainCert
  UseApiManagedCertificate:
    Fn::And:
      - !Condition ShouldCreateApiCustomDomain
      - !Condition HasManagedApiCert
  HasAppCnameTarget: !Not [!Equals [!Ref AppCnameTarget, ""]]
  HasAdminCnameTarget: !Not [!Equals [!Ref AdminCnameTarget, ""]]
  HasWwwCnameTarget: !Not [!Equals [!Ref WwwCnameTarget, ""]]
  HasPlatformNoticesTable: !Not [!Equals [!Ref PlatformNoticesTable, ""]]
  UseManagedMultilingualSecrets: !Equals [!Ref MultilingualSecretProvisioning, "managed"]
  MultilingualSecretsBroadPolicy: !Equals [!Ref MultilingualSecretsPolicyMode, "broad"]
  EnablePilotGradeBackups:
    Fn::Or:
      - Fn::Equals:
          - !Ref DeploymentStage
          - staging
      - Fn::Equals:
          - !Ref DeploymentStage
          - prod
      - Fn::Equals:
          - !Ref DeploymentStage
          - pilot
  HasIncidentMediaTwilioSecretArn: !Not [!Equals [!Ref IncidentMediaTwilioSecretArn, ""]]
  HasExternalApiJwtSecretArn: !Not [!Equals [!Ref ExternalApiJwtSecretArn, ""]]
  HasExternalApiEncryptionKeyArn: !Not [!Equals [!Ref ExternalApiEncryptionKeyArn, ""]]
  HasDynamoTablePrefix: !Not [!Equals [!Ref DynamoTableNamePrefix, ""]]
  DynamoPitrOn:
    Fn::Or:
      - Fn::And:
          - !Equals [!Ref DynamoPointInTimeRecovery, "auto"]
          - !Condition EnablePilotGradeBackups
      - !Equals [!Ref DynamoPointInTimeRecovery, "true"]
  HasCognitoUserPoolNameParam: !Not [!Equals [!Ref CognitoUserPoolName, ""]]
  HasCognitoAppClientNameParam: !Not [!Equals [!Ref CognitoAppClientName, ""]]
  HasCognitoDomainPrefixParam: !Not [!Equals [!Ref CognitoDomainPrefix, ""]]
  HasCognitoCallbackUrls: !Not [!Equals [!Ref CognitoCallbackUrls, ""]]
  HasCognitoLogoutUrls: !Not [!Equals [!Ref CognitoLogoutUrls, ""]]
  CognitoClientUsesSecret: !Equals [!Ref CognitoGenerateSecret, "true"]
  HasSnsEmailSubscription: !Not [!Equals [!Ref SnsEmailSubscription, ""]]
  HasSnsSmsSubscription: !Not [!Equals [!Ref SnsSmsSubscription, ""]]
  HasImportedOpsAlertsTopicArn: !Not [!Equals [!Ref ImportedOpsAlertsTopicArn, ""]]
  CreateSesIdentity:
    Fn::And:
      - !Not [!Equals [!Ref SesIdentityValue, ""]]
      - !Not [!Equals [!Ref SesIdentityType, ""]]
  HasSesConfigurationSet: !Not [!Equals [!Ref SesConfigurationSetName, ""]]
  HasRoute53HostedZone: !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  CreateLiveVideoResources: !Equals [!Ref EnableLiveVideoResources, "true"]
  HasApiWaf: !Equals [!Ref EnableApiWaf, "true"]
  CloudTrailEnabled: !Equals [!Ref EnableCloudTrail, "true"]
  CloudTrailS3DataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailS3DataEvents, "true"]
  CloudTrailLambdaDataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailLambdaDataEvents, "true"]
  CloudTrailS3AndLambdaDataEvents: !And
    - !Condition CloudTrailS3DataEvents
    - !Condition CloudTrailLambdaDataEvents
  CloudTrailS3DataOnly: !And
    - !Condition CloudTrailS3DataEvents
    - !Not [!Condition CloudTrailLambdaDataEvents]
  CloudTrailLambdaDataOnly: !And
    - !Condition CloudTrailLambdaDataEvents
    - !Not [!Condition CloudTrailS3DataEvents]
  HasCloudTrailKms: !Not [!Equals [!Ref CloudTrailKmsKeyArn, ""]]
  HasOpenAiApiKeySecretArn: !Not [!Equals [!Ref OpenAiApiKeySecretArn, ""]]
  HasAnthropicApiKeySecretArn: !Not [!Equals [!Ref AnthropicApiKeySecretArn, ""]]

Mappings:
  MultilingualStageDefaults:
    dev:
      StrictValidation: "false"
    staging:
      StrictValidation: "true"
    prod:
      StrictValidation: "true"
    pilot:
      StrictValidation: "true"
  ApiLambdaDefaults:
    dev:
      PrimaryAi: mock
      SecondaryAi: mock
      TertiaryAi: "off"
      AiFallback: mock
      AiSecondaryFallback: mock
      Lid1: mock
      Lid2: mock
      Lid3: "off"
      # STT chain enabled on dev 2026-05-26 (per Jeff) to verify OpenAI Whisper
      # end-to-end (matches stack-app-sam.yaml). Azure Speech (primary) and
      # OpenAI Whisper (secondary) cost real $ on every audio chunk; AWS
      # Transcribe is the tertiary fallback.
      # multilingualConfig normalizeVendorKind accepts: azure, openai, aws,
      # mock, off (azure-speech / openai-whisper / aws-transcribe are NOT
      # valid short forms).
      Stt1: "azure"
      Stt2: "openai"
      Stt3: "aws"
      # Translation chain still on mock for dev (Deploy #6 = STT verification
      # only). Deploy #7 will flip to Tr1=azure / Tr2=google / Tr3=aws across
      # all stages. NOTE: bare YAML "off" is parsed as boolean false, so quote
      # it as "off" — otherwise CFN deploys TERTIARY_TRANSLATION_PROVIDER="false".
      Tr1: "mock"
      Tr2: "mock"
      Tr3: "off"
    staging:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
    prod:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
    pilot:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
  SmsEnvironmentDefaults:
    dev:
      SmsProvider: mock
      SmsPrimaryProvider: twilio
      MockSmsProvider: "true"
      AwsSmsUseSimulator: "true"
    staging:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    prod:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    pilot:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        RC_RUNTIME_CONFIG_JSON: !Sub
          - '{"ds":"${DeploymentStage}","trp":"${TranscriptRetentionPolicyDays}","it":"${IncidentsTable}","tt":"${TranscriptsTable}","at":"${AnalysesTable}","aud":"${AuditTable}","dda":"${DataDeletionAuditTable}","drp":"cjis-default-v1","ag":"${AgenciesTable}","iv":"${InvitesTable}","ao":"${AccessOverridesTable}","neo":"${NetworkEmergencyOverridesTable}","ac":"${ApiClientsTable}","wh":"${WebhooksTable}","erl":"${ExternalApiRateLimitsTable}","det":"${DeceptionEventsTable}","dse":"false","dae":"false","dal":"true","ops":"${OpsAlertsTopic}","pma":"60","peg":"0","pcf":"true","ab":"${AssetsBucket}","ls":"${LanguageSessionsTable}","aef":"true","asm":"true","apv":"dispatch-triage-v1","art":"55000","amr":"1","adb":"0","amh":"120","asu":"true","ail":"90","oa":"${OpenAiApiKeySecretArn}","aa":"${AnthropicApiKeySecretArn}","aas":"0","aua":"false","aco":"${HttpApiCorsAllowedOrigins}","br":"${AWSRegion}","eim":"false","imt":"${IncidentMediaTable}","imp":"","imn":"120","imu":"900","imx":"52428800","ent":"false","tft":"${TraumaFlagsTable}","pn":"${PremiseNotesTable}","dcn":"${DispatcherCoachingNotesTable}","itl":"${IncidentTimelineTable}","ish":"${IncidentSharesTable}","asp":"${AgencySharePartnersTable}","lp":"${LanguageProvider}","cpu":"${ImportedCognitoUserPoolId}","cc":"${ImportedCognitoWebClientId}","cr":"${AWSRegion}","cwe":"${CadWritebackEnabled}","cwr":"${CadWritebackRequiresApproval}","cwa":"${CadWritebackAuditTable}","bp":"${BillingProfilesTable}","inv":"${InvoicesTable}","ii":"${InvoiceItemsTable}","bae":"${BillingAuditEventsTable}","mao":"${MonetizationAddOnsTable}","minv":"${MonetizationInvoicesTable}","slt":"${SalesLeadsTable}"}'
          -
            AWSRegion: !Ref AWS::Region
        DEPLOYMENT_STAGE: !Ref DeploymentStage
        DEFAULT_RETENTION_POLICY_ID: cjis-default-v1
        NETWORK_ACCESS_ENFORCEMENT: "false"
        PASSWORD_MAX_AGE_DAYS: "60"
        PASSWORD_EXPIRY_GRACE_DAYS: "0"
        PASSWORD_CHANGE_REQUIRED: "true"
        PASSWORD_CHANGE_REQUIRED_ON_FIRST_LOGIN: "true"
        ALLOW_UNAUTHENTICATED_API: "false"
        APPROVED_CORS_ORIGINS: !Ref HttpApiCorsAllowedOrigins
        LANGUAGE_PROVIDER: !Ref LanguageProvider
        SUPPORTED_CALL_LANGUAGES: "en,es,zh,tl,vi,ar,fr,ko,ru,pt"
        COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
        COGNITO_REGION: !Ref AWS::Region

Resources:
  AppManagedPolicyDynamoLambdaCrudShardA:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${Sam3ManagedPolicyNamePrefix}-sam3-lambda-ddb-crud-${DeploymentStage}-a"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DynamoApplicationShardA
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:DescribeTable
              - dynamodb:ConditionCheckItem
            Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${NetworkEmergencyOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${NetworkEmergencyOverridesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgencySharePartnersTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgencySharePartnersTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgencySubscriptionsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgencySubscriptionsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AnalysesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AnalysesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ApiClientsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ApiClientsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingAuditEventsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingAuditEventsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingAuditLogTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingAuditLogTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingProfilesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingProfilesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingSchedulesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingSchedulesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingWebhookEventsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BillingWebhookEventsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CustomersTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CustomersTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DataDeletionAuditTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DataDeletionAuditTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DeceptionEventsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DeceptionEventsTable}/index/*
