    Properties:
      GroupName: commsupervisor
      Description: Agency communications supervisors.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupDispatcher:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: dispatcher
      Description: Agency-scoped dispatch operators.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAnalyst:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: analyst
      Description: Analyst role.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAuditor:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: auditor
      Description: Read-only auditor.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupHospitalAdmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: hospitaladmin
      Description: Hospital facility administrator (capacity, analytics, staff invites).
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupHospitalStaff:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: hospitalstaff
      Description: Hospital staff (live capacity and diversion updates).
      UserPoolId: !Ref CognitoUserPool

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
              audience:
                - !Ref CognitoUserPoolClient
                - !Ref CognitoNativeUserPoolClient

  # Regional WAF in front of the HTTP API (API Gateway stage association). Complements stage throttling; does not replace it.
  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: HasApiWaf
    Properties:
      Name: !Sub "${AppName}-httpapi-waf-${DeploymentStage}"
      Description: Managed rules + per-IP rate limit for Rapid Cortex API Gateway
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AppName}ApiWaf"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedCommon
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafCommon"
            SampledRequestsEnabled: true
        - Name: AWSManagedBadInputs
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafBadInputs"
            SampledRequestsEnabled: true
        - Name: AWSManagedIpReputation
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRep"
            SampledRequestsEnabled: true
        - Name: PerIpRateLimit
          Priority: 3
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AppName}WafIpRate"
            SampledRequestsEnabled: true

  ApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: HasApiWaf
    Properties:
      WebACLArn: !GetAtt ApiWebAcl.Arn
      ResourceArn: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}::/apis/${ApiId}/stages/${StageName}"
        - ApiId: !Ref Api
          StageName: "$default"

  ApiManagedCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasManagedApiCert
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
          HostedZoneId: !Ref Route53HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasApiCustomDomainCert
    Properties:
      DomainName: !Sub "${ApiSubdomainPrefix}.${RootDomainName}"
      DomainNameConfigurations:
        - CertificateArn: !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate]
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiCustomDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasApiCustomDomainCert
    Properties:
      ApiId: !Ref Api
      DomainName: !Ref ApiCustomDomain
      Stage: !Ref ApiApiGatewayDefaultStage

  ApiDomainDnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomainCert
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  ApiDomainDnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomainCert
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "${ApiSubdomainPrefix}.${RootDomainName}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  AppCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasAppCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "app.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref AppCnameTarget

  AdminCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasAdminCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "admin.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref AdminCnameTarget

  WwwCnameRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasWwwCnameTarget
    Properties:
      HostedZoneName: !Sub "${RootDomainName}."
      Name: !Sub "www.${RootDomainName}."
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !Ref WwwCnameTarget

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
      CodeUri: ../../apps/api/
      Handler: dist/handlers/health.handler
      Policies:
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud

      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/health
            Method: GET
            Auth:
              Authorizer: NONE

  PostContactSalesLeadFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
      CodeUri: ../../apps/api/
      Handler: dist/handlers/postContactSalesLead.handler
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - Statement:
            Sid: SnsPublishOpsAlertsTopic
            Effect: Allow
            Action:
              - sns:Publish
            Resource: !GetAtt OpsAlertsTopic.TopicArn
        - Statement:
