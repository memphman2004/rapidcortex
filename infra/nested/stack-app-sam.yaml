            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Fn::If:
            - HasIncidentMediaTwilioSecretArn
            - Statement:
                Sid: ReadTwilioSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IncidentMediaTwilioSecretArn
            - !Ref AWS::NoValue
      Events:
        PostPinpointLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/pinpoint/links
            Method: POST
        ListPinpointLinks:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
