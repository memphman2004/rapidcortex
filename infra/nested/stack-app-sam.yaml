  PostIncidentAudioChunkFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/postIncidentAudioChunk.handler
      Timeout: 120
      MemorySize: 768
      Environment:
        Variables:
          # 4KB Lambda env-var limit recovery (CFN UPDATE_FAILED 2026-05-26).
          # Globals inject RC_RUNTIME_CONFIG_JSON (~2.2 KB) which hydrates INCIDENTS_TABLE,
          # TRANSCRIPTS_TABLE, AUDIT_TABLE, LANGUAGE_SESSIONS_TABLE, ASSETS_BUCKET,
          # COGNITO_REGION (cr), OPENAI secret ARN (oa), etc. at cold start via
          # apps/api/src/lib/hydrateLambdaEnv.ts. Only vars *not* in that hydrated set
          # live here. Removed from this Lambda (copy-paste bloat):
          #   - AWS_TRANSCRIBE_* (5 vars): aws/transcribeLanguageMapping.ts provides
          #     DEFAULT_AWS_TRANSCRIBE_LANGUAGE_OPTIONS_CSV; other knobs default in
          #     multilingualConfig.ts.
          #   - BEDROCK_MODEL_*: analysis runs in AnalyzeIncidentFunction; aas=0 disables
          #     inline analysis here.
          #   - GOOGLE_TTS_*: TTS only in silent-text TTS batch handler.
          #   - GOOGLE_CLOUD_PROJECT_ID / GOOGLE_APPLICATION_CREDENTIALS_SECRET_ARN /
          #     AZURE_TRANSLATION_KEY_SECRET_ARN: not in any current Tr1/Tr2/Tr3 chain
          #     (Deploy #6: dev=mock/mock/off, staging/prod/pilot=aws/mock/off).
          #     Re-add in Deploy #7 when Tr flips to azure/google/aws — the audio chunk
          #     pipeline then calls TranscriptService.add → buildTranslationProviderChain
          #     and GoogleTranslationProvider.translate() needs Google creds.
          #     AZURE_TRANSLATION_KEY_SECRET_ARN is also unneeded today: the Azure
          #     Translator path falls back to AZURE_SPEECH_KEY_SECRET_ARN at runtime
          #     (see runtimeSecrets.ts preferredField=azureTranslationKey on the shared
          #     rapid-cortex/multilingual/azure-keys secret).
          #   - SILENT_TEXT_* / PINPOINT_* / ENABLE_*: belong to dedicated handlers.
          #   - OPENAI_API_KEY_SECRET_ARN / OPENAI_WHISPER_MODEL: hydrated from
          #     RC_RUNTIME_CONFIG_JSON.oa + multilingualConfig default ("whisper-1").
          # KEPT: Cognito ID/client are required by apps/api/src/lib/auth.ts
          # verifyBearerToken() to validate JWT (issuer + audience). Without them every
          # request returns 401.
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          MULTILINGUAL_STRICT_VALIDATION: !FindInMap [MultilingualStageDefaults, !Ref DeploymentStage, StrictValidation]
          PRIMARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt1]
          SECONDARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt2]
          TERTIARY_STT_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Stt3]
          PRIMARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid1]
          SECONDARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid2]
          TERTIARY_LANGUAGE_DETECTOR: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Lid3]
          PRIMARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr1]
          SECONDARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr2]
          TERTIARY_TRANSLATION_PROVIDER: !FindInMap [ApiLambdaDefaults, !Ref DeploymentStage, Tr3]
          GOOGLE_TRANSLATE_LOCATION: "global"
          AZURE_SPEECH_KEY_SECRET_ARN: !If [UseManagedMultilingualSecrets, !Ref NestedMultilingualAzureApiKeysSecretArn, !Ref AzureSpeechKeySecretArn]
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud
        - !Ref AppManagedPolicyComprehendTranslateRegionalDetect
        - !Ref AppManagedPolicySecretsMultilingualScopedRead
        - !Ref AppManagedPolicySecretsAnalyzeProvidersRead
        - !Ref AppManagedPolicyBedrockAiAndQaFoundationModels
        - !Ref AppManagedPolicyTranscribeIncidentAudioJobsReadWrite
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/audio-chunks
            Method: POST

