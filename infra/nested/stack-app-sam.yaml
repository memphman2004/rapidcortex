    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-cph-tr-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ComprehendDominantLanguageRegional
            Effect: Allow
            Action:
              - comprehend:DetectDominantLanguage
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
          - Sid: TranslateTextRegional
            Effect: Allow
            Action:
              - translate:TranslateText
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

  AppManagedPolicyRingConnectSecrets:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-ring-secrets-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: RingConnectTokenSecrets
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
              - secretsmanager:UpdateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:TagResource
            Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${RingSecretsPrefix}/*
          - Sid: RingCredentialsRead
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapid-cortex/connect/ring-credentials-*
              - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapid-cortex/connect/ring-credentials-D3f1sN
              - !If
                - HasRingCredentialsSecretArn
                - !Ref RingCredentialsSecretArn
                - !Ref AWS::NoValue

  AppManagedPolicyOpsAlertsSnsPublishOnly:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-sns-ops-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublishOpsAlertsTopicOnly
            Effect: Allow
            Action:
              - sns:Publish
            Resource: !GetAtt OpsAlertsTopic.TopicArn

  AppManagedPolicyCadWebhookSnsPublishOnly:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-sns-cad-webhook-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublishCadWebhookSnsTopicsOnly
            Effect: Allow
            Action:
              - sns:Publish
            Resource:
              - !Ref CadWebhookProcessingTopic
              - !Ref CadWebhookIngressTopic

  AppManagedPolicySesBillingSenderIdentityEmails:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-ses-billing-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - !If
            - CreateBillingSesIdentities
            - Sid: SesSendFromBillingVerifiedIdentity
              Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendTemplatedEmail
              Resource:
                - !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${BillingSesSenderEmail}
            - Sid: SesBillingIdentitiesSkippedPlaceholder
              Effect: Allow
              Action: sts:GetCallerIdentity
              Resource: "*"

  AppManagedPolicyTranscribeIncidentAudioJobsReadWrite:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-lambda-trscribe-${DeploymentStage}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: TranscribeRegionalJobsScoped
            Effect: Allow
            Action:
              - transcribe:StartTranscriptionJob
              - transcribe:GetTranscriptionJob
              - transcribe:DeleteTranscriptionJob
            Resource: !Sub arn:${AWS::Partition}:transcribe:${AWS::Region}:${AWS::AccountId}:transcription-job/*

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    # Ignore Globals.Function.Environment — exceeds Lambda's 4KB limit; Cognito handler only reads signup defaults below.
    IgnoreGlobals: "*"
    Properties:
      Description: >-
        Cognito PostConfirmation: seeds custom:agencyId and custom:role for self-service sign-ups
        so ID tokens satisfy the API until an admin updates the user.
      Handler: handler.handler
      Runtime: nodejs20.x
      CodeUri: ../cognito-post-confirmation/
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          SELF_SIGNUP_DEFAULT_AGENCY_ID: !Ref SelfSignupDefaultAgencyId
          SELF_SIGNUP_DEFAULT_ROLE: !Ref SelfSignupDefaultRole
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminUpdateUserAttributes
            Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      # Schema is intentionally omitted after initial pool creation — Cognito does not allow
      # modifying/deleting custom attributes via CloudFormation updates (see UPDATE_ROLLBACK_FAILED).
      # Pool custom attrs: agencyId, role, status, planId, subStatus,
      # pwdChangedAt, pwdChangeReq, hospitalId. Add new attributes via AWS Console/CLI only.
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
      # TOTP MFA: required in staging/prod/pilot (CJIS); optional in dev so test users can sign in without an authenticator app.
      MfaConfiguration: !If [IsProdOrPilot, "ON", "OPTIONAL"]
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      LambdaConfig:
        PostConfirmation: !GetAtt CognitoPostConfirmationFunction.Arn

  CognitoPostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CognitoPostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ClientName: !If
        - HasCognitoAppClientNameParam
        - !Ref CognitoAppClientName
        - !Sub "${AppName}-web-${DeploymentStage}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: !If [CognitoClientUsesSecret, true, false]
      CallbackURLs: !If
        - HasCognitoCallbackUrls
        - !Split [",", !Ref CognitoCallbackUrls]
        - !Ref AWS::NoValue
      LogoutURLs: !If
        - HasCognitoLogoutUrls
        - !Split [",", !Ref CognitoLogoutUrls]
        - !Ref AWS::NoValue
      AllowedOAuthFlowsUserPoolClient: !If [HasCognitoCallbackUrls, true, !Ref AWS::NoValue]
      AllowedOAuthFlows: !If
        - HasCognitoCallbackUrls
        - [code]
        - !Ref AWS::NoValue
      AllowedOAuthScopes: !If
        - HasCognitoCallbackUrls
        - [openid, email, profile]
        - !Ref AWS::NoValue
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  CognitoNativeUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ClientName: !Sub "${AppName}-native-${DeploymentStage}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      CallbackURLs: !Split [",", !Ref CognitoNativeCallbackUrls]
      LogoutURLs: !Split [",", !Ref CognitoNativeLogoutUrls]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Prefix must be unique per account/region; include stage so dev/staging/prod/pilot stacks do not collide.
      Domain: !If
        - HasCognitoDomainPrefixParam
        - !Ref CognitoDomainPrefix
        - !Sub "rapidcortex-${DeploymentStage}-${AWS::AccountId}"
      UserPoolId: !Ref CognitoUserPool

  # Logical id retained for stable stack upgrades; pool group name is `rcsuperadmin`.
  CognitoGroupPlatformSuperadmin:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: rcsuperadmin
      Description: Rapid Cortex platform super-administrator (full tenant access).
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupRcBusinessAdmin:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: rcadmin
      Description: Rapid Cortex business operations (billing, onboarding, notices).
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupRcItAdmin:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: rcitadmin
      Description: Rapid Cortex technical support (users, integrations, diagnostics).
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAgencyAdmin:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      GroupName: agencyadmin
      Description: Agency-scoped administrators.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupAgencyIt:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: agencyit
      Description: Agency IT administrators.
      UserPoolId: !Ref CognitoUserPool

  CognitoGroupSupervisor:
    Type: AWS::Cognito::UserPoolGroup
    DeletionPolicy: Retain
