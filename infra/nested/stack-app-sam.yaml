  # ---------------------------------------------------------------------------------------------
  # Silent Text + Pinpoint (LiveLocation)
  #
  # Both features were originally in stack-app-sam-2.yaml, but that stack's HttpApi is not
  # mapped to the `api.rapidcortex.us` custom domain — only this stack is. SDK clients and
  # `apps/web` BFF callers expect both surfaces on the custom domain, so the Lambdas + their
  # HttpApi events live here (Option 1 from the 2026-05-25 routing audit).
  #
  # The SMS-sending paths (dispatcher functions only) reuse `IncidentMediaTwilioSecretArn` so
  # there is exactly one Twilio secret per stage rather than a parallel `rapid-cortex/silent-text`
  # entry. AWS SNS publish to E.164 numbers is allowed only with the `sns:Type=Transactional`
  # condition — see workspace rule `rapid-cortex-global-features.mdc` (no wildcard IAM).
  # ---------------------------------------------------------------------------------------------
  SilentTextIncidentsHttpFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/silentTextIncidentsHttp.handler
      Timeout: 30
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          SILENT_TEXT_TABLE: !Ref SilentTextSessionsTable
          SILENT_TEXT_PUBLIC_BASE_URL: !Ref AppPublicBaseUrl
          ENABLE_SILENT_TEXT: !Ref EnableSilentText
          SILENT_TEXT_TRANSLATION_ENABLED: "true"
          SILENT_TEXT_TTS_ENABLED: "false"
          SUPPORTED_CALL_LANGUAGES: "en,es,zh,tl,vi,ar,fr,ko,ru,pt"
          LANGUAGE_PROVIDER: !Ref LanguageProvider
          GOOGLE_CLOUD_PROJECT_ID: !Ref GoogleCloudProjectId
          GOOGLE_TRANSLATE_LOCATION: "global"
          GOOGLE_TTS_LOCATION: "global"
          GOOGLE_TTS_OUTPUT_BUCKET: !Ref GoogleTtsOutputBucket
          GOOGLE_APPLICATION_CREDENTIALS_SECRET_ARN: !If
            - UseManagedMultilingualSecrets
            - !Ref NestedMultilingualGoogleServiceAccountSecretArn
            - !Ref GoogleApplicationCredentialsSecretArn
          INCIDENT_MEDIA_TWILIO_SECRET_ARN: !Ref IncidentMediaTwilioSecretArn
          SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsProvider]
          SMS_PRIMARY_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsPrimaryProvider]
          MOCK_SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
          AWS_SMS_USE_SIMULATOR: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, AwsSmsUseSimulator]
          AWS_SMS_REGION: ""
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud
        - !Ref AppManagedPolicyComprehendTranslateRegionalDetect
        - !Ref AppManagedPolicySecretsMultilingualScopedRead
        - !Ref AppManagedPolicyOpsAlertsSnsPublishOnly
        # Transactional SMS to E.164 phone numbers — SNS does not support resource-level scoping
        # for `Publish` to a `PhoneNumber`, so AWS's recommended pattern is `Resource: "*"` with a
        # `sns:Type=Transactional` condition (blocks promotional SMS abuse from this role).
        - Statement:
            Sid: SnsPublishToPhoneNumbers
            Effect: Allow
            Action: sns:Publish
            Resource: "*"
            Condition:
              StringEquals:
                "sns:Type": "Transactional"
        - Statement:
            Sid: AwsEndUserMessagingReadOnly
            Effect: Allow
            Action:
              - sms-voice:DescribeAccountAttributes
              - sms-voice:DescribePools
              - sms-voice:DescribeConfigurationSets
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region
        - Fn::If:
            - HasIncidentMediaTwilioSecretArn
            - Statement:
                Sid: ReadTwilioSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IncidentMediaTwilioSecretArn
            - !Ref AWS::NoValue
      Events:
        PostSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions
            Method: POST
        ListSessions:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions
            Method: GET
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}
            Method: GET
        GetEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/events
            Method: GET
        GetMessages:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/messages
            Method: GET
        Resend:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/resend
            Method: POST
        Cancel:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/cancel
            Method: POST
        Close:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/close
            Method: POST
        DispatcherMessage:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/message
            Method: POST
        HighRisk:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/incidents/{id}/silent-text/sessions/{sessionId}/high-risk
            Method: POST

