  CadWebhookWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          CAD_INTEGRATIONS_TABLE: !Ref CadIntegrationsTable
          CAD_INCIDENTS_RAW_TABLE: !Ref CadIncidentsRawTable
          CAD_WEBHOOK_SECRET_SALT: !Ref CadWebhookSecretSalt
          CAD_WEBHOOK_SNS_TOPIC_ARN: !Ref CadWebhookProcessingTopic
          CAD_WEBHOOK_RATE_LIMITS_TABLE: !Ref CadWebhookRateLimitsTable
          CAD_WEBHOOK_IDEMPOTENCY_TABLE: !Ref CadWebhookIdempotencyTable
      CodeUri: ../../apps/api/
      Handler: dist/handlers/cad/cadWebhookWorker.handler
      Policies:
        - Statement:
            - Sid: CadWorkerDynamo
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIntegrationsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIntegrationsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIncidentsRawTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIncidentsRawTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${IncidentsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${IncidentsTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AgenciesTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}/index/*
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadWebhookRateLimitsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadWebhookIdempotencyTable}
            - Sid: CadWorkerSns
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref CadWebhookProcessingTopic
            - Sid: CadWorkerSqs
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt CadWebhookIngestQueue.Arn

      Events:
        CadWebhookQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt CadWebhookIngestQueue.Arn
            BatchSize: 5
            MaximumBatchingWindowInSeconds: 2

