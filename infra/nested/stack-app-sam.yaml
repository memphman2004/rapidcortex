          INCIDENT_MEDIA_TWILIO_SECRET_ARN: !Ref IncidentMediaTwilioSecretArn
          SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsProvider]
          SMS_PRIMARY_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsPrimaryProvider]
          MOCK_SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
          AWS_SMS_USE_SIMULATOR: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, AwsSmsUseSimulator]
          AWS_SMS_REGION: ""
          # The handler also gates on SURGE_*; blank them here so the file-loaded `env.ts` resolves
          # ENABLE_SURGE=false and Surge routes 503 even if they were ever bound to this function.
          SURGE_CLUSTERS_TABLE: ""
          ENABLE_SURGE: !If [PilotTestFeaturesOn, "true", "false"]
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicyOpsAlertsSnsPublishOnly
        - Statement:
            Sid: SnsPublishToPhoneNumbers
            Effect: Allow
            Action: sns:Publish
            Resource: "*"
            Condition:
              StringEquals:
