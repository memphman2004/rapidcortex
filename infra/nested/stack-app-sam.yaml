  OpsAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AppName} ops (${DeploymentStage})"

  CadWebhookIngressTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AppName} cad-webhook-ingress (${DeploymentStage})"

  CadWebhookIdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: dedupeKey
          AttributeType: S
      KeySchema:
        - AttributeName: dedupeKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  CadWebhookIngressToIngestQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref CadWebhookIngestQueue
      PolicyDocument:
        Statement:
          - Sid: AllowSnsIngressToIngestQueue
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt CadWebhookIngestQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref CadWebhookIngressTopic

  CadWebhookIngressSubscription:
    Type: AWS::SNS::Subscription
    DependsOn:
      - CadWebhookIngressToIngestQueuePolicy
    Properties:
      Protocol: sqs
      TopicArn: !Ref CadWebhookIngressTopic
      Endpoint: !GetAtt CadWebhookIngestQueue.Arn
      RawMessageDelivery: true

  CadWebhookIngestDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-cad-webhook-ingest-dlq-${DeploymentStage}"
      AlarmDescription: CAD webhook ingest worker messages landed on DLQ — investigate replay / poison payloads.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt CadWebhookIngestDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsAlertsTopic

  CadWebhookProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${AppName} cad-webhook (${DeploymentStage})"

  CadWebhookIngestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  CadWebhookIngestQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CadWebhookIngestDLQ.Arn
        maxReceiveCount: 5

  OpsAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSnsEmailSubscription
    Properties:
      TopicArn: !Ref OpsAlertsTopic
      Protocol: email
      Endpoint: !Ref SnsEmailSubscription

  OpsAlertsSmsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasSnsSmsSubscription
    Properties:
      TopicArn: !Ref OpsAlertsTopic
      Protocol: sms
      Endpoint: !Ref SnsSmsSubscription

  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: CreateSesIdentity
    Properties:
      EmailIdentity: !Ref SesIdentityValue
      ConfigurationSetAttributes: !If
        - HasSesConfigurationSet
        - ConfigurationSetName: !Ref SesConfigurationSetName
        - !Ref AWS::NoValue

  BillingSenderEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: CreateBillingSesIdentities
    Properties:
      EmailIdentity: !Ref BillingSesSenderEmail

  BillingDomainEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: CreateBillingSesIdentities
    Properties:
      EmailIdentity: !Ref BillingSesDomain

  BillingDomainDkimRecord1:
    Type: AWS::Route53::RecordSet
    Condition: BillingRoute53Records
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt BillingDomainEmailIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt BillingDomainEmailIdentity.DkimDNSTokenValue1

  BillingDomainDkimRecord2:
    Type: AWS::Route53::RecordSet
    Condition: BillingRoute53Records
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt BillingDomainEmailIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt BillingDomainEmailIdentity.DkimDNSTokenValue2

  BillingDomainDkimRecord3:
    Type: AWS::Route53::RecordSet
    Condition: BillingRoute53Records
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt BillingDomainEmailIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt BillingDomainEmailIdentity.DkimDNSTokenValue3

  BillingDomainSpfRecord:
    Type: AWS::Route53::RecordSet
    Condition: BillingRoute53Records
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub "${BillingSesDomain}."
      Type: TXT
      TTL: "300"
      ResourceRecords:
        - '"v=spf1 include:amazonses.com ~all"'

  BillingDomainDmarcRecord:
    Type: AWS::Route53::RecordSet
    Condition: BillingRoute53Records
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Sub "_dmarc.${BillingSesDomain}."
      Type: TXT
      TTL: "300"
      ResourceRecords:
        - '"v=DMARC1; p=quarantine; adkim=s; aspf=s; pct=100; rua=mailto:support@appsondemand.net"'

  SesTemplateInvoiceSent:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-sent
        SubjectPart: "Rapid Cortex invoice {{invoiceNumber}} is ready"
        HtmlPart: "<p>Hello {{customerName}},</p><p>Your invoice <strong>{{invoiceNumber}}</strong> is ready.</p><p>Total: {{currency}} {{total}}</p><p>Due date: {{dueDate}}</p><p><a href='{{invoiceUrl}}'>View invoice</a></p>"
        TextPart: "Hello {{customerName}}, your invoice {{invoiceNumber}} is ready. Total: {{currency}} {{total}}. Due: {{dueDate}}. View: {{invoiceUrl}}"

  SesTemplateInvoiceReminder3DaysBefore:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-reminder-3-days-before
        SubjectPart: "Reminder: invoice {{invoiceNumber}} is due in 3 days"
        HtmlPart: "<p>Hello {{customerName}},</p><p>This is a reminder that invoice <strong>{{invoiceNumber}}</strong> is due in 3 days on {{dueDate}}.</p><p>Balance due: {{currency}} {{balanceDue}}</p><p><a href='{{invoiceUrl}}'>View invoice</a></p>"
        TextPart: "Reminder: invoice {{invoiceNumber}} is due in 3 days on {{dueDate}}. Balance due: {{currency}} {{balanceDue}}. View: {{invoiceUrl}}"

  SesTemplateInvoiceReminderDueToday:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-reminder-due-today
        SubjectPart: "Invoice {{invoiceNumber}} is due today"
        HtmlPart: "<p>Hello {{customerName}},</p><p>Invoice <strong>{{invoiceNumber}}</strong> is due today ({{dueDate}}).</p><p>Balance due: {{currency}} {{balanceDue}}</p><p><a href='{{invoiceUrl}}'>Pay now</a></p>"
        TextPart: "Invoice {{invoiceNumber}} is due today ({{dueDate}}). Balance due: {{currency}} {{balanceDue}}. Pay now: {{invoiceUrl}}"

  SesTemplateInvoiceReminder7DaysOverdue:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-reminder-7-days-overdue
        SubjectPart: "Past due: invoice {{invoiceNumber}} is 7 days overdue"
        HtmlPart: "<p>Hello {{customerName}},</p><p>Invoice <strong>{{invoiceNumber}}</strong> is now 7 days overdue.</p><p>Balance due: {{currency}} {{balanceDue}}</p><p><a href='{{invoiceUrl}}'>View invoice</a></p>"
        TextPart: "Invoice {{invoiceNumber}} is now 7 days overdue. Balance due: {{currency}} {{balanceDue}}. View: {{invoiceUrl}}"

  SesTemplateInvoiceReminder15DaysOverdue:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-reminder-15-days-overdue
        SubjectPart: "Past due: invoice {{invoiceNumber}} is 15 days overdue"
        HtmlPart: "<p>Hello {{customerName}},</p><p>Invoice <strong>{{invoiceNumber}}</strong> is 15 days overdue.</p><p>Balance due: {{currency}} {{balanceDue}}</p><p>Please contact billing if you need assistance.</p>"
        TextPart: "Invoice {{invoiceNumber}} is 15 days overdue. Balance due: {{currency}} {{balanceDue}}. Please contact billing for assistance."

  SesTemplateInvoiceReminder30DaysOverdue:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: invoice-reminder-30-days-overdue
        SubjectPart: "Final notice: invoice {{invoiceNumber}} is 30 days overdue"
        HtmlPart: "<p>Hello {{customerName}},</p><p>Invoice <strong>{{invoiceNumber}}</strong> is 30 days overdue.</p><p>Balance due: {{currency}} {{balanceDue}}</p><p>Immediate attention is required.</p>"
        TextPart: "Final notice: invoice {{invoiceNumber}} is 30 days overdue. Balance due: {{currency}} {{balanceDue}}. Immediate attention is required."

  SesTemplatePaymentReceivedConfirmation:
    Type: AWS::SES::Template
    Properties:
      Template:
        TemplateName: payment-received-confirmation
        SubjectPart: "Payment received for invoice {{invoiceNumber}}"
        HtmlPart: "<p>Hello {{customerName}},</p><p>We received your payment for invoice <strong>{{invoiceNumber}}</strong>.</p><p>Amount received: {{currency}} {{amountPaid}}</p><p>Payment date: {{paymentDate}}</p><p>Thank you.</p>"
        TextPart: "Payment received for invoice {{invoiceNumber}}. Amount received: {{currency}} {{amountPaid}}. Payment date: {{paymentDate}}. Thank you."

  PostIncidentAudioChunkLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PostIncidentAudioChunkFunction}"
      RetentionInDays: 30

  PostIncidentAudioChunkVoiceFailuresMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: PostIncidentAudioChunkLogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PostIncidentAudioChunkFunction}"
      FilterPattern: "?stt_failure ?translation_failure ?language_detect_failure"
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: !Sub "RapidCortex/${DeploymentStage}/Voice"
          MetricName: PipelineHardFailures

  PilotOperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AppName}-${DeploymentStage}-ops"
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ApiGateway", "5xx", "ApiId", "${ApiIdVal}", "Stage", "${StageVal}" ],
                    [ ".", "4xx", ".", ".", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "HTTP API 4xx / 5xx",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/Lambda", "Errors", "FunctionName", "${AnalyzeFn}" ],
                    [ ".", ".", ".", "${AudioFn}" ],
                    [ ".", "Throttles", ".", "${AnalyzeFn}" ],
                    [ ".", ".", ".", "${AudioFn}" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Analyze + audio chunk errors / throttles",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/Lambda", "Duration", "FunctionName", "${AnalyzeFn}", { "stat": "p95" } ],
                    [ ".", ".", ".", "${AudioFn}", { "stat": "p95" } ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Lambda duration p95 (ms)",
                  "period": 300
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${IncidentsTableName}" ],
                    [ ".", "ConsumedWriteCapacityUnits", ".", "." ],
                    [ ".", "UserErrors", ".", "." ],
                    [ ".", "SystemErrors", ".", "." ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Incidents table capacity + errors",
                  "period": 300,
                  "stat": "Sum"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "${VoiceNs}", "PipelineHardFailures" ]
                  ],
                  "view": "timeSeries",
                  "stacked": false,
                  "region": "${AwsRegion}",
                  "title": "Voice pipeline hard failures (log metric)",
                  "period": 300,
                  "stat": "Sum"
                }
              }
            ]
          }
        - ApiIdVal: !Ref Api
          StageVal: "$default"
          AwsRegion: !Ref AWS::Region
          AnalyzeFn: !Ref AnalyzeIncidentFunction
          AudioFn: !Ref PostIncidentAudioChunkFunction
          IncidentsTableName: !Ref IncidentsTable
          VoiceNs: !Sub "RapidCortex/${DeploymentStage}/Voice"

  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CloudTrailEnabled
    Properties:
      # CloudWatch: hot, low-latency filter path; S3 is the durable CJIS copy.
      LogGroupName: !Sub /aws/cloudtrail/${AppName}/${DeploymentStage}
      RetentionInDays: 90

  CloudTrailToCloudWatchRole:
    Type: AWS::IAM::Role
    Condition: CloudTrailEnabled
    Properties:
      RoleName: !If
        - HasDynamoTablePrefix
        - !Sub "${DynamoTableNamePrefix}-ct-cwlogs-${DeploymentStage}"
        - !Sub "${AppName}-cloudtrail-cwlogs-${DeploymentStage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailToCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${CloudTrailLogGroup.Arn}:*"

  CloudTrailNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: CloudTrailEnabled
    Properties:
      DisplayName: !Sub "${AppName} CloudTrail (${DeploymentStage})"

  CloudTrailNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: CloudTrailEnabled
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CloudTrailNotificationTopic
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"
      Topics:
        - !Ref CloudTrailNotificationTopic

  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    Condition: CloudTrailEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          # cfn-lint resource spec can lag; ObjectLockEnabledForBucket is required with ObjectLockConfiguration for new lock buckets.
          ignore_checks:
            - E3002
    Properties:
      # Globally unique; versioned, encrypted, and Object Lock (must be on at create).
      BucketName: !Sub "${AppName}-cloudtrail-logs-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      # Required by S3 when creating a bucket with Object Lock + default retention.
      ObjectLockEnabledForBucket: true
      ObjectLockConfiguration:
        # COMPLIANCE: nobody (including the root account) can reduce retention or
        # delete/overwrite protected until retention expires; supports audit proof.
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            # ~7y — aligns with common CJIS record retention; adjust only via a new
            # versioned policy review (and never shorten without legal review).
            Days: 2555
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: cloudtrail-cjis-lifecycle
            Status: Enabled
            # No Expiration: Object Lock + CJIS: never hard-delete in bucket policy here;
            # use transitions only. Standard ~90d, then Glacier, then Deep Archive 7y+.
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
              - TransitionInDays: 2555
                StorageClass: DEEP_ARCHIVE

  CloudTrailS3Policy:
    Type: AWS::S3::BucketPolicy
    Condition: CloudTrailEnabled
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailLogsBucket.Arn}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": bucket-owner-full-control
                "aws:SourceAccount": !Ref "AWS::AccountId"
              StringLike:
                "aws:SourceArn": !Sub "arn:${AWS::Partition}:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${AppName}-audit-${DeploymentStage}"

  CloudTrailAuditingTrail:
    Type: AWS::CloudTrail::Trail
    Condition: CloudTrailEnabled
    DependsOn:
      - CloudTrailS3Policy
      - CloudTrailNotificationTopicPolicy
    Properties:
      TrailName: !Sub "${AppName}-audit-${DeploymentStage}"
      S3BucketName: !Ref CloudTrailLogsBucket
      S3KeyPrefix: !Sub "cloudtrail/${AppName}"
      SnsTopicArn: !Ref CloudTrailNotificationTopic
      IsLogging: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      # Trail requires the log group ARN in `log-group:Name:*` form for delivery.
      CloudWatchLogsLogGroupArn: !Sub "${CloudTrailLogGroup.Arn}:*"
      CloudWatchLogsRoleArn: !GetAtt CloudTrailToCloudWatchRole.Arn
      KMSKeyId: !If
        - HasCloudTrailKms
        - !Ref CloudTrailKmsKeyArn
        - !Ref "AWS::NoValue"
      # If you set CloudTrailKmsKeyArn, the key policy must allow
      # cloudtrail.amazonaws.com to use the key for log encryption. No grant is
      # created in this template for imported keys.
      EventSelectors: !If
        - CloudTrailS3AndLambdaDataEvents
        - - IncludeManagementEvents: true
            ReadWriteType: All
          - IncludeManagementEvents: false
            ReadWriteType: All
            DataResources:
              - Type: "AWS::S3::Object"
                Values:
                  - !Sub "arn:aws:s3:::${AssetsBucket}/"
          - IncludeManagementEvents: false
            ReadWriteType: All
            DataResources:
              - Type: "AWS::Lambda::Function"
                Values:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
        - !If
          - CloudTrailS3DataOnly
          - - IncludeManagementEvents: true
              ReadWriteType: All
            - IncludeManagementEvents: false
              ReadWriteType: All
              DataResources:
                - Type: "AWS::S3::Object"
                  Values:
                    - !Sub "arn:aws:s3:::${AssetsBucket}/"
          - !If
            - CloudTrailLambdaDataOnly
            - - IncludeManagementEvents: true
                ReadWriteType: All
              - IncludeManagementEvents: false
                ReadWriteType: All
                DataResources:
                  - Type: "AWS::Lambda::Function"
                    Values:
                      - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
            - - IncludeManagementEvents: true
                ReadWriteType: All

Outputs:
  CadWebhookTopicArn:
    Description: SNS topic ARN for CAD webhook ingest fan-out (subscribers process async).
    Value: !Ref CadWebhookProcessingTopic
  OpsAlertsTopicArn:
    Description: SNS topic ARN for CloudWatch alarm notifications (subscribe for email/SMS/Opsgenie).
    Value: !Ref OpsAlertsTopic
  PilotOperationsDashboardName:
    Description: CloudWatch dashboard name (open in console under Dashboards / custom).
    Value: !Ref PilotOperationsDashboard
  DeploymentStage:
    Description: Logical environment (dev / staging / prod)
    Value: !Ref DeploymentStage
  RootDomainName:
    Description: Primary public-facing domain for Rapid Cortex.
    Value: !Ref RootDomainName
  ApiWebAclArn:
    Description: Regional WAF web ACL ARN when WAF is enabled; otherwise empty (parent stack always reads this output).
    Value: !If [HasApiWaf, !GetAtt ApiWebAcl.Arn, ""]
  HttpApiUrl:
    Description: HTTP API base URL
    Value: !GetAtt Api.ApiEndpoint
  HttpApiId:
    Description: HTTP API ID (CloudWatch metrics ApiId dimension).
    Value: !Ref Api
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: Cognito web app client ID
    Value: !Ref CognitoUserPoolClient
  NativeUserPoolClientId:
    Description: Cognito native app client ID (PKCE, no secret).
    Value: !Ref CognitoNativeUserPoolClient
  CognitoIssuer:
    Description: JWT issuer for this pool
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
  CognitoHostedUiBase:
    Description: Hosted UI / OAuth2 base (domain prefix includes stage)
    Value: !Sub "https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
  ApiCustomDomainUrl:
    Description: Production API custom domain URL when ACM + custom domain are configured; otherwise empty.
    Value: !If [HasApiCustomDomainCert, !Sub "https://${ApiSubdomainPrefix}.${RootDomainName}", ""]
  DetectIncidentTypeFunctionName:
    Value: !Ref DetectIncidentTypeFunction
  PostAgencySopUploadUrlFunctionName:
    Value: !Ref PostAgencySopUploadUrlFunction
  GetTriageResultFunctionName:
    Value: !Ref GetTriageResultFunction
  OverrideTriageFunctionName:
    Value: !Ref OverrideTriageFunction
  QaHttpFunctionName:
    Value: !Ref QaHttpFunction
  QaScoringFunctionName:
    Value: !Ref QaScoringFunction
  IncidentMediaHttpFunctionName:
    Value: !Ref IncidentMediaHttpFunction
  PublicIncidentMediaHttpFunctionName:
    Value: !Ref PublicIncidentMediaHttpFunction
  AnalyzeIncidentFunctionName:
    Value: !Ref AnalyzeIncidentFunction
  PostIncidentAudioChunkFunctionName:
    Value: !Ref PostIncidentAudioChunkFunction
