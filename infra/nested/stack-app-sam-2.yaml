Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]

Conditions:
  ShouldCreateApiCustomDomain: !Equals [!Ref CreateApiCustomDomain, "true"]
  HasImportedApiCert: !Not [!Equals [!Ref ApiDomainCertificateArn, ""]]
  HasManagedApiCert:
    Fn::And:
      - !Equals [!Ref ApiDomainCertificateArn, ""]
      - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  HasApiCustomDomainCert: !Or [!Condition HasImportedApiCert, !Condition HasManagedApiCert]
  UseApiCustomDomain:
    Fn::And:
      - !Condition ShouldCreateApiCustomDomain
      - !Condition HasApiCustomDomainCert
  UseApiManagedCertificate:
    Fn::And:
      - !Condition ShouldCreateApiCustomDomain
      - !Condition HasManagedApiCert
  HasAppCnameTarget: !Not [!Equals [!Ref AppCnameTarget, ""]]
  HasAdminCnameTarget: !Not [!Equals [!Ref AdminCnameTarget, ""]]
  HasWwwCnameTarget: !Not [!Equals [!Ref WwwCnameTarget, ""]]
  UseManagedMultilingualSecrets: !Equals [!Ref MultilingualSecretProvisioning, "managed"]
  MultilingualSecretsBroadPolicy: !Equals [!Ref MultilingualSecretsPolicyMode, "broad"]
  EnablePilotGradeBackups:
    Fn::Or:
      - Fn::Equals:
          - !Ref DeploymentStage
          - staging
      - Fn::Equals:
          - !Ref DeploymentStage
          - prod
      - Fn::Equals:
          - !Ref DeploymentStage
          - pilot
  HasIncidentMediaTwilioSecretArn: !Not [!Equals [!Ref IncidentMediaTwilioSecretArn, ""]]
  HasExternalApiJwtSecretArn: !Not [!Equals [!Ref ExternalApiJwtSecretArn, ""]]
  HasExternalApiEncryptionKeyArn: !Not [!Equals [!Ref ExternalApiEncryptionKeyArn, ""]]
  HasDynamoTablePrefix: !Not [!Equals [!Ref DynamoTableNamePrefix, ""]]
  DynamoPitrOn:
    Fn::Or:
      - Fn::And:
          - !Equals [!Ref DynamoPointInTimeRecovery, "auto"]
          - !Condition EnablePilotGradeBackups
      - !Equals [!Ref DynamoPointInTimeRecovery, "true"]
  HasCognitoUserPoolNameParam: !Not [!Equals [!Ref CognitoUserPoolName, ""]]
  HasCognitoAppClientNameParam: !Not [!Equals [!Ref CognitoAppClientName, ""]]
  HasCognitoDomainPrefixParam: !Not [!Equals [!Ref CognitoDomainPrefix, ""]]
  HasCognitoCallbackUrls: !Not [!Equals [!Ref CognitoCallbackUrls, ""]]
  HasCognitoLogoutUrls: !Not [!Equals [!Ref CognitoLogoutUrls, ""]]
  CognitoClientUsesSecret: !Equals [!Ref CognitoGenerateSecret, "true"]
  HasSnsEmailSubscription: !Not [!Equals [!Ref SnsEmailSubscription, ""]]
  HasSnsSmsSubscription: !Not [!Equals [!Ref SnsSmsSubscription, ""]]
  HasImportedOpsAlertsTopicArn: !Not [!Equals [!Ref ImportedOpsAlertsTopicArn, ""]]
  CreateSesIdentity:
    Fn::And:
      - !Not [!Equals [!Ref SesIdentityValue, ""]]
      - !Not [!Equals [!Ref SesIdentityType, ""]]
  HasSesConfigurationSet: !Not [!Equals [!Ref SesConfigurationSetName, ""]]
  HasRoute53HostedZone: !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  CreateLiveVideoResources: !Equals [!Ref EnableLiveVideoResources, "true"]
  HasApiWaf: !Equals [!Ref EnableApiWaf, "true"]
  CloudTrailEnabled: !Equals [!Ref EnableCloudTrail, "true"]
  CloudTrailS3DataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailS3DataEvents, "true"]
  CloudTrailLambdaDataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailLambdaDataEvents, "true"]
  CloudTrailS3AndLambdaDataEvents: !And
    - !Condition CloudTrailS3DataEvents
    - !Condition CloudTrailLambdaDataEvents
  CloudTrailS3DataOnly: !And
    - !Condition CloudTrailS3DataEvents
    - !Not [!Condition CloudTrailLambdaDataEvents]
  CloudTrailLambdaDataOnly: !And
    - !Condition CloudTrailLambdaDataEvents
    - !Not [!Condition CloudTrailS3DataEvents]
  HasCloudTrailKms: !Not [!Equals [!Ref CloudTrailKmsKeyArn, ""]]
  HasOpenAiApiKeySecretArn: !Not [!Equals [!Ref OpenAiApiKeySecretArn, ""]]
  HasAnthropicApiKeySecretArn: !Not [!Equals [!Ref AnthropicApiKeySecretArn, ""]]

