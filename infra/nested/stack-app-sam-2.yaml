  RetentionExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/lambdas/retentionExecutor.handler
      Timeout: 900
      MemorySize: 1024
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardA
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - !Ref AppManagedPolicyS3ApplicationBucketsCrud
      Environment:
        Variables:
          RETENTION_INCIDENT_DAYS_DEFAULT: "2555"
          RETENTION_TRANSCRIPT_DAYS_DEFAULT: "1095"
          RETENTION_MEDIA_DAYS_DEFAULT: "365"
          RETENTION_ANALYSIS_DAYS_DEFAULT: "1095"
          RETENTION_PURGE_PAGE_SIZE: "25"

  RetentionSchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-retention-executor
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt RetentionExecutorFunction.Arn

  RetentionExecutorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${Sam2ManagedPolicyNamePrefix}-ret-daily-${DeploymentStage}"
      ScheduleExpression: cron(15 6 * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt RetentionExecutorFunction.Arn
        RoleArn: !GetAtt RetentionSchedulerInvokeRole.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 2

  RetentionExecutorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RetentionExecutorFunction
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt RetentionExecutorSchedule.Arn

Outputs:
  OpsAlertsTopicArn:
    Value: !Ref OpsAlertsTopic
  HttpApiUrl:
    Value: !GetAtt Api.ApiEndpoint
  HttpApiId:
    Value: !Ref Api
  ApiWebAclArn:
    Value: !If [HasApiWaf, !GetAtt ApiWebAcl.Arn, ""]
  ApiCustomDomainUrl:
    Value: !If [UseApiCustomDomain, !Sub "https://${ApiSubdomainPrefix}.${RootDomainName}", ""]
  ApiTlsCertificateArn:
    Value: !If [UseApiCustomDomain, !If [HasImportedApiCert, !Ref ApiDomainCertificateArn, !Ref ApiManagedCertificate], ""]
  ListWellnessFlagsFunctionName:
    Value: !Ref ListWellnessFlagsFunction
  AcknowledgeTraumaFlagFunctionName:
    Value: !Ref AcknowledgeTraumaFlagFunction
  GetCallerCardFunctionName:
    Value: !Ref GetCallerCardFunction
  CreatePremiseNoteFunctionName:
    Value: !Ref CreatePremiseNoteFunction
  PatchPremiseNoteFunctionName:
    Value: !Ref PatchPremiseNoteFunction
