Resources:


  AppManagedPolicyDynamoLambdaCrudShardA:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${Sam2ManagedPolicyNamePrefix}-sam2-lambda-ddb-crud-${DeploymentStage}-a"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DynamoApplicationShardA
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:DescribeTable
              - dynamodb:ConditionCheckItem
            Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}/index/*
