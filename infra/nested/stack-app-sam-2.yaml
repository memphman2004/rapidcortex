  CadWritebackHttpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          <<: *SAM2_HEAVY_LAMBDAS_GLOBALS_SLIM_OVERRIDES
          CAD_INTEGRATIONS_TABLE: !Ref CadIntegrationsTable
          CAD_WRITEBACK_AUDIT_TABLE: !Ref CadWritebackAuditTable
          CAD_WRITEBACK_ENABLED: !Ref CadWritebackEnabled
          CAD_WRITEBACK_REQUIRES_APPROVAL: !Ref CadWritebackRequiresApproval
          OPS_ALERTS_TOPIC_ARN: !Ref OpsAlertsTopic
      CodeUri: ../../apps/api/
      Handler: dist/handlers/cad/cadWritebackHttp.handler
      Policies:
        - Statement:
            - Sid: CadWritebackIncidentRead
              Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${IncidentsTable}
            - Sid: CadWritebackIntegrationsRead
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIntegrationsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadIntegrationsTable}/index/*
            - Sid: CadWritebackAuditRw
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadWritebackAuditTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CadWritebackAuditTable}/index/*
            - Sid: CadWritebackAuditAppend
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuditTable}
            - Sid: CadWritebackOpsSns
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !GetAtt OpsAlertsTopic.TopicArn
      Events:
        PostCadWriteback:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/cad/writeback/{incidentId}
            Method: POST
        GetCadWritebackApprovals:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/cad-writeback-approvals
            Method: GET
        PostCadWritebackApprove:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/cad-writeback-approvals/{id}/approve
            Method: POST
        PostCadWritebackReject:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/admin/cad-writeback-approvals/{id}/reject
            Method: POST

