  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Globally unique; ties assets to account + deployment stage.
      BucketName: !Sub "${AppName}-assets-${DeploymentStage}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - "*"
            AllowedOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
            ExposedHeaders:
              - ETag

  BillingInvoicesBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Keep requested name prefix while remaining globally unique across AWS accounts.
      BucketName: !Sub "rapid-cortex-billing-invoices-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: invoice-archive-lifecycle
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - "*"
            AllowedOrigins: !Split [",", !Ref HttpApiCorsAllowedOrigins]
            ExposedHeaders:
              - ETag

  BillingPosBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Keep requested name prefix while remaining globally unique across AWS accounts.
      BucketName: !Sub "rapid-cortex-billing-pos-${DeploymentStage}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BillingPosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BillingPosBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonPdfUploads
            Effect: Deny
            Principal: "*"
            Action:
              - s3:PutObject
            NotResource: !Sub "${BillingPosBucket.Arn}/*.pdf"


