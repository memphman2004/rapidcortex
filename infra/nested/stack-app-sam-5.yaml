              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  BridgeTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BridgePermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesisvideo:PutMedia
                  - kinesisvideo:TagStream
                  - kinesisvideo:GetDataEndpoint
                  - kinesisvideo:CreateStream
                  - kinesisvideo:DescribeStream
                Resource:
                  - !Sub arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/rc-connect-*/*
                  - !Sub arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/rc-venue-*/*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppName}/camera-credentials/*
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConnectAccessSessionsTable}

  ConnectBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}/connect-bridge/${DeploymentStage}"
      RetentionInDays: 30

  VenueBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}/venue-bridge/${DeploymentStage}"
      RetentionInDays: 30

  ConnectBridgeTaskDefinitionResource:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AppName}-connect-bridge-${DeploymentStage}"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: X86_64
      ExecutionRoleArn: !GetAtt BridgeTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt BridgeTaskRole.Arn
      ContainerDefinitions:
        - Name: rc-connect-bridge
          Image: !Sub "${ConnectBridgeEcrRepository.RepositoryUri}:latest"
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ConnectBridgeLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: bridge

