  VenueSmsInboundFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/venue/handlers/post-venue-sms-inbound.handler
      Description: "Twilio inbound SMS handler for venue + campus routing"
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LOCATION_TOKENS_TABLE: !Ref LocationTokensTable
          SMS_ROUTING_TABLE: !Ref SmsRoutingTable
          AUDIT_TABLE: !Ref AuditTable
          LOCATE_PUBLIC_BASE_URL: !Ref AppPublicBaseUrl
          APP_PUBLIC_BASE_URL: !Ref AppPublicBaseUrl
          INCIDENT_TIMELINE_TABLE: !Sub "rapid-cortex-incident-timeline-${DeploymentStage}"
          ENABLE_SMS_LOCATION: "true"
          CARRIER_LOCATION_MOCK: !If [PilotTestFeaturesOn, "true", "false"]
          LOCATE_SMS_MOCK: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
          SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsProvider]
          SMS_PRIMARY_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, SmsPrimaryProvider]
          MOCK_SMS_PROVIDER: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, MockSmsProvider]
          AWS_SMS_USE_SIMULATOR: !FindInMap [SmsEnvironmentDefaults, !Ref DeploymentStage, AwsSmsUseSimulator]
          INCIDENT_MEDIA_TWILIO_SECRET_ARN: !Ref IncidentMediaTwilioSecretArn
          UNROUTED_SMS_DLQ_URL: !Ref UnroutedSmsDlq
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt UnroutedSmsDlq.Arn
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/venue/sms/inbound
            Method: POST

