  VenueCameraRequestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/venue/handlers/post-venue-camera-request.handler
      Timeout: 60
      Policies:
        - !Ref AppManagedPolicyDynamoLambdaCrudShardB
        - !Ref AppManagedPolicyDynamoLambdaCrudShardC
        - Statement:
            Sid: VenueCameraRequestSessions
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:Query
            Resource:
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConnectAccessSessionsTable}
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConnectAccessSessionsTable}/index/*
        - Statement:
            - Effect: Allow
              Action:
                - ecs:RunTask
                - ecs:DescribeTasks
              Resource: !If
                - HasVenueBridgeCluster
                - !Ref VenueBridgeTaskDefinitionResource
                - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/placeholder"
              Condition:
                ArnEquals:
                  "ecs:cluster": !If
                    - HasVenueBridgeCluster
                    - !Ref VenueBridgeClusterArn
                    - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/placeholder"
        - Statement:
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource:
                - !GetAtt BridgeTaskExecutionRole.Arn
                - !GetAtt BridgeTaskRole.Arn
              Condition:
                StringEquals:
                  "iam:PassedToService": ecs-tasks.amazonaws.com
        - Statement:
            Sid: VenueCameraRequestKvsChannels
            Effect: Allow
            Action:
              - kinesisvideo:CreateSignalingChannel
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:TagResource
            Resource:
              - !Sub arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/rc-venue-*/*
        - Statement:
            Sid: VenueCameraRequestCameraCredentials
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppName}/camera-credentials/*
              - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rapid-cortex/connect/*
      Events:
        Route:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /api/venue/cameras/request
            Method: POST

