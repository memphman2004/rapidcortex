AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  Rapid Cortex API. IAM: SAM built-in DynamoDB/S3 policies scope to named tables/buckets; explicit Statement blocks
  use least-privilege actions, ARNs for Bedrock foundation models (AiBedrockFoundationModelId + QaBedrockModelId),
  stack Secrets prefix rapidcortex/<stage>/*, and regional Conditions where AWS control-plane APIs require Resource=*.
  Verify with npm run validate:iam and sam validate --lint.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028
        - W8001
        - W7001
  # Overrides **only** keys that exist in Globals (see Globals.Function.Environment.Variables) — no extra key names
  # (adding unused keys inflates the UpdateFunctionConfiguration request and can hit the 5KB API limit).
  TranscriptChunkLambdasGlobalsSlimYamlAnchorHolder: &TRANSCRIPT_CHUNK_GLOBALS_SLIM_OVERRIDES
    WEBHOOKS_TABLE: ""
    API_CLIENTS_TABLE: ""
    EXTERNAL_API_RATE_LIMITS_TABLE: ""
    RC_LITE_ENABLED: ""
    RC_LITE_API_KEYS_TABLE: ""
    RC_LITE_RATE_LIMIT_TABLE: ""
    RC_LITE_USAGE_TABLE: ""
    SEO_INTELLIGENCE_TABLE: ""
    SEO_TOOL_ENABLED: "false"
    SEO_AUTO_SCAN_ENABLED: ""
    SEO_AI_SUGGESTIONS_ENABLED: "false"
    DECEPTION_EVENTS_TABLE: ""
    DECEPTION_SHIELD_ENABLED: ""
    DECEPTION_AUTO_BLOCK_ENABLED: ""
    DECEPTION_ALERTS_ENABLED: "false"
    CAD_WRITEBACK_ENABLED: ""
    CAD_WRITEBACK_REQUIRES_APPROVAL: ""
    CAD_WRITEBACK_AUDIT_TABLE: ""
    OPS_ALERTS_TOPIC_ARN: ""
    DECEPTION_SLACK_WEBHOOK_URL: ""
    EXTERNAL_API_JWT_SECRET_ARN: ""
    EXTERNAL_API_ENCRYPTION_KEY_ARN: ""
    PASSWORD_MAX_AGE_DAYS: ""
    PASSWORD_EXPIRY_GRACE_DAYS: ""
    PASSWORD_CHANGE_REQUIRED_ON_FIRST_LOGIN: ""
    OPENAI_API_KEY_SECRET_ARN: ""
    ANTHROPIC_API_KEY_SECRET_ARN: ""
    AUTO_ANALYZE_EVERY_N_SEGMENTS: ""
    ALLOW_UNAUTHENTICATED_API: ""
    APPROVED_CORS_ORIGINS: ""
    ENABLE_QA_SCORING: ""
    ENABLE_QA_SCORE_AFTER_ANALYSIS: ""
    QA_SESSIONS_TABLE: ""
    QA_TEMPLATES_TABLE: ""
    QA_SCORING_MOCK: ""
    QA_BEDROCK_MODEL_ID: ""
    ENABLE_INCIDENT_MEDIA: ""
    INCIDENT_MEDIA_TABLE: ""
    INCIDENT_MEDIA_PUBLIC_BASE_URL: ""
    INCIDENT_MEDIA_TOKEN_TTL_MINUTES: ""
    INCIDENT_MEDIA_UPLOAD_URL_TTL_SECONDS: ""
    INCIDENT_MEDIA_MAX_UPLOAD_BYTES: ""
    MEDIA_UPLOAD_TOKEN_TTL_SECONDS: ""
    ENABLE_NON_EMERGENCY_TRIAGE: ""
    AI_ENABLE_FALLBACKS: ""
    AI_STORE_PROVIDER_METADATA: ""
    AI_PROMPT_VERSION: ""
    AI_REQUEST_TIMEOUT_MS: ""
    AI_MAX_RETRIES_PER_PROVIDER: ""
    AI_ANALYSIS_DEBOUNCE_SECONDS: ""
    AI_MAX_ANALYZE_REQUESTS_PER_INCIDENT_PER_HOUR: ""
    AI_SKIP_IF_TRANSCRIPT_UNCHANGED: ""
    AI_ANALYSIS_IN_FLIGHT_LEASE_SECONDS: ""

  # SQS workers / minimal CAD ingress: inherit Globals but blank unused keys (4KB Lambda env limit).
  AppSam1HeavyLambdasGlobalsSlimYamlAnchorHolder: &APP_SAM1_HEAVY_LAMBDAS_GLOBALS_SLIM_OVERRIDES
    <<: *TRANSCRIPT_CHUNK_GLOBALS_SLIM_OVERRIDES
    ACCESS_OVERRIDES_TABLE: ""
    AGENCY_SHARE_PARTNERS_TABLE: ""
    BEDROCK_REGION: ""
    COGNITO_CLIENT_ID: ""
    COGNITO_REGION: ""
    COGNITO_USER_POOL_ID: ""
    DATA_DELETION_AUDIT_TABLE: ""
    DISPATCHER_COACHING_NOTES_TABLE: ""
    INCIDENT_SHARES_TABLE: ""
    INCIDENT_TIMELINE_TABLE: ""
    INTEGRATION_TRANSCRIPT_AGENCY_ALLOWLIST: ""
    INTEGRATION_TRANSCRIPT_CONNECTOR_MODE: ""
    LANGUAGE_PROVIDER: ""
    LANGUAGE_SESSIONS_TABLE: ""
    PREMISE_NOTES_TABLE: ""
    TRANSCRIPT_RETENTION_POLICY_DAYS: ""
    TRAUMA_FLAGS_TABLE: ""

Parameters:
  DeploymentStage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod, pilot]
  RootDomainName:
    Type: String
    Default: rapidcortex.us
  ApiSubdomainPrefix:
    Type: String
    Default: api
  ApiDomainCertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN in the same region as this stack (API Gateway regional custom domain).
      Leave empty and set Route53HostedZoneId to have the stack request and validate a cert in ACM via DNS.
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: >-
      Public Route 53 hosted zone ID for RootDomainName (e.g. Z123...). When set and ApiDomainCertificateArn is empty,
      the stack creates an ACM certificate for api.<root-domain> and writes DNS validation records automatically.
  AppCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for app.<root-domain> (e.g. CloudFront domain).
  AdminCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for admin.<root-domain>.
  WwwCnameTarget:
    Type: String
    Default: ""
    Description: Optional CNAME target for www.<root-domain>.
  OpenAiApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for OpenAI (plain string or JSON with apiKey).
  AnthropicApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN for Anthropic (plain string or JSON with apiKey).
  AzureSpeechKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Speech key (plain string or JSON with AZURE_SPEECH_KEY).
  AzureTranslationKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN for Azure Translator key (defaults to speech secret when empty).
  GoogleApplicationCredentialsSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN holding Google service account JSON for STT/Translate.
  ExternalApiJwtSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Agency API (`/api/v1`) JWT signing key (plain UTF-8 string, min 32 chars).
      When empty, lambdas must receive EXTERNAL_API_JWT_SECRET through a secure deployment path (not plaintext in template).
  ExternalApiEncryptionKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for webhook signing-secret encryption passphrase (plain UTF-8 string, min 16 chars).
  MultilingualSecretProvisioning:
    Type: String
    Default: external
    AllowedValues: [external, managed]
    Description: >-
      managed: create stack-owned Secrets Manager secrets (placeholder values) under rapidcortex/<DeploymentStage>/multilingual/* and wire Lambdas to them.
      external: use the Azure/Google secret ARN parameters only (leave managed secrets unused).
  MultilingualSecretsPolicyMode:
    Type: String
    Default: scoped
    AllowedValues: [scoped, broad]
    Description: >-
      scoped: GetSecretValue limited to rapidcortex/<DeploymentStage>/multilingual* plus any explicitly passed external ARNs (when non-empty).
      broad: GetSecretValue allowed for all secrets in this account/region (legacy compatibility).
  SelfSignupDefaultAgencyId:
    Type: String
    Default: self-signup-pending
    Description: >-
      custom:agencyId written by the PostConfirmation trigger for self-registered users (after email
      verification). Create a matching agency row in DynamoDB or override this to an existing agency id.
  SelfSignupDefaultRole:
    Type: String
    Default: dispatcher
    AllowedValues: [dispatcher, commsupervisor, agencyadmin, agencyit, analyst, auditor, rcsuperadmin, rcadmin, rcitadmin]
    Description: custom:role written by PostConfirmation when the user has no role yet.
  QaBedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for automated QA structured JSON scoring (InvokeModel / Converse).
  AiBedrockFoundationModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: >-
      Bedrock foundation model id for analysis / language paths that call Bedrock (InvokeModel / Converse).
      IAM and Globals BEDROCK_MODEL_* must match runtime configuration (CJIS: no foundation-model/* wildcard).
  IncidentMediaTwilioSecretArn:
    Type: String
    Default: ""
    Description: >-
      Optional Secrets Manager ARN for Twilio JSON: preferred shape accountSid + apiKeySid + apiKeySecret +
      messagingServiceSid; legacy accountSid + authToken + fromE164 (optional messagingServiceSid).
      Leave empty when using AWS-only SMS_PROVIDER or mock/simulator paths.
  HttpApiCorsAllowedOrigins:
    Type: String
    Default: "*"
    Description: >-
      Comma-separated browser origins for the HttpApi CORS AllowOrigins list. Use * for local/dev.
      For staging/production set explicitly, e.g. https://www.rapidcortex.us,https://www.example.org
  GoogleCloudProjectId:
    Type: String
    Default: ""
    Description: >-
      Google Cloud project id for server-side Translation / Text-to-Speech (text workflows). Required when
      LANGUAGE_PROVIDER=google or for auto with Google credentials.
  LanguageProvider:
    Type: String
    Default: auto
    AllowedValues: [aws, google, auto]
    Description: Text translation + optional TTS for silent text (complements per-tier voice STT/translate env).
  GoogleTtsOutputBucket:
    Type: String
    Default: ""
    Description: Optional S3 bucket for Google TTS objects; when empty, ASSETS_BUCKET is used.
  # --- Deploy-time naming & optional integrations (see scripts/deploy-from-env.sh) ---
  AppName:
    Type: String
    Default: rapid-cortex
    Description: Short prefix for S3, SNS, Cognito names, and default Dynamo table prefix slug.
  DynamoTableNamePrefix:
    Type: String
    Default: ""
    Description: >-
      When set, all DynamoDB tables use TableName: <prefix>-<table>-<DeploymentStage> (uniquely names tables per env).
      When empty, CloudFormation generates table names (legacy behavior).
  DynamoPointInTimeRecovery:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: PITR on DynamoDB. auto = on for staging/prod/pilot, off for dev (matches previous template).
  DynamoBillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues: [PAY_PER_REQUEST]
    Description: Reserved for future provisioned mode; use PAY_PER_REQUEST.
  CognitoAppClientName:
    Type: String
    Default: ""
    Description: When empty, defaults to {AppName}-web-{DeploymentStage}.
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: >-
      Hosted UI domain prefix (per account+region). When empty, uses legacy default rapidcortex-{DeploymentStage}-{AccountId} (keeps prior stack behavior); set explicitly to match AppName or a custom prefix.
  CognitoCallbackUrls:
    Type: String
    Default: ""
    Description: Comma-separated OAuth callback URLs for the app client (optional; for hosted UI).
  CognitoLogoutUrls:
    Type: String
    Default: ""
    Description: Comma-separated sign-out URLs (optional; for hosted UI).
  CognitoNativeCallbackUrls:
    Type: String
    Default: >-
      rapidcortex://oauth/callback,rapidcortex-desktop://oauth/callback,rapidcortex-ios://oauth/callback,rapidcortex-windows://oauth/callback
    Description: >-
      Comma-separated OAuth callback URLs for the **native** app client (PKCE, no secret). Append your HTTPS
      `https://{web-host}/auth/return-to-app` URL here when using the browser return-to-app handoff.
  CognitoNativeLogoutUrls:
    Type: String
    Default: >-
      rapidcortex://logout/callback,rapidcortex-desktop://logout/callback,rapidcortex-ios://logout/callback,rapidcortex-windows://logout/callback
    Description: Comma-separated sign-out URLs for the native app client (must match logout_uri used by native apps).
  CognitoGenerateSecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true for confidential server-side clients; web SPAs use false.
  # Globals cannot use !Ref CognitoUserPool / CognitoUserPoolClient (those create a cycle with
  # CognitoPostConfirmationFunction, which the pool references). Real IDs come from stack outputs for the web app.
  CognitoUserPoolIdPlaceholder:
    Type: String
    Default: "unused-placeholder"
    Description: >-
      Passed to Globals only; avoids circular dependency with CognitoUserPool. Lambda functions that need pool ID use
      !Ref CognitoUserPool where valid, or callers use stack Outputs.
  CognitoClientIdPlaceholder:
    Type: String
    Default: "unused-placeholder"
    Description: >-
      Passed to Globals only; avoids circular dependency with CognitoUserPoolClient. Real client id is exported as an output.
  # --- Imported from primary SAM stack (AppSamStackV2); deploy stack 1 first ---
  ImportedCognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID from AppSamStackV2.
  ImportedCognitoWebClientId:
    Type: String
    Description: Cognito web app client ID from AppSamStackV2.
  ImportedCognitoNativeClientId:
    Type: String
    Default: ""
    Description: Cognito native client ID (PKCE); optional.
  ImportedCognitoIssuer:
    Type: String
    Description: JWT issuer URL for HttpApi authorizer.
  SnsEmailSubscription:
    Type: String
    Default: ""
    Description: Optional email for AWS::SNS::Subscription on the ops topic.
  SnsSmsSubscription:
    Type: String
    Default: ""
    Description: Optional E.164 phone for AWS::SNS::Subscription (SMS) on the ops topic; region/account must allow SMS.
  SesIdentityType:
    Type: String
    Default: ""
    AllowedValues: ["", email, domain]
    Description: When SesIdentityValue is set, type of Amazon SES identity to register. Leave all SES params empty to skip.
  SesIdentityValue:
    Type: String
    Default: ""
    Description: Email address (sesIdentityType=email) or domain (sesIdentityType=domain) for AWS::SES::EmailIdentity.
  SesConfigurationSetName:
    Type: String
    Default: ""
    Description: Optional SES configuration set to associate with the identity.
  BillingSesSenderEmail:
    Type: String
    Default: ""
    Description: Sender email to verify for billing notifications. Leave blank with BillingSesDomain to skip billing SES identities.
  BillingSesDomain:
    Type: String
    Default: ""
    Description: Domain to verify in SES for billing email (DKIM/SPF/DMARC). Leave blank with BillingSesSenderEmail to skip billing SES identities.
  EnableLiveVideoResources:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true to deploy live-video KVS functions/routes. Default false keeps core API leaner.
  EnableApiWaf:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, deploys a regional AWS WAF web ACL (managed rules + per-IP rate limit) and associates it
      with the API Gateway HTTP API $default stage. Enable for pilot/production edge protection (additional cost).
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    MaxValue: 20000000
    Description: >-
      WAF rate-based rule: max requests per 5-minute evaluation window per source IP. Tune with agency traffic; API Gateway
      throttling (DefaultRouteSettings) also applies.
  TranscriptRetentionPolicyDays:
    Type: String
    Default: ""
    Description: >-
      Optional agency SOP: target data lifecycle in days for transcript-style incident data (ops documentation).
      Exposed to all API Lambdas as TRANSCRIPT_RETENTION_POLICY_DAYS. The stack does not auto-delete rows by this value;
      use export and deletion workflows. Leave empty to omit.
  # --- CJIS / audit: platform-wide management API logging (infrastructure) ---
  EnableCloudTrail:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, provisions multi-account-style audit logging: multi-Region trail, S3 (versioning, SSE, Object Lock, lifecycle
      to Glacier / Deep Archive), optional CloudWatch delivery, and SNS notifications. Set false in low-risk dev to reduce
      cost (not recommended for pilot/prod or CJIS-bound tenants).
  CloudTrailKmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional KMS key ARN (or id) to encrypt CloudTrail log files in S3. Leave empty to use SSE-S3 on the log bucket. Use a
      customer-managed key when the security plan requires key rotation and stricter key policy.
  EnableCloudTrailS3DataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs S3 data-plane events for this stack's ASSETS bucket (higher cost and volume; enable when object access
      to assets must be provable in CloudTrail, e.g. investigations).
  EnableCloudTrailLambdaDataEvents:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, logs data-plane (Invoke) events for all Lambda functions in the stack region. Higher cost; use sparingly
      and prefer management events (default) unless Lambda invocation forensics is required.

# --- CJIS: fail fast when pilot/stage/prod use permissive CORS or secret IAM patterns ---
  AgenciesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AgenciesTable).
  InvitesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (InvitesTable).
  AccessOverridesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AccessOverridesTable).
  NetworkEmergencyOverridesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (network emergency overrides).
  ApiClientsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (ApiClientsTable).
  WebhooksTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (WebhooksTable).
  ExternalApiRateLimitsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (ExternalApiRateLimitsTable).
  BillingProfilesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingProfilesTable).
  BillingWebhookEventsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingWebhookEventsTable).
  MonetizationPlansTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (MonetizationPlansTable).
  MonetizationAddOnsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (MonetizationAddOnsTable).
  AgencySubscriptionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AgencySubscriptionsTable).
  UsageMetersTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (UsageMetersTable).
  MonetizationInvoicesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (MonetizationInvoicesTable).
  BillingAuditEventsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingAuditEventsTable).
  SalesLeadsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (SalesLeadsTable).
  SeoIntelligenceTable:
    Type: String
    Description: Physical DynamoDB table name for Cortex SEO Intelligence (scans + issues).
  DeceptionEventsTable:
    Type: String
    Description: Physical DynamoDB table name for Deception Shield (honeypot + honeytoken events only).
  CustomersTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (CustomersTable).
  ServiceCatalogTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (ServiceCatalogTable).
  InvoicesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (InvoicesTable).
  InvoiceItemsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (InvoiceItemsTable).
  BillingSchedulesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingSchedulesTable).
  PaymentRecordsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (PaymentRecordsTable).
  BillingAuditLogTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (BillingAuditLogTable).
  CadIncidentsRawTable:
    Type: String
    Description: Physical DynamoDB table name for immutable CAD webhook receipts (TTL).
  CadWebhookRateLimitsTable:
    Type: String
    Description: Physical DynamoDB table name for per-integration CAD webhook rate counters.
  CadIntegrationsTable:
    Type: String
    Description: Physical DynamoDB table name for agency CAD integration configs.
  CadWritebackAuditTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table name for CAD write-back audit rows (optional until write-back is enabled).
  CadWritebackEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, CAD write-back API routes accept submissions (subject to per-request validation).
  CadWritebackRequiresApproval:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, dispatcher write-backs queue for supervisor/admin approval before vendor HTTP.
  EnableSilentText:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, Silent Text dispatcher + public token routes are active. Must also have a working
      SMS provider (Twilio secret ARN or AWS SNS/EUM) — without that, session creates audit
      SILENT_TEXT_SMS_FAILED and return ok=false.
  EnablePinpoint:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When true, Pinpoint (LiveLocation) dispatcher + public token routes are active. Requires the
      same SMS provider configuration as Silent Text + incident media (`INCIDENT_MEDIA_TWILIO_SECRET_ARN`).
  EnableConnectRing:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, Ring Connect OAuth and device linking routes are active.
  RingPartnershipEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, Ring partnership credentials and Connect integration are active.
  RingClientId:
    Type: String
    Default: ""
    Description: Deprecated — Ring OAuth client id is loaded from RingCredentialsSecretArn at runtime.
  RingClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Deprecated — Ring OAuth client secret is loaded from RingCredentialsSecretArn at runtime.
  RingCredentialsSecretArn:
    Type: String
    Default: "arn:aws:secretsmanager:us-east-1:158961537080:secret:rapid-cortex/connect/ring-credentials-D3f1sN"
    Description: Ring API credentials secret ARN (clientId, clientSecret, hmacKey JSON).
  RingRedirectUri:
    Type: String
    Default: "https://api.rapidcortex.us/api/integrations/ring/callback"
  RingAccountLinkUrl:
    Type: String
    Default: "https://www.rapidcortex.us/connect/ring/link"
  RingSecretsPrefix:
    Type: String
    Default: "rapid-cortex/connect/ring"
  RingAccountsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for linked Ring accounts (RapidCortexRingAccounts-{stage}).
  RingDevicesTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for Ring devices (RapidCortexRingDevices-{stage}).
  RingRequestsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for Ring emergency camera requests.
  RingSessionsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for Ring emergency camera sessions.
  EnableConnectRingAvailableCameras:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, Ring available-cameras metadata route is active (requires EnableConnectRing).
  EnableConnectRingEmergencyRequests:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: When true, Ring emergency camera request/consent/revoke routes are active.
  RingPublicApiBaseUrl:
    Type: String
    Default: "https://api.rapidcortex.us"
    Description: Public API base URL for Ring owner consent links (no trailing slash).
  ConnectAccessSessionsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for Connect access sessions.
  VenueFacilitiesTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for venue facility profiles, floor plans, plans, and cameras.
  VenueAssetsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for venue facility assets (AED, exits, staging, etc.).
  VenueIncidentOverlaysTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for venue incident overlays and responder check-ins.
  VenueCameraAccessLogTable:
    Type: String
    Default: ""
    Description: Immutable venue camera access log (no TTL).
  VenueConfigTable:
    Type: String
    Default: ""
    Description: Venue config DynamoDB table (event schedules, SMS incidents).
  CampusIncidentsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for campus incidents.
  CampusConfigTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for campus config, buildings, zones, and anon tokens.
  QRLocationsTable:
    Type: String
    Default: ""
    Description: Physical DynamoDB table for QR location registry (RCLI).
  ConnectBridgeClusterArn:
    Type: String
    Default: ""
    Description: ECS cluster ARN for Connect media bridge tasks.
  VenueBridgeClusterArn:
    Type: String
    Default: ""
    Description: ECS cluster ARN for Venue media bridge tasks.
  ConnectBridgeTaskDefinition:
    Type: String
    Default: ""
    Description: ECS task definition ARN for Connect media bridge container.
  VenueBridgeTaskDefinition:
    Type: String
    Default: ""
    Description: ECS task definition ARN for Venue media bridge container.
  BridgeSubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated private subnet IDs for bridge Fargate tasks.
  BridgeSecurityGroupIds:
    Type: String
    Default: ""
    Description: Comma-separated security group IDs for bridge Fargate tasks.
  RingApiBaseUrl:
    Type: String
    Default: ""
    Description: Ring partner API base URL (empty when partnership inactive).
  InternalServiceKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Shared secret for internal Ring refresh-token route (X-Internal-Service-Key).
  AppPublicBaseUrl:
    Type: String
    Default: "https://www.rapidcortex.us"
    Description: >-
      Public origin where token pages are served (Silent Text safety links and LiveLocation
      capture pages). Used to mint absolute URLs in SMS bodies — both features share the same value.
  CadPublicApiBaseUrl:
    Type: String
    Default: ""
    Description: >-
      Public HTTPS API base URL (no trailing slash) for CAD webhook setup text. Leave empty when a regional API custom
      domain is configured (stack injects https://<ApiSubdomainPrefix>.<RootDomainName> automatically).
  CadWebhookSecretSalt:
    Type: String
    NoEcho: true
    Description: Salt for CAD inbound webhook signing secret verification.
  IncidentsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (IncidentsTable).
  TranscriptsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (TranscriptsTable).
  LanguageSessionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (LanguageSessionsTable).
  VideoAssistSessionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (VideoAssistSessionsTable).
  LiveVideoSessionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (LiveVideoSessionsTable).
  SilentTextSessionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (SilentTextSessionsTable).
  PinpointLinksTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (PinpointLinksTable).
  LocationTokensTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (LocationTokensTable).
  SmsRoutingTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (SmsRoutingTable).
  AnalysesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AnalysesTable).
  TraumaFlagsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (TraumaFlagsTable).
  PremiseNotesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (PremiseNotesTable).
  DispatcherCoachingNotesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (DispatcherCoachingNotesTable).
  AgencySharePartnersTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AgencySharePartnersTable).
  IncidentSharesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (IncidentSharesTable).
  AuditTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (AuditTable).
  DataDeletionAuditTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (DataDeletionAuditTable).
  QASessionsTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (QASessionsTable).
  QATemplatesTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (QATemplatesTable).
  IncidentMediaTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (IncidentMediaTable).
  AssetsBucket:
    Type: String
    Description: Assets bucket name from data layer.
  BillingInvoicesBucket:
    Type: String
    Description: Billing invoices bucket name from data layer.
  BillingPosBucket:
    Type: String
    Description: Billing POS bucket name from data layer.
  NestedMultilingualAzureApiKeysSecretArn:
    Type: String
    Default: ""
    Description: Managed multilingual Azure secret ARN from data layer (may be empty).
  NestedMultilingualGoogleServiceAccountSecretArn:
    Type: String
    Default: ""
    Description: Managed multilingual Google secret ARN from data layer (may be empty).
  BillingPaymentInstructionsSecretArn:
    Type: String
    Description: Billing payment instructions secret ARN from data layer.
  BillingSesCredentialsSecretArn:
    Type: String
    Description: Billing SES credentials secret ARN from data layer.
  RcLiteApiKeysTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (RC Lite hashed API keys).
  RcLiteRateLimitTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (RC Lite rate limiting).
  RcLiteUsageTable:
    Type: String
    Description: Physical DynamoDB table name from data layer (RC Lite usage meters).
  SeoToolEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, SEO Intelligence HTTP routes are active (handler still returns 403 if caller lacks admin access).
  SeoAutoScanEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Reserved for scheduled re-scans (EventBridge); manual scans always available when SeoToolEnabled is true.
  SeoAiSuggestionsEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, SEO Intelligence Suggestions may call Bedrock (requires IAM); otherwise rule-based fallbacks only.
  PilotTestFeaturesEnabled:
    Type: String
    Default: auto
    AllowedValues: [auto, "true", "false"]
    Description: >-
      When auto, enables pilot-test API feature flags for DeploymentStage=dev (QA scoring, Surge, SOP AI,
      Ring emergency cameras, incident media, etc.). Pass from root stack or set true/false explicitly.

Rules:
  PilotProdNoCorsWildcard:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref HttpApiCorsAllowedOrigins, "*"]]
        AssertDescription: >-
          For CJIS, HttpApiCorsAllowedOrigins must list explicit browser origins in staging/pilot/prod
          (wildcard CORS is dev-only).
  PilotProdNoBroadSecrets:
    RuleCondition: !Or
      - !Equals [!Ref DeploymentStage, prod]
      - !Equals [!Ref DeploymentStage, pilot]
      - !Equals [!Ref DeploymentStage, staging]
    Assertions:
      - Assert: !Not [!Equals [!Ref MultilingualSecretsPolicyMode, broad]]
        AssertDescription: >-
          MultilingualSecretsPolicyMode `broad` is not allowed outside dev (CJIS least-privilege for Secrets Manager).

Conditions:
  HasImportedApiCert: !Not [!Equals [!Ref ApiDomainCertificateArn, ""]]
  HasManagedApiCert:
    Fn::And:
      - !Equals [!Ref ApiDomainCertificateArn, ""]
      - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  HasApiCustomDomainCert: !Or [!Condition HasImportedApiCert, !Condition HasManagedApiCert]
  HasAppCnameTarget: !Not [!Equals [!Ref AppCnameTarget, ""]]
  HasAdminCnameTarget: !Not [!Equals [!Ref AdminCnameTarget, ""]]
  HasWwwCnameTarget: !Not [!Equals [!Ref WwwCnameTarget, ""]]
  UseManagedMultilingualSecrets: !Equals [!Ref MultilingualSecretProvisioning, "managed"]
  MultilingualSecretsBroadPolicy: !Equals [!Ref MultilingualSecretsPolicyMode, "broad"]
  EnablePilotGradeBackups:
    Fn::Or:
      - Fn::Equals:
          - !Ref DeploymentStage
          - staging
      - Fn::Equals:
          - !Ref DeploymentStage
          - prod
      - Fn::Equals:
          - !Ref DeploymentStage
          - pilot
  HasIncidentMediaTwilioSecretArn: !Not [!Equals [!Ref IncidentMediaTwilioSecretArn, ""]]
  HasRingAccountsTable: !Not [!Equals [!Ref RingAccountsTable, ""]]
  HasRingDevicesTable: !Not [!Equals [!Ref RingDevicesTable, ""]]
  HasRingRequestsTable: !Not [!Equals [!Ref RingRequestsTable, ""]]
  HasRingSessionsTable: !Not [!Equals [!Ref RingSessionsTable, ""]]
  HasVenueFacilitiesTable: !Not [!Equals [!Ref VenueFacilitiesTable, ""]]
  HasVenueCameraAccessLogTable: !Not [!Equals [!Ref VenueCameraAccessLogTable, ""]]
  HasVenueConfigTable: !Not [!Equals [!Ref VenueConfigTable, ""]]
  HasCampusIncidentsTable: !Not [!Equals [!Ref CampusIncidentsTable, ""]]
  HasCampusConfigTable: !Not [!Equals [!Ref CampusConfigTable, ""]]
  HasQRLocationsTable: !Not [!Equals [!Ref QRLocationsTable, ""]]
  HasVenueBridgeCluster: !Not [!Equals [!Ref VenueBridgeClusterArn, ""]]
  HasRingCredentialsSecretArn: !Not [!Equals [!Ref RingCredentialsSecretArn, ""]]
  HasExternalApiJwtSecretArn: !Not [!Equals [!Ref ExternalApiJwtSecretArn, ""]]
  HasExternalApiEncryptionKeyArn: !Not [!Equals [!Ref ExternalApiEncryptionKeyArn, ""]]
  HasDynamoTablePrefix: !Not [!Equals [!Ref DynamoTableNamePrefix, ""]]
  DynamoPitrOn:
    Fn::Or:
      - Fn::And:
          - !Equals [!Ref DynamoPointInTimeRecovery, "auto"]
          - !Condition EnablePilotGradeBackups
      - !Equals [!Ref DynamoPointInTimeRecovery, "true"]
  HasCognitoAppClientNameParam: !Not [!Equals [!Ref CognitoAppClientName, ""]]
  HasCognitoDomainPrefixParam: !Not [!Equals [!Ref CognitoDomainPrefix, ""]]
  HasCognitoCallbackUrls: !Not [!Equals [!Ref CognitoCallbackUrls, ""]]
  HasCognitoLogoutUrls: !Not [!Equals [!Ref CognitoLogoutUrls, ""]]
  CognitoClientUsesSecret: !Equals [!Ref CognitoGenerateSecret, "true"]
  HasSnsEmailSubscription: !Not [!Equals [!Ref SnsEmailSubscription, ""]]
  HasSnsSmsSubscription: !Not [!Equals [!Ref SnsSmsSubscription, ""]]
  CreateSesIdentity:
    Fn::And:
      - !Not [!Equals [!Ref SesIdentityValue, ""]]
      - !Not [!Equals [!Ref SesIdentityType, ""]]
  CreateBillingSesIdentities: !And
    - !Not [!Equals [!Ref BillingSesSenderEmail, ""]]
    - !Not [!Equals [!Ref BillingSesDomain, ""]]
    - !Equals [!Ref SesIdentityType, ""]
  BillingRoute53Records: !And
    - !Condition HasRoute53HostedZone
    - !Condition CreateBillingSesIdentities
  HasSesConfigurationSet: !Not [!Equals [!Ref SesConfigurationSetName, ""]]
  HasRoute53HostedZone: !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  CreateLiveVideoResources: !Equals [!Ref EnableLiveVideoResources, "true"]
  HasApiWaf: !Equals [!Ref EnableApiWaf, "true"]
  CloudTrailEnabled: !Equals [!Ref EnableCloudTrail, "true"]
  CloudTrailS3DataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailS3DataEvents, "true"]
  CloudTrailLambdaDataEvents: !And
    - !Condition CloudTrailEnabled
    - !Equals [!Ref EnableCloudTrailLambdaDataEvents, "true"]
  CloudTrailS3AndLambdaDataEvents: !And
    - !Condition CloudTrailS3DataEvents
    - !Condition CloudTrailLambdaDataEvents
  CloudTrailS3DataOnly: !And
    - !Condition CloudTrailS3DataEvents
    - !Not [!Condition CloudTrailLambdaDataEvents]
  CloudTrailLambdaDataOnly: !And
    - !Condition CloudTrailLambdaDataEvents
    - !Not [!Condition CloudTrailS3DataEvents]
  HasCloudTrailKms: !Not [!Equals [!Ref CloudTrailKmsKeyArn, ""]]
  HasOpenAiApiKeySecretArn: !Not [!Equals [!Ref OpenAiApiKeySecretArn, ""]]
  HasAnthropicApiKeySecretArn: !Not [!Equals [!Ref AnthropicApiKeySecretArn, ""]]
  IsProdOrPilot: !Or
    - !Equals [!Ref DeploymentStage, prod]
    - !Equals [!Ref DeploymentStage, pilot]
    - !Equals [!Ref DeploymentStage, staging]
  PilotTestFeaturesOn:
    Fn::Or:
      - !Equals [!Ref PilotTestFeaturesEnabled, "true"]
      - Fn::And:
          - !Equals [!Ref PilotTestFeaturesEnabled, "auto"]
          - !Equals [!Ref DeploymentStage, "dev"]

Mappings:
  MultilingualStageDefaults:
    dev:
      StrictValidation: "false"
    staging:
      StrictValidation: "true"
    prod:
      StrictValidation: "true"
    pilot:
      StrictValidation: "true"
  ApiLambdaDefaults:
    dev:
      PrimaryAi: mock
      SecondaryAi: mock
      TertiaryAi: "off"
      AiFallback: mock
      AiSecondaryFallback: mock
      Lid1: mock
      Lid2: mock
      Lid3: "off"
      # STT chain enabled on dev 2026-05-26 (per Jeff) to verify OpenAI Whisper
      # end-to-end. Azure Speech (primary) and OpenAI Whisper (secondary) cost
      # real $ on every audio chunk. AWS Transcribe is tertiary fallback.
      # multilingualConfig normalizeVendorKind accepts: azure, openai, aws, mock, off
      # (azure-speech / openai-whisper / aws-transcribe are NOT valid short forms).
      Stt1: "azure"
      Stt2: "openai"
      Stt3: "aws"
      # Translation chain still on mock for dev (Deploy #6 = STT verification
      # only). Deploy #7 will flip to Tr1=azure / Tr2=google / Tr3=aws across
      # all stages. multilingualConfig normalizeVendorKind accepts: azure,
      # google, aws, mock, off (NOT azure-translator / google-translate / aws-
      # translate). NOTE: bare YAML "off" is parsed as boolean false, so quote
      # it as "off" — otherwise CFN deploys TERTIARY_TRANSLATION_PROVIDER="false".
      Tr1: "mock"
      Tr2: "mock"
      Tr3: "off"
    staging:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
    prod:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
    pilot:
      PrimaryAi: bedrock
      SecondaryAi: "off"
      TertiaryAi: "off"
      AiFallback: "off"
      AiSecondaryFallback: "off"
      Lid1: aws
      Lid2: mock
      Lid3: "off"
      Stt1: azure
      Stt2: openai
      Stt3: aws
      Tr1: "aws"
      Tr2: "mock"
      Tr3: "off"
  SmsEnvironmentDefaults:
    dev:
      SmsProvider: mock
      SmsPrimaryProvider: twilio
      MockSmsProvider: "true"
      AwsSmsUseSimulator: "true"
    staging:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    prod:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"
    pilot:
      SmsProvider: auto
      SmsPrimaryProvider: twilio
      MockSmsProvider: "false"
      AwsSmsUseSimulator: "false"

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 512
    Environment:
      Variables:
        RING_CREDENTIALS_SECRET_ARN: !Ref RingCredentialsSecretArn
        RING_PARTNER_TOKEN_SECRET_ARN: !Ref RingCredentialsSecretArn
        RING_PARTNERSHIP_ENABLED: !Ref RingPartnershipEnabled
        RING_API_BASE_URL: !Ref RingApiBaseUrl
        ENABLE_CONNECT_RING: !Ref EnableConnectRing
        ENABLE_CONNECT_RING_AVAILABLE_CAMERAS: !If [PilotTestFeaturesOn, "true", !Ref EnableConnectRingAvailableCameras]
        ENABLE_CONNECT_RING_EMERGENCY_REQUESTS: !If [PilotTestFeaturesOn, "true", !Ref EnableConnectRingEmergencyRequests]
        CONNECT_SESSIONS_TABLE: !Ref ConnectAccessSessionsTable
        VENUE_CAMERA_SESSIONS_TABLE: !Ref ConnectAccessSessionsTable
        VENUE_FACILITIES_TABLE: !Ref VenueFacilitiesTable
        VENUE_ASSETS_TABLE: !Ref VenueAssetsTable
        VENUE_OVERLAYS_TABLE: !Ref VenueIncidentOverlaysTable
        VENUE_CAMERA_ACCESS_LOG_TABLE: !If
          - HasVenueCameraAccessLogTable
          - !Ref VenueCameraAccessLogTable
          - ""
        VENUE_CONFIG_TABLE: !If
          - HasVenueConfigTable
          - !Ref VenueConfigTable
          - ""
        VENUE_CODES: !Sub "${AppName}-venue-codes"
        CAMPUS_INCIDENTS_TABLE: !If
          - HasCampusIncidentsTable
          - !Ref CampusIncidentsTable
          - ""
        CAMPUS_CONFIG_TABLE: !If
          - HasCampusConfigTable
          - !Ref CampusConfigTable
          - ""
        QR_LOCATIONS_TABLE: !If
          - HasQRLocationsTable
          - !Ref QRLocationsTable
          - ""
        CAMPUS_CODES: !Sub "${AppName}-campus-codes"
        CONNECT_BRIDGE_CLUSTER_ARN: !Ref ConnectBridgeClusterArn
        VENUE_BRIDGE_CLUSTER_ARN: !If
          - HasVenueBridgeCluster
          - !Ref VenueBridgeClusterArn
          - ""
        CONNECT_BRIDGE_TASK_DEFINITION: !Ref ConnectBridgeTaskDefinitionResource
        VENUE_BRIDGE_TASK_DEFINITION: !If
          - HasVenueBridgeCluster
          - !Ref VenueBridgeTaskDefinitionResource
          - ""
        BRIDGE_SUBNET_IDS: !Ref BridgeSubnetIds
        BRIDGE_SECURITY_GROUP_IDS: !Ref BridgeSecurityGroupIds


Resources:
  AppManagedPolicyDynamoLambdaCrudShardA:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AppName}-sam5-lambda-ddb-crud-${DeploymentStage}-a"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DynamoApplicationShardA
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:DescribeTable
              - dynamodb:ConditionCheckItem
            Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AccessOverridesTable}/index/*
