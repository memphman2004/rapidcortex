  PinpointIncidentsHttpFunction:
    # Same handler as the legacy `PinpointSurgeIncidentsHttpFunction` in stack-app-sam-2.yaml,
    # but only the `/pinpoint/links/*` routes are attached here. The Surge `/surge/*` routes
    # stay in stack-2 until Surge gets its own dedicated handler (out of scope for this fix).
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      BuildTarget: build-function
    Properties:
      CodeUri: ../../apps/api/
      Handler: dist/handlers/pinpointSurgeIncidentsHttp.handler
      Timeout: 30
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref ImportedCognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref ImportedCognitoWebClientId
          PINPOINT_LINKS_TABLE: !Ref PinpointLinksTable
