  IncidentMediaSmsRoutingFailedMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: IncidentMediaHttpLogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${IncidentMediaHttpFunction}
      FilterPattern: '"routing_complete" "failed" "outbound.sms"'
      MetricTransformations:
        - MetricName: OutboundSmsRoutingFailures
          MetricNamespace: RapidCortex/Sms
          MetricValue: "1"
          DefaultValue: 0


  LiveVideoSmsRoutingFailedMetricFilter:
    Type: AWS::Logs::MetricFilter
    Condition: CreateLiveVideoResources
    DependsOn: LiveVideoIncidentsHttpLogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LiveVideoIncidentsHttpFunction}
      FilterPattern: '"routing_complete" "failed" "outbound.sms"'
      MetricTransformations:
        - MetricName: OutboundSmsRoutingFailures
          MetricNamespace: RapidCortex/Sms
          MetricValue: "1"
          DefaultValue: 0

  KvsWebRtcBrowserTokenRole:
    Type: AWS::IAM::Role
    Condition: CreateLiveVideoResources
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              StringLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/*LiveVideo*HttpFunctionRole*"
      Policies:
        - PolicyName: KvsWebrtcDataPlane
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: KvsDataPlane
                Effect: Allow
                Action:
                  - kinesisvideo:ConnectAsMaster
                  - kinesisvideo:ConnectAsViewer
                  - kinesisvideo:JoinStorageSession
                  - kinesisvideo:JoinStorageSessionAsViewer
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/*/*"
              - Sid: KvsMappedStreamRead
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeMappedResourceConfiguration
                Resource: !Sub "arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:stream/*/*"

  ConnectViewerChannelPolicy:
    Type: AWS::IAM::Policy
    Condition: CreateLiveVideoResources
    Properties:
      PolicyName: !Sub "${AppName}-connect-viewer-channels-${DeploymentStage}"
      Roles:
        - !Ref KvsWebRtcBrowserTokenRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:ConnectAsViewer
              - kinesisvideo:DescribeSignalingChannel
            Resource:
