            - ""
      Policies:
        - Statement:
            Sid: StreamViewerTokenSessionsReadWrite
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:UpdateItem
            Resource:
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConnectAccessSessionsTable}
        - !If
          - CreateLiveVideoResources
          - Statement:
              Sid: StreamViewerTokenAssumeBrowserRole
              Effect: Allow
              Action: sts:AssumeRole
              Resource: !GetAtt KvsWebRtcBrowserTokenRole.Arn
          - !Ref AWS::NoValue
        - Statement:
            Sid: StreamViewerTokenKvsRead
            Effect: Allow
            Action:
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:GetIceServerConfig
            Resource:
              - !Sub arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/rc-connect-*/*
              - !Sub arn:${AWS::Partition}:kinesisvideo:${AWS::Region}:${AWS::AccountId}:channel/rc-venue-*/*
